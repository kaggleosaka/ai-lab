<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>7はどれ？ かんたん知育クイズ</title>
  <style>
    :root {
      --bg1: #fff7b2;
      --bg2: #ffe38a;
      --card: #ffffff;
      --text: #1f2937;
      --accent: #ef4444;
      --accent2: #2563eb;
      --ok: #22c55e;
      --shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .phone-frame {
      width: min(100%, 420px);
      aspect-ratio: 9 / 16;
      background: rgba(255,255,255,0.25);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      border: 2px solid rgba(255,255,255,0.65);
    }

    .screen {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #fffdf2, #fff8cf);
      border-radius: 22px;
      padding: 14px 14px 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .badge {
      background: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: 700;
      box-shadow: 0 6px 16px rgba(0,0,0,0.08);
      white-space: nowrap;
    }

    .title-card {
      width: 100%;
      background: var(--card);
      border-radius: 24px;
      padding: 14px 12px 12px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
    }

    .title-small {
      font-size: 16px;
      font-weight: 800;
      color: #6b7280;
      margin-bottom: 6px;
    }

    .title-main {
      font-size: clamp(30px, 7vw, 44px);
      font-weight: 900;
      color: var(--accent);
      line-height: 1.1;
      margin: 0;
    }

    .sub {
      font-size: 15px;
      font-weight: 800;
      color: var(--accent2);
      margin-top: 6px;
    }

    .countdown-wrap {
      margin-top: 8px;
      margin-bottom: 8px;
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .countdown {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: #fff;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 900;
      color: var(--accent2);
    }

    .grid {
      width: 100%;
      max-width: 340px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 auto;
      padding: 4px 0;
      flex: 1;
      align-content: center;
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: #fff;
      border-radius: 22px;
      border: none;
      box-shadow: 0 8px 20px rgba(0,0,0,0.10);
      font-size: clamp(38px, 10vw, 54px);
      font-weight: 900;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .cell.correct {
      background: #dcfce7;
      color: #166534;
    }

    .cell.wrong {
      background: #fee2e2;
      color: #991b1b;
    }

    .footer {
      width: 100%;
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }

    .message {
      min-height: 44px;
      width: 100%;
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      color: #111827;
      padding: 8px 10px;
      background: rgba(255,255,255,0.78);
      border-radius: 16px;
    }

    .controls {
      position: absolute;
      bottom: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
    }

    .ctrl-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 14px;
      background: #ffffff;
      box-shadow: 0 6px 16px rgba(0,0,0,0.10);
      font-weight: 800;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }

    .thumb-screen {
      position: absolute;
      inset: 0;
      z-index: 30;
      background: linear-gradient(180deg, #fff6a8, #ffd96f);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px;
    }

    .thumb-label {
      background: #2563eb;
      color: #fff;
      font-weight: 900;
      font-size: clamp(20px, 5vw, 28px);
      padding: 10px 18px;
      border-radius: 999px;
      margin-bottom: 18px;
    }

    .thumb-main {
      font-size: clamp(96px, 24vw, 150px);
      line-height: 1;
      font-weight: 900;
      color: #ef4444;
      margin: 0;
    }

    .thumb-sub {
      margin-top: 8px;
      font-size: clamp(28px, 7vw, 42px);
      line-height: 1.1;
      font-weight: 900;
      color: #111827;
    }

    .thumb-bottom {
      margin-top: 18px;
      font-size: clamp(18px, 4.8vw, 26px);
      color: #111827;
      font-weight: 800;
      background: rgba(255,255,255,0.85);
      padding: 10px 16px;
      border-radius: 16px;
    }

    .start-btn {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      padding: 14px 26px;
      font-size: 24px;
      font-weight: 900;
      cursor: pointer;
    }

    @media (max-width: 430px) {
      .phone-frame {
        width: 100%;
        aspect-ratio: auto;
        min-height: 100vh;
        border-radius: 0;
        padding: 0;
        border: none;
        box-shadow: none;
        background: transparent;
      }

      .screen {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="phone-frame">
      <div class="screen">
        <div class="thumb-screen" id="thumbScreen">
          <div class="thumb-label">のうトレ！ 3秒クイズ</div>
          <div class="thumb-main">7</div>
          <div class="thumb-sub">は どれ？</div>
          <div class="thumb-bottom">3びょうで みつけてね！</div>
          <button class="start-btn" id="startBtn">スタート</button>
        </div>

        <div class="topbar">
          <div class="badge" id="qBadge">もんだい 1 / 10</div>
          <div class="badge" id="scoreBadge">せいかい 0</div>
        </div>

        <div class="title-card">
          <div class="title-small">かんたん ちいくクイズ</div>
          <h1 class="title-main">7は どれ？</h1>
          <div class="sub">3びょうで みつけてね！</div>
        </div>

        <div class="countdown-wrap">
          <div class="countdown" id="countdown">3</div>
        </div>

        <div class="grid" id="grid"></div>

        <div class="footer">
          <div class="message" id="message">スタートを おしてね！</div>
        </div>

        <div class="controls">
          <button class="ctrl-btn hidden" id="retryBtn">もういちど</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TOTAL_QUESTIONS = 10;
    const TARGET = 7;
    const DISTRACTORS = [1, 2, 3, 4, 5, 6, 8, 9];
    const GRID_SIZE = 9;

    const gridEl = document.getElementById("grid");
    const countdownEl = document.getElementById("countdown");
    const messageEl = document.getElementById("message");
    const qBadgeEl = document.getElementById("qBadge");
    const scoreBadgeEl = document.getElementById("scoreBadge");
    const retryBtn = document.getElementById("retryBtn");
    const thumbScreenEl = document.getElementById("thumbScreen");
    const startBtn = document.getElementById("startBtn");

    let questionIndex = 0;
    let score = 0;
    let answerIndex = 0;
    let currentCountdown = 3;
    let countdownTimer = null;
    let canTap = false;

    function choice(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function updateBadges() {
      qBadgeEl.textContent = `もんだい ${Math.min(questionIndex + 1, TOTAL_QUESTIONS)} / ${TOTAL_QUESTIONS}`;
      scoreBadgeEl.textContent = `せいかい ${score}`;
    }

    function renderGrid(values) {
      gridEl.innerHTML = "";
      values.forEach((value, index) => {
        const btn = document.createElement("button");
        btn.className = "cell";
        btn.textContent = value;
        btn.addEventListener("click", () => handleTap(index, btn));
        gridEl.appendChild(btn);
      });
    }

    function buildQuestion() {
      clearInterval(countdownTimer);
      currentCountdown = 3;
      countdownEl.textContent = currentCountdown;

      answerIndex = Math.floor(Math.random() * GRID_SIZE);

      const values = [];
      for (let i = 0; i < GRID_SIZE; i++) {
        if (i === answerIndex) {
          values.push(TARGET);
        } else {
          values.push(choice(DISTRACTORS));
        }
      }

      renderGrid(values);
      messageEl.textContent = "7を さがしてね！";
      canTap = true;
      startCountdown();
    }

    function startCountdown() {
      countdownTimer = setInterval(() => {
        currentCountdown--;
        countdownEl.textContent = currentCountdown > 0 ? currentCountdown : "0";

        if (currentCountdown <= 0) {
          clearInterval(countdownTimer);
          revealCorrect(false);
        }
      }, 1000);
    }

    function handleTap(index, btn) {
      if (!canTap) return;
      canTap = false;
      clearInterval(countdownTimer);

      if (index === answerIndex) {
        score++;
        updateBadges();
        btn.classList.add("correct");
        messageEl.textContent = "せいかい！";
        setTimeout(nextQuestion, 900);
      } else {
        btn.classList.add("wrong");
        messageEl.textContent = "おしい！";
        setTimeout(() => revealCorrect(true), 400);
      }
    }

    function revealCorrect(fromWrong) {
      canTap = false;
      const buttons = [...gridEl.querySelectorAll(".cell")];
      const correctBtn = buttons[answerIndex];
      if (correctBtn) correctBtn.classList.add("correct");

      messageEl.textContent = fromWrong ? "ここが 7！" : "じかんぎれ！ ここが 7！";
      setTimeout(nextQuestion, 1200);
    }

    function nextQuestion() {
      questionIndex++;
      if (questionIndex >= TOTAL_QUESTIONS) {
        endGame();
        return;
      }
      updateBadges();
      buildQuestion();
    }

    function endGame() {
      clearInterval(countdownTimer);
      canTap = false;
      countdownEl.textContent = "★";
      messageEl.textContent = `${score}もん せいかい`;
      retryBtn.classList.remove("hidden");
    }

    function resetGame() {
      questionIndex = 0;
      score = 0;
      updateBadges();
      retryBtn.classList.add("hidden");
      buildQuestion();
    }

    startBtn.addEventListener("click", () => {
      thumbScreenEl.classList.add("hidden");
      resetGame();
    });

    retryBtn.addEventListener("click", resetGame);

    updateBadges();
  </script>
</body>
</html>
