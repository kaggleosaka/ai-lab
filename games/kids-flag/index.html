<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<title>世界の国旗あてゲーム</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: #121c30;
    --panel2: #1a2742;
    --accent: #59c3ff;
    --ok: #27c281;
    --ng: #ff6b6b;
    --text: #eef4ff;
    --muted: #a9b7d0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(180deg, #08101c 0%, #0d1526 100%);
    color: var(--text);
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px;
  }
  .header {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: stretch;
  }
  .titlebox, .statbox {
    background: rgba(18,28,48,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  }
  .titlebox {
    padding: 16px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: clamp(24px, 4vw, 40px);
  }
  .sub {
    color: var(--muted);
    line-height: 1.5;
    font-size: 14px;
  }
  .target {
    margin-top: 12px;
    background: var(--panel2);
    border-radius: 14px;
    padding: 12px 14px;
    font-size: clamp(22px, 4vw, 34px);
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  .statbox {
    padding: 14px;
    min-width: 270px;
    display: grid;
    gap: 10px;
    align-content: start;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .stat {
    background: var(--panel2);
    padding: 10px;
    border-radius: 12px;
    text-align: center;
  }
  .stat .label {
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 6px;
  }
  .stat .value {
    font-size: 24px;
    font-weight: 800;
  }
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  button {
    border: 0;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: var(--accent);
    color: #062035;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  button.secondary {
    background: #31415f;
    color: var(--text);
  }
  .msg {
    min-height: 24px;
    font-weight: 700;
  }
  .msg.ok { color: var(--ok); }
  .msg.ng { color: var(--ng); }
  .board {
    margin-top: 16px;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }
  .card {
    position: relative;
    background: rgba(18,28,48,0.95);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 10px;
    cursor: pointer;
    transition: transform 0.08s ease, box-shadow 0.08s ease, border-color 0.12s ease;
    box-shadow: 0 10px 24px rgba(0,0,0,0.2);
    min-height: 170px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover { transform: translateY(-2px); }
  .card.correct { border-color: rgba(39,194,129,0.95); box-shadow: 0 0 0 2px rgba(39,194,129,0.25); }
  .card.wrong { border-color: rgba(255,107,107,0.95); box-shadow: 0 0 0 2px rgba(255,107,107,0.25); }
  .flagcanvas {
    display: block;
    width: 100%;
    height: 138px;
    border-radius: 12px;
    background: #000;
  }
  .tiny {
    text-align: center;
    color: var(--muted);
    margin-top: 8px;
    font-size: 12px;
  }
  .footer {
    margin-top: 14px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
  }
  .overlay {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(3, 8, 18, 0.72);
    padding: 16px;
  }
  .modal {
    width: min(520px, 100%);
    background: #111c30;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 24px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.4);
    text-align: center;
  }
  .modal h2 {
    margin: 0 0 10px;
    font-size: 32px;
  }
  .modal p {
    margin: 8px 0;
    color: var(--muted);
    line-height: 1.6;
  }
  .result {
    font-size: 42px;
    font-weight: 900;
    margin: 14px 0;
  }
  @media (max-width: 920px) {
    .header { grid-template-columns: 1fr; }
    .board { grid-template-columns: repeat(3, minmax(96px, 1fr)); }
  }
  @media (max-width: 520px) {
    .wrap { padding: 10px; }
    .board { gap: 8px; }
    .card { padding: 8px; border-radius: 12px; }
    .flagcanvas { height: 82px; }
    .target { font-size: 26px; }
    .stats { grid-template-columns: repeat(3, 1fr); }
    .controls { grid-template-columns: 1fr 1fr; }
    button { font-size: 15px; padding: 10px 12px; }
  }
  html, body {
    height: 100%;
    overflow: hidden;
  }
  .wrap {
    min-height: 100dvh;
  }
  @media (min-width: 700px) and (max-width: 1180px) {
    .wrap { padding: 12px; }
    .titlebox { padding: 14px; }
    .statbox { min-width: 0; }
    .board { gap: 10px; }
    .card { min-height: 160px; }
    .flagcanvas { height: 128px; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="titlebox">
        <h1>世界の国旗あてゲーム</h1>
        <div class="sub">画面に9枚の国旗が並びます。上に出る国名と一致する国旗をすばやくタップしてください。<br>間違えると3秒減点、正解すると次の国名が出ます。</div>
        <div class="target" id="targetName">スタートを押してください</div>
      </div>
      <div class="statbox">
        <div class="stats">
          <div class="stat"><div class="label">スコア</div><div class="value" id="score">0</div></div>
          <div class="stat"><div class="label">のこり時間</div><div class="value" id="time">60</div></div>
          <div class="stat"><div class="label">連続正解</div><div class="value" id="combo">0</div></div>
        </div>
        <div class="controls">
          <button id="startBtn">スタート</button>
          <button class="secondary" id="shuffleBtn">国旗を入れ替え</button>
        </div>
        <div class="msg" id="message"></div>
      </div>
    </div>
    <div class="board" id="board"></div>
    <div class="footer">画像はご指定の国旗一覧画像を切り出して使用しています。収録は48か国です。</div>
  </div>

  <div class="overlay" id="overlay">
    <div class="modal">
      <h2>世界の国旗あてゲーム</h2>
      <p>1ゲーム60秒。正しい国旗をできるだけたくさん当ててください。</p>
      <p>表示される国名に対応する国旗を9枚の中からタップします。</p>
      <button id="overlayStart">ゲーム開始</button>
    </div>
  </div>

const img = new Image();
img.src = spriteSrc;

const boardEl = document.getElementById('board');
const targetNameEl = document.getElementById('targetName');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('time');
const comboEl = document.getElementById('combo');
const msgEl = document.getElementById('message');
const overlayEl = document.getElementById('overlay');

const GAME_TIME = 60;
const VISIBLE_COUNT = 9;

let state = {
  started: false,
  score: 0,
  combo: 0,
  time: GAME_TIME,
  timerId: null,
  deck: [],
  visible: [],
  targetIndex: null,
};

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function resetDeck() {
  state.deck = shuffle(flags.map((_, i) => i));
}

function drawFlag(canvas, flag) {
  const ctx = canvas.getContext('2d');
  const cw = canvas.width;
  const ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cw, ch);

  const scale = Math.min(cw / flag.w, ch / flag.h);
  const dw = flag.w * scale;
  const dh = flag.h * scale;
  const dx = (cw - dw) / 2;
  const dy = (ch - dh) / 2;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(img, flag.x, flag.y, flag.w, flag.h, dx, dy, dw, dh);
}

function nextFromDeck(excludeSet = new Set()) {
  while (state.deck.length) {
    const idx = state.deck.pop();
    if (!excludeSet.has(idx)) return idx;
  }
  resetDeck();
  while (state.deck.length) {
    const idx = state.deck.pop();
    if (!excludeSet.has(idx)) return idx;
  }
  return null;
}

function buildBoard() {
  boardEl.innerHTML = '';
  state.visible.forEach((flagIdx, cardPos) => {
    const flag = flags[flagIdx];
    const card = document.createElement('button');
    card.className = 'card';
    card.type = 'button';
    card.dataset.flagIndex = String(flagIdx);
    card.setAttribute('aria-label', flag.name);

    const canvas = document.createElement('canvas');
    canvas.className = 'flagcanvas';
    canvas.width = 240;
    canvas.height = 130;
    drawFlag(canvas, flag);

    const tiny = document.createElement('div');
    tiny.className = 'tiny';
    tiny.textContent = 'タップ / クリック';

    card.appendChild(canvas);
    card.appendChild(tiny);
    card.addEventListener('pointerup', (e) => {
      e.preventDefault();
      handleCardClick(card, flagIdx);
    });
    boardEl.appendChild(card);
  });
}

function fillVisibleFlags() {
  const exclude = new Set();
  state.visible = [];
  while (state.visible.length < VISIBLE_COUNT) {
    const idx = nextFromDeck(exclude);
    if (idx === null) break;
    exclude.add(idx);
    state.visible.push(idx);
  }
}

function chooseTarget() {
  if (state.visible.length === 0) {
    targetNameEl.textContent = 'おしまい';
    state.targetIndex = null;
    return;
  }
  const pick = state.visible[Math.floor(Math.random() * state.visible.length)];
  state.targetIndex = pick;
  targetNameEl.textContent = flags[pick].name;
}

function setMessage(text = '', cls = '') {
  msgEl.textContent = text;
  msgEl.className = 'msg' + (cls ? ' ' + cls : '');
}

function updateStats() {
  scoreEl.textContent = state.score;
  timeEl.textContent = state.time;
  comboEl.textContent = state.combo;
}

function flashCard(card, cls) {
  card.classList.add(cls);
  setTimeout(() => card.classList.remove(cls), 220);
}

function handleCardClick(card, flagIdx) {
  if (!state.started || state.time <= 0 || state.targetIndex === null) return;

  if (flagIdx === state.targetIndex) {
    state.score += 1;
    state.combo += 1;
    if (state.combo > 0 && state.combo % 5 === 0) {
      state.time = Math.min(99, state.time + 2);
      setMessage('5連続正解で +2秒！', 'ok');
    } else {
      setMessage('正解！', 'ok');
    }
    flashCard(card, 'correct');

    const pos = state.visible.indexOf(flagIdx);
    const exclude = new Set(state.visible);
    exclude.delete(flagIdx);
    const replacement = nextFromDeck(exclude);
    if (replacement !== null && pos >= 0) {
      state.visible[pos] = replacement;
    }
    buildBoard();
    chooseTarget();
  } else {
    state.combo = 0;
    state.time = Math.max(0, state.time - 3);
    setMessage(`ちがう！ 正解は「${flags[state.targetIndex].name}」`, 'ng');
    flashCard(card, 'wrong');
    if (state.time === 0) {
      endGame();
      return;
    }
  }
  updateStats();
}

function tick() {
  state.time -= 1;
  updateStats();
  if (state.time <= 0) {
    endGame();
  }
}

function startGame() {
  state.started = true;
  state.score = 0;
  state.combo = 0;
  state.time = GAME_TIME;
  setMessage('');
  resetDeck();
  fillVisibleFlags();
  buildBoard();
  chooseTarget();
  updateStats();
  overlayEl.style.display = 'none';
  clearInterval(state.timerId);
  state.timerId = setInterval(tick, 1000);
}

function endGame() {
  state.started = false;
  clearInterval(state.timerId);
  state.timerId = null;
  updateStats();
  overlayEl.style.display = 'grid';
  overlayEl.querySelector('.modal').innerHTML = `
    <h2>タイムアップ！</h2>
    <div class="result">${state.score} 点</div>
    <p>連続正解の最高を狙って、もう一度チャレンジ！</p>
    <p>正解を重ねるとテンポよく次の国名が出ます。</p>
    <button id="retryBtn">もう一度あそぶ</button>
  `;
  document.getElementById('retryBtn').addEventListener('click', startGame);
}


boardEl.addEventListener('gesturestart', (e) => {
  e.preventDefault();
});

document.addEventListener('dblclick', (e) => {
  e.preventDefault();
}, { passive: false });
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('overlayStart').addEventListener('click', startGame);
document.getElementById('shuffleBtn').addEventListener('click', () => {
  if (!img.complete) return;
  resetDeck();
  fillVisibleFlags();
  buildBoard();
  chooseTarget();
  setMessage('国旗を入れ替えました');
});

img.onload = () => {
  resetDeck();
  fillVisibleFlags();
  buildBoard();
  chooseTarget();
  targetNameEl.textContent = 'スタートを押してください';
};
</script>
</body>
</html>
