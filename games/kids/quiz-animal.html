<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>3秒でできる知育クイズ</title>
  <style>
    :root {
      --bg1: #fff8e1;
      --bg2: #e3f2fd;
      --card: #ffffff;
      --text: #222;
      --accent: #ff9800;
      --ok: #2e7d32;
      --ng: #d32f2f;
      --shadow: 0 10px 24px rgba(0,0,0,0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app {
      width: min(100vw, 430px);
      height: 100vh;
      max-height: 100dvh;
      padding: env(safe-area-inset-top, 12px) 12px env(safe-area-inset-bottom, 12px);
      display: grid;
      grid-template-rows: auto auto auto 1fr auto auto;
      gap: 10px;
    }

    .topbar, .panel, .footer {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(8px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .topbar {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
      font-size: 16px;
    }

    .brand { color: #ef6c00; }
    .score { font-size: 15px; }

    .countdown {
      text-align: center;
      font-size: clamp(26px, 7vw, 36px);
      font-weight: 900;
      padding: 8px;
      color: #1565c0;
      text-shadow: 0 1px 0 #fff;
    }

    .panel {
      padding: 14px 12px;
      text-align: center;
    }

    .question-label {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #6d4c41;
    }

    .question {
      font-size: clamp(30px, 8vw, 44px);
      font-weight: 900;
      line-height: 1.15;
      margin: 0;
      min-height: 56px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      align-content: stretch;
      min-height: 0;
    }

    .choice {
      border: none;
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 118px;
      padding: 10px 6px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.08s ease, box-shadow 0.15s ease;
      user-select: none;
    }

    .choice:active {
      transform: scale(0.97);
    }

    .emoji {
      font-size: clamp(44px, 11vw, 62px);
      line-height: 1;
      margin-bottom: 8px;
    }

    .name {
      font-size: clamp(20px, 5vw, 28px);
      line-height: 1.1;
    }

    .choice.correct {
      outline: 5px solid rgba(46,125,50,0.22);
      background: #e8f5e9;
    }

    .choice.wrong {
      outline: 5px solid rgba(211,47,47,0.22);
      background: #ffebee;
    }

    .result {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: clamp(26px, 7vw, 40px);
      font-weight: 900;
      padding: 8px;
    }

    .result.ok { color: var(--ok); }
    .result.ng { color: var(--ng); }

    .footer {
      padding: 10px 12px;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #5d4037;
    }

    .start-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,248,225,0.96), rgba(227,242,253,0.96));
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 16px;
    }

    .start-card {
      width: min(100%, 420px);
      background: white;
      border-radius: 28px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.16);
      padding: 24px 18px;
      text-align: center;
    }

    .start-title {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 900;
      margin: 0 0 10px;
      color: #ef6c00;
      line-height: 1.2;
    }

    .start-sub {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .start-btn, .restart-btn {
      border: none;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffb74d, #fb8c00);
      color: white;
      font-size: 28px;
      font-weight: 900;
      padding: 16px 26px;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(251, 140, 0, 0.35);
    }

    .end-box {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.28);
      z-index: 9;
      padding: 16px;
    }

    .end-card {
      width: min(100%, 420px);
      background: #fff;
      border-radius: 28px;
      padding: 24px 18px;
      text-align: center;
      box-shadow: 0 16px 40px rgba(0,0,0,0.2);
    }

    .end-title {
      font-size: 34px;
      font-weight: 900;
      margin: 0 0 8px;
      color: #1565c0;
    }

    .end-score {
      font-size: 28px;
      font-weight: 900;
      margin: 12px 0 18px;
      color: #ef6c00;
    }

    @media (max-height: 720px) {
      .app {
        gap: 8px;
        grid-template-rows: auto auto auto 1fr auto auto;
      }
      .choice { min-height: 98px; }
      .emoji { font-size: clamp(36px, 10vw, 52px); }
      .name { font-size: clamp(18px, 4.6vw, 24px); }
      .result { min-height: 48px; }
    }
  </style>
</head>
<body>
  <div class="start-overlay" id="startOverlay">
    <div class="start-card">
      <h1 class="start-title">3秒でできる<br>どうぶつクイズ</h1>
      <div class="start-sub">4たくの中から えらんでね！</div>
      <button class="start-btn" id="startBtn">スタート</button>
    </div>
  </div>

  <div class="app">
    <div class="topbar">
      <div class="brand">3秒クイズ</div>
      <div class="score">せいかい: <span id="score">0</span></div>
    </div>

    <div class="countdown" id="countdown">3</div>

    <div class="panel">
      <div class="question-label">もんだい</div>
      <p class="question" id="question">いぬ は どれ？</p>
    </div>

    <div class="grid" id="grid"></div>

    <div class="result" id="result"></div>

    <div class="footer">👇コメントにURLあるよ！タップしてあそんでね👇</div>
  </div>

  <div class="end-box" id="endBox">
    <div class="end-card">
      <div class="end-title">おしまい！</div>
      <div class="end-score">せいかい <span id="finalScore">0</span> / 10</div>
      <button class="restart-btn" id="restartBtn">もういっかい</button>
    </div>
  </div>

  <script>
    const animals = [
      { name: 'いぬ', emoji: '🐶' },
      { name: 'ねこ', emoji: '🐱' },
      { name: 'ぞう', emoji: '🐘' },
      { name: 'うさぎ', emoji: '🐰' },
      { name: 'きりん', emoji: '🦒' },
      { name: 'さる', emoji: '🐵' },
      { name: 'ぶた', emoji: '🐷' },
      { name: 'くま', emoji: '🐻' },
      { name: 'ぱんだ', emoji: '🐼' },
      { name: 'ひよこ', emoji: '🐥' },
      { name: 'とら', emoji: '🐯' },
      { name: 'かえる', emoji: '🐸' },
      { name: 'きつね', emoji: '🦊' },
      { name: 'こあら', emoji: '🐨' },
      { name: 'らいおん', emoji: '🦁' },
      { name: 'ぺんぎん', emoji: '🐧' }
    ];

    const totalQuestions = 10;
    const secondsPerQuestion = 3;

    const startOverlay = document.getElementById('startOverlay');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const endBox = document.getElementById('endBox');
    const questionEl = document.getElementById('question');
    const countdownEl = document.getElementById('countdown');
    const resultEl = document.getElementById('result');
    const gridEl = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const finalScoreEl = document.getElementById('finalScore');

    let score = 0;
    let qIndex = 0;
    let currentChoices = [];
    let currentAnswer = null;
    let timer = null;
    let timeLeft = secondsPerQuestion;
    let locked = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function pickQuestion() {
      const choices = shuffle(animals).slice(0, 4);
      const answer = choices[Math.floor(Math.random() * choices.length)];
      return { choices: shuffle(choices), answer };
    }

    function renderChoices() {
      gridEl.innerHTML = '';
      currentChoices.forEach((item) => {
        const btn = document.createElement('button');
        btn.className = 'choice';
        btn.innerHTML = `<div class="emoji">${item.emoji}</div><div class="name">${item.name}</div>`;
        btn.addEventListener('click', () => handleChoice(item, btn));
        gridEl.appendChild(btn);
      });
    }

    function startCountdown() {
      clearInterval(timer);
      timeLeft = secondsPerQuestion;
      countdownEl.textContent = timeLeft;
      timer = setInterval(() => {
        timeLeft--;
        countdownEl.textContent = timeLeft > 0 ? timeLeft : '0';
        if (timeLeft <= 0) {
          clearInterval(timer);
          if (!locked) {
            timeoutQuestion();
          }
        }
      }, 1000);
    }

    function showResult(text, type) {
      resultEl.textContent = text;
      resultEl.className = `result ${type}`;
    }

    function clearResult() {
      resultEl.textContent = '';
      resultEl.className = 'result';
    }

    function nextQuestion() {
      if (qIndex >= totalQuestions) {
        endGame();
        return;
      }

      locked = false;
      clearResult();
      const q = pickQuestion();
      currentChoices = q.choices;
      currentAnswer = q.answer;
      questionEl.textContent = `${currentAnswer.name} は どれ？`;
      renderChoices();
      startCountdown();
    }

    function markCorrectChoice() {
      const buttons = [...document.querySelectorAll('.choice')];
      buttons.forEach((btn, i) => {
        if (currentChoices[i].name === currentAnswer.name) {
          btn.classList.add('correct');
        }
      });
    }

    function handleChoice(item, btn) {
      if (locked) return;
      locked = true;
      clearInterval(timer);

      const allButtons = [...document.querySelectorAll('.choice')];
      if (item.name === currentAnswer.name) {
        btn.classList.add('correct');
        score++;
        scoreEl.textContent = score;
        showResult('せいかい！', 'ok');
      } else {
        btn.classList.add('wrong');
        markCorrectChoice();
        showResult(`ざんねん！ ${item.name}`, 'ng');
      }

      qIndex++;
      setTimeout(nextQuestion, 900);
    }

    function timeoutQuestion() {
      locked = true;
      markCorrectChoice();
      showResult('じかんぎれ！', 'ng');
      qIndex++;
      setTimeout(nextQuestion, 900);
    }

    function endGame() {
      clearInterval(timer);
      finalScoreEl.textContent = score;
      endBox.style.display = 'flex';
    }

    function resetGame() {
      clearInterval(timer);
      score = 0;
      qIndex = 0;
      scoreEl.textContent = '0';
      endBox.style.display = 'none';
      nextQuestion();
    }

    startBtn.addEventListener('click', () => {
      startOverlay.style.display = 'none';
      resetGame();
    });

    restartBtn.addEventListener('click', resetGame);
  </script>
</body>
</html>
