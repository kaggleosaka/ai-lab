<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>3秒でできる知育クイズ</title>
  <style>
    :root { --accent:#ff9800; --ok:#2e7d32; --ng:#d32f2f; --glow:#43a047; }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;height:100%;font-family:sans-serif;background:linear-gradient(#fff8e1,#e3f2fd);overflow:hidden}
    .app{max-width:420px;margin:auto;height:100vh;display:grid;grid-template-rows:auto auto auto 1fr auto auto;gap:8px;padding:10px}
    .box{background:#fff;border-radius:20px;box-shadow:0 6px 16px rgba(0,0,0,.15)}

    .hook{background:#ffecb3;text-align:center;font-weight:900;font-size:20px;padding:6px;animation:blink 1s infinite;border-radius:16px}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes glowPulse{0%{transform:scale(1);box-shadow:0 0 0 rgba(67,160,71,0)}50%{transform:scale(1.04);box-shadow:0 0 24px rgba(67,160,71,.65)}100%{transform:scale(1);box-shadow:0 0 0 rgba(67,160,71,0)}}

    .top{display:flex;justify-content:space-between;padding:8px 12px;font-weight:700}
    .count{font-size:28px;text-align:center;font-weight:900}
    .question{text-align:center;font-size:34px;font-weight:900;padding:10px}

    .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .choice{border:none;border-radius:18px;padding:10px;font-size:22px;font-weight:900;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2);min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .choice:active{transform:scale(.95)}
    .choice.correct{background:#c8e6c9 !important;animation:glowPulse .7s 2;border:3px solid #43a047}
    .choice.wrong{background:#ffcdd2 !important;border:3px solid #e53935}
    .emoji{font-size:46px;line-height:1;margin-bottom:6px}
    .name{font-size:24px;line-height:1.1}

    .result{font-size:32px;text-align:center;font-weight:900;height:50px}
    .ok{color:var(--ok)} .ng{color:var(--ng)}

    .footer{text-align:center;font-weight:900;font-size:18px;color:#e65100;animation:blink 1s infinite}

    .start{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:10}
    .startbox{text-align:center;padding:20px}
    .title{font-size:38px;font-weight:900;color:#ef6c00}
    .sub{font-size:22px;margin:10px 0}
    .startbtn{font-size:28px;padding:12px 20px;border:none;border-radius:999px;background:#ff9800;color:#fff;font-weight:900}

    .end{position:fixed;inset:0;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center}
    .endbox{background:#fff;padding:20px;border-radius:20px;text-align:center;min-width:260px}
    .endbox button{margin-top:12px;font-size:22px;padding:10px 18px;border:none;border-radius:999px;background:#ff9800;color:#fff;font-weight:900}
  </style>
</head>
<body>

<div class="start" id="start">
  <div class="startbox">
    <div class="title">3秒でわかる？🔥</div>
    <div class="sub">どうぶつクイズ</div>
    <div class="sub">👇コメントにゲームあるよ👇</div>
    <button class="startbtn" onclick="startGame()">スタート</button>
  </div>
</div>

<div class="app">
  <div class="hook">👇コメントにURLあるよ👇</div>

  <div class="top box">
    <div>3秒クイズ</div>
    <div>せいかい <span id="score">0</span></div>
  </div>

  <div class="count" id="count">3</div>

  <div class="question box" id="q">いぬはどれ？</div>

  <div class="grid" id="grid"></div>

  <div class="result" id="res"></div>

  <div class="footer">👇コメントからあそべる👇</div>
</div>

<div class="end" id="end">
  <div class="endbox">
    <h2>おしまい！</h2>
    <div id="final"></div>
    <div style="margin-top:8px;font-weight:900;color:#e65100;">👇コメントからあそべる👇</div>
    <button onclick="restart()">もういっかい</button>
  </div>
</div>

<script>
const data = [
  { name:"いぬ", emoji:"🐶" },
  { name:"ねこ", emoji:"🐱" },
  { name:"ぞう", emoji:"🐘" },
  { name:"うさぎ", emoji:"🐰" },
  { name:"くま", emoji:"🐻" },
  { name:"ぱんだ", emoji:"🐼" },
  { name:"とら", emoji:"🐯" },
  { name:"さる", emoji:"🐵" },
  { name:"きりん", emoji:"🦒" },
  { name:"らいおん", emoji:"🦁" },
  { name:"こあら", emoji:"🐨" },
  { name:"ぺんぎん", emoji:"🐧" },
  { name:"きつね", emoji:"🦊" },
  { name:"ぶた", emoji:"🐷" },
  { name:"ひよこ", emoji:"🐥" },
  { name:"かえる", emoji:"🐸" }
];

let score = 0;
let q = 0;
let ans, choices, timer, t = 3, lock = false;

function rand() {
  return [...data].sort(() => Math.random() - 0.5).slice(0, 4);
}

function next() {
  if (q >= 10) {
    end();
    return;
  }

  lock = false;
  document.getElementById('res').textContent = '';
  document.getElementById('res').className = 'result';

  choices = rand();
  ans = choices[Math.floor(Math.random() * 4)];
  document.getElementById('q').textContent = ans.name + 'はどれ？';

  draw();
  countdown();
}

function draw() {
  const g = document.getElementById('grid');
  g.innerHTML = '';

  choices.forEach(c => {
    const b = document.createElement('button');
    b.className = 'choice';
    b.innerHTML = `<div class="emoji">${c.emoji}</div><div class="name">${c.name}</div>`;
    b.onclick = () => click(c, b);
    g.appendChild(b);
  });
}

function countdown() {
  clearInterval(timer);
  t = 3;
  document.getElementById('count').textContent = t;

  timer = setInterval(() => {
    t--;
    document.getElementById('count').textContent = t;
    if (t === 0) {
      clearInterval(timer);
      timeout();
    }
  }, 1000);
}

function lightCorrectChoice() {
  const buttons = document.querySelectorAll('.choice');
  buttons.forEach((btn, i) => {
    if (choices[i].name === ans.name) {
      btn.classList.add('correct');
    }
  });
}

function click(c, b) {
  if (lock) return;
  lock = true;
  clearInterval(timer);

  if (c.name === ans.name) {
    b.classList.add('correct');
    document.getElementById('res').textContent = 'せいかい！';
    document.getElementById('res').className = 'result ok';
    score++;
    document.getElementById('score').textContent = score;
  } else {
    b.classList.add('wrong');
    lightCorrectChoice();
    document.getElementById('res').textContent = 'ざんねん！';
    document.getElementById('res').className = 'result ng';
  }

  q++;
  setTimeout(next, 1000);
}

function timeout() {
  if (lock) return;
  lock = true;
  lightCorrectChoice();
  document.getElementById('res').textContent = 'じかんぎれ！';
  document.getElementById('res').className = 'result ng';
  q++;
  setTimeout(next, 1000);
}

function end() {
  document.getElementById('final').textContent = 'せいかい ' + score + '/10';
  document.getElementById('end').style.display = 'flex';
}

function startGame() {
  document.getElementById('start').style.display = 'none';
  score = 0;
  q = 0;
  document.getElementById('score').textContent = 0;
  next();
}

function restart() {
  document.getElementById('end').style.display = 'none';
  startGame();
}
</script>

</body>
</html>
