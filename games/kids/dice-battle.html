<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>3秒バトルゲーム</title>
  <style>
    :root{
      --bg1:#fff7e8;
      --bg2:#eaf7ff;
      --text:#333;
      --shadow:0 10px 30px rgba(0,0,0,.12);
      --radius:22px;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    body{
      margin:0;
      font-family: "Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, #fff0c9 0%, transparent 30%),
        radial-gradient(circle at top right, #dff1ff 0%, transparent 35%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:stretch;
    }

    .app{
      width:100%;
      max-width:420px;
      min-height:100vh;
      padding:10px 10px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      margin:0 auto;
    }

    .panel{
      background:rgba(255,255,255,0.84);
      backdrop-filter: blur(4px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
    }

    .title{
      text-align:center;
      font-size:clamp(26px, 6vw, 34px);
      font-weight:900;
      line-height:1.15;
      margin:4px 0;
      color:#ff7b00;
      text-shadow:0 2px 0 #fff;
    }

    .subtitle{
      text-align:center;
      font-size:14px;
      font-weight:700;
      color:#666;
      margin-top:4px;
    }

    .big-btn, .small-btn{
      border:none;
      border-radius:999px;
      font-weight:900;
      cursor:pointer;
      box-shadow:var(--shadow);
      transition:transform .08s ease;
    }

    .big-btn:active, .small-btn:active{ transform:scale(.98); }

    .big-btn{
      width:100%;
      padding:12px 14px;
      font-size:20px;
      color:#fff;
      background:linear-gradient(180deg, #ffb347, #ff7b00);
    }

    .small-btn{
      padding:9px 12px;
      font-size:15px;
      color:#fff;
      background:linear-gradient(180deg, #70b7ff, #3d8cff);
      flex:1;
    }

    .hidden{ display:none !important; }

    .screen{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .pick-grid{
      display:grid;
      grid-template-columns:repeat(2, 1fr);
      gap:8px;
    }

    .char-card{
      background:#fff;
      border-radius:18px;
      padding:8px;
      box-shadow:var(--shadow);
      border:3px solid transparent;
      cursor:pointer;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      min-height:170px;
      position:relative;
      overflow:hidden;
    }

    .char-card.selected{
      border-color:#ff9d00;
      transform:translateY(-1px);
    }

    .char-card .swatch{
      position:absolute;
      inset:0 auto auto 0;
      width:100%;
      height:8px;
    }

    .char-name{
      font-size:18px;
      font-weight:900;
      line-height:1.1;
      text-align:center;
    }

    .char-power{
      font-size:19px;
      font-weight:900;
      color:#444;
      background:#fff7df;
      border-radius:999px;
      padding:4px 10px;
    }

    .char-thumb-wrap{
      width:68px;
      height:68px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .char-thumb{
      width:68px;
      height:68px;
      object-fit:contain;
      border-radius:18px;
      background:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      display:block;
    }

    .char-thumb-fallback{
      font-size:50px;
      display:none;
    }

    .battle-head{
      text-align:center;
      font-weight:900;
      font-size:28px;
      color:#ff7b00;
      text-shadow:0 2px 0 #fff;
    }

    .vs-wrap{
      display:grid;
      grid-template-columns:1fr;
      gap:8px;
    }

    .fighter{
      background:#fff;
      border-radius:18px;
      padding:10px;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:center;
      text-align:center;
      overflow:hidden;
    }

    .fighter .label{
      font-size:15px;
      font-weight:900;
      color:#666;
    }

    .fighter .name{
      font-size:21px;
      font-weight:900;
      line-height:1.1;
    }

    .fighter .power{
      font-size:19px;
      font-weight:900;
      background:#f7f7f7;
      border-radius:999px;
      padding:4px 10px;
    }

    .fighter .token{
      width:min(74vw, 240px);
      max-width:100%;
      max-height:28vh;
      object-fit:contain;
      border-radius:18px;
      display:block;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      background:#fff;
    }

    .fighter .emoji-fallback{
      font-size:72px;
      line-height:1;
      padding:8px 0;
      display:none;
    }

    .mid-box{
      text-align:center;
      background:#fff;
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:12px 8px;
    }

    .count{
      font-size:48px;
      font-weight:900;
      line-height:1;
      color:#ff7b00;
      min-height:56px;
    }

    .message{
      font-size:21px;
      font-weight:900;
      min-height:32px;
    }

    .submsg{
      font-size:15px;
      color:#666;
      font-weight:700;
      min-height:22px;
    }

    .dice-area{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:6px;
      margin-top:6px;
    }

    .dice-box{
      background:#fff;
      border-radius:14px;
      padding:8px 6px;
      box-shadow:var(--shadow);
      text-align:center;
    }

    .dice-title{
      font-size:13px;
      font-weight:900;
      color:#666;
      margin-bottom:4px;
    }

    .dice-rolls{
      font-size:15px;
      font-weight:900;
      min-height:22px;
      letter-spacing:0.5px;
      line-height:1.2;
    }

    .dice-total{
      font-size:18px;
      font-weight:900;
      color:#333;
      margin-top:2px;
      line-height:1.1;
    }

    .result-banner{
      font-size:26px;
      font-weight:900;
      text-align:center;
      padding:10px;
      border-radius:20px;
      color:#fff;
      box-shadow:var(--shadow);
    }

    .result-win{ background:linear-gradient(180deg,#ffcf4d,#ff9a00); }
    .result-lose{ background:linear-gradient(180deg,#7fb7ff,#4f86ff); }
    .result-draw{ background:linear-gradient(180deg,#8ee08e,#56b856); }

    .actions{
      display:flex;
      gap:8px;
    }

    .foot-note{
      text-align:center;
      font-size:12px;
      color:#666;
      font-weight:700;
    }

    .hero-vs{
      background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.84));
      border-radius:24px;
      box-shadow:var(--shadow);
      padding:10px 8px 12px;
      overflow:hidden;
    }

    .hero-title{
      text-align:center;
      font-size:clamp(28px, 8vw, 42px);
      line-height:1.08;
      font-weight:900;
      color:#ff6f00;
      text-shadow:0 2px 0 #fff;
      margin-bottom:6px;
    }

    .hero-sub{
      text-align:center;
      font-size:clamp(17px, 5vw, 22px);
      font-weight:900;
      color:#5a5a5a;
      margin-bottom:8px;
    }

    /* ここをスマホでも常に横並び固定 */
    .hero-vs-grid{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
      align-items:center;
      gap:4px;
    }

    .hero-char{
      min-width:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
    }

    .hero-img{
      width:100%;
      max-width:90px;
      aspect-ratio:1/1.12;
      object-fit:contain;
      border-radius:16px;
      background:#fff;
      box-shadow:0 8px 18px rgba(0,0,0,.10);
    }

    .hero-emoji{
      font-size:56px;
      display:none;
      line-height:1;
      padding:8px 0;
    }

    .hero-name{
      font-size:clamp(14px,4vw,20px);
      font-weight:900;
      text-align:center;
      line-height:1.05;
      word-break:keep-all;
    }

    .hero-power{
      font-size:clamp(16px,4.2vw,24px);
      font-weight:900;
      background:#fff7df;
      border-radius:999px;
      padding:4px 10px;
      white-space:nowrap;
    }

    .hero-vs-text{
      font-size:clamp(28px, 8vw, 48px);
      font-weight:900;
      color:#ff2d55;
      text-shadow:0 3px 0 #fff;
      padding:0 1px;
      line-height:1;
      white-space:nowrap;
    }

    .hero-actions{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:10px;
    }


    .result-screen{
      background:linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.86));
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:10px 8px 12px;
      text-align:center;
      overflow:hidden;
    }

    .result-icon{
      font-size:42px;
      line-height:1;
      margin-bottom:2px;
      animation:popBounce 0.7s ease;
    }

    .result-title{
      font-size:clamp(24px, 8vw, 34px);
      font-weight:900;
      line-height:1.05;
      margin-bottom:2px;
      color:#ff7b00;
      text-shadow:0 2px 0 #fff;
      animation:popBounce 0.7s ease;
    }

    .result-sub{
      font-size:clamp(16px, 4.6vw, 20px);
      font-weight:900;
      color:#555;
      margin-bottom:6px;
      line-height:1.1;
    }

    .result-char-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:4px;
      margin:4px 0 6px;
    }

    .result-char-img{
      width:min(58vw, 180px);
      max-width:100%;
      max-height:24vh;
      object-fit:contain;
      border-radius:16px;
      display:block;
      box-shadow:0 8px 18px rgba(0,0,0,.10);
      background:#fff;
      animation:popBounce 0.7s ease;
    }

    .result-char-emoji{
      font-size:64px;
      line-height:1;
      display:none;
      animation:popBounce 0.7s ease;
    }

    .result-char-name{
      font-size:clamp(18px, 5vw, 24px);
      font-weight:900;
      line-height:1.05;
    }

    .result-char-power{
      font-size:clamp(16px, 4.3vw, 22px);
      font-weight:900;
      background:#fff7df;
      border-radius:999px;
      padding:3px 10px;
      white-space:nowrap;
    }

    .result-total{
      font-size:clamp(18px, 4.8vw, 24px);
      font-weight:900;
      color:#333;
      margin:4px 0 6px;
      line-height:1.1;
    }


    .result-dice-summary{
      margin:4px auto 8px;
      max-width:320px;
    }

    .result-actions{
      display:flex;
      gap:8px;
      flex-direction:column;
      margin-top:6px;
    }

    @keyframes popBounce{
      0%{ transform:scale(.75); opacity:.3; }
      60%{ transform:scale(1.08); opacity:1; }
      100%{ transform:scale(1); opacity:1; }
    }



    @media (max-height: 700px){
      .app{
        padding:8px 8px 10px;
        gap:8px;
      }
      .result-screen{
        padding:8px 6px 10px;
      }
      .result-icon{
        font-size:34px;
        margin-bottom:0;
      }
      .result-title{
        font-size:22px;
        margin-bottom:0;
      }
      .result-sub{
        font-size:15px;
        margin-bottom:4px;
      }
      .result-char-wrap{
        margin:2px 0 4px;
        gap:3px;
      }
      .result-char-img{
        width:min(50vw, 145px);
        max-height:18vh;
      }
      .result-char-emoji{
        font-size:52px;
      }
      .result-char-name{
        font-size:17px;
      }
      .result-char-power{
        font-size:15px;
        padding:2px 8px;
      }
      .result-total{
        font-size:16px;
        margin:2px 0 4px;
      }
      .result-dice-summary{
        margin:2px auto 6px;
      }
      .dice-area{
        gap:5px;
      }
      .dice-box{
        padding:6px 4px;
      }
      .dice-title{
        font-size:12px;
        margin-bottom:2px;
      }
      .dice-rolls{
        font-size:14px;
        min-height:18px;
      }
      .dice-total{
        font-size:16px;
      }
      .result-actions{
        margin-top:4px;
        gap:6px;
      }
      .big-btn{
        padding:10px 12px;
        font-size:18px;
      }
      .small-btn{
        padding:8px 10px;
        font-size:14px;
      }
    }

    @media (min-width: 430px){
      .app{
        max-width:480px;
        padding:14px 14px 20px;
        gap:12px;
      }
      .char-card{
        min-height:190px;
        padding:10px;
      }
      .char-thumb-wrap,
      .char-thumb{
        width:78px;
        height:78px;
      }
      .char-name{ font-size:20px; }
      .char-power{ font-size:22px; padding:4px 12px; }
      .hero-vs{ padding:14px 12px 16px; }
      .hero-img{ max-width:118px; }
      .hero-emoji{ font-size:68px; }
      .hero-vs-text{ font-size:clamp(34px, 10vw, 58px); }
      .hero-actions{ flex-direction:row; gap:10px; }
  
    .result-dice-summary{
      margin:4px auto 8px;
      max-width:320px;
    }

    .result-actions{ flex-direction:row; gap:10px; }
      .result-char-img{ width:min(78vw, 280px); max-height:36vh; }
      .vs-wrap{
        grid-template-columns:1fr auto 1fr;
        align-items:stretch;
        gap:10px;
      }
      .mid-box{
        display:flex;
        flex-direction:column;
        justify-content:center;
        min-width:112px;
      }
      .fighter .token{
        width:min(78vw, 280px);
        max-height:32vh;
      }
      .fighter .name{ font-size:24px; }
      .fighter .power{ font-size:22px; padding:4px 14px; }
      .count{ font-size:56px; }
      .message{ font-size:24px; }
      .result-banner{ font-size:30px; }
      .big-btn{ font-size:22px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="screenTitle" class="screen">
      <div class="panel">
        <div class="title">3秒バトルゲーム</div>
        <div class="subtitle">キャラをえらんで CPU と たいせん！</div>
      </div>

      <div class="panel" style="text-align:center;">
        <div style="font-size:72px; line-height:1;">⚔️🎲✨</div>
        <div class="subtitle">どっちが かつか 3びょうで かんがえよう！</div>
      </div>

      <button id="startBtn" class="big-btn">スタート！</button>

      
    </section>

    <section id="screenPick" class="screen hidden">
      <div class="panel">
        <div class="title" style="font-size:30px;">キャラを えらんでね</div>
        <div class="subtitle">1たい えらぶと バトル できます</div>
      </div>

      <div class="pick-grid" id="pickGrid"></div>

      <button id="battleBtn" class="big-btn" disabled style="opacity:.55;">つぎへ！</button>
    </section>

    <section id="screenIntro" class="screen hidden">
      <div class="hero-vs">
        <div class="hero-title">どっちが かつ？</div>
        <div class="hero-sub">3びょうで かんがえて！</div>

        <div class="hero-vs-grid">
          <div class="hero-char">
            <img id="introPlayerImg" class="hero-img hidden" alt="あなたのキャラ">
            <div id="introPlayerEmoji" class="hero-emoji"></div>
            <div id="introPlayerName" class="hero-name"></div>
            <div id="introPlayerPower" class="hero-power"></div>
          </div>

          <div class="hero-vs-text">VS</div>

          <div class="hero-char">
            <img id="introCpuImg" class="hero-img hidden" alt="CPUのキャラ">
            <div id="introCpuEmoji" class="hero-emoji"></div>
            <div id="introCpuName" class="hero-name"></div>
            <div id="introCpuPower" class="hero-power"></div>
          </div>
        </div>

        <div class="hero-actions">
          <button id="goBattleBtn" class="big-btn">バトル スタート！</button>
          <button id="reselectBtn" class="small-btn">えらびなおす</button>
        </div>
      </div>
    </section>


    <section id="screenResult" class="screen hidden">
      <div class="result-screen">
        <div id="resultIcon" class="result-icon">✨</div>
        <div id="resultTitle" class="result-title">かった！</div>
        <div id="resultSub" class="result-sub">けっか はっぴょう！</div>

        <div class="result-char-wrap">
          <img id="resultPlayerImg" class="result-char-img hidden" alt="あなたのキャラ">
          <div id="resultPlayerEmoji" class="result-char-emoji"></div>
          <div id="resultPlayerName" class="result-char-name"></div>
          <div id="resultPlayerPower" class="result-char-power"></div>
        </div>

        <div id="resultTotal" class="result-total">あなたの けっか: 0</div>

        <div id="resultDiceSummary" class="result-dice-summary"></div>

        
        <div id="playGuide" style="
          font-size:14px;
          font-weight:900;
          margin-top:6px;
          color:#555;
          opacity:0;
          transition:0.3s;
        ">
          コメントらんに あそべるURLあるよ👇
        </div>

        <div class="result-actions">
    
          <button id="resultAgainBtn" class="big-btn">もういっかい</button>
          <button id="resultBackBtn" class="small-btn">えらびなおす</button>
        </div>
      </div>
    </section>

    <section id="screenBattle" class="screen hidden">
      <div class="battle-head">どっちが かつ？</div>

      <div class="vs-wrap">
        <div class="fighter">
          <div class="label">あなた</div>
          <img id="playerImg" class="token hidden" alt="あなたのキャラ">
          <div id="playerEmoji" class="emoji-fallback"></div>
          <div id="playerName" class="name"></div>
          <div id="playerPower" class="power"></div>
        </div>

        <div class="mid-box">
          <div id="countText" class="count">3</div>
          <div id="midMessage" class="message">よーい！</div>
          <div id="midSub" class="submsg">3びょうで かんがえて！</div>
        </div>

        <div class="fighter">
          <div class="label">CPU</div>
          <img id="cpuImg" class="token hidden" alt="CPUのキャラ">
          <div id="cpuEmoji" class="emoji-fallback"></div>
          <div id="cpuName" class="name"></div>
          <div id="cpuPower" class="power"></div>
        </div>
      </div>

      <div class="dice-area hidden" id="diceArea">
        <div class="dice-box">
          <div class="dice-title">あなた</div>
          <div id="playerRolls" class="dice-rolls">-</div>
          <div id="playerTotal" class="dice-total">0</div>
        </div>
        <div class="dice-box">
          <div class="dice-title">CPU</div>
          <div id="cpuRolls" class="dice-rolls">-</div>
          <div id="cpuTotal" class="dice-total">0</div>
        </div>
      </div>

    </section>
  </div>

  <script>
    const characters = [
      { id:"fire",     name:"ほのおまる", power:"1D+3", emoji:"🔥", color:"#ff7a00", bg:"#fff0e0", img:"dice-battle-char1.png" },
      { id:"water",    name:"みずぷに",   power:"2D",   emoji:"💧", color:"#4aa3ff", bg:"#e8f4ff", img:"dice-battle-char2.png" },
      { id:"forest",   name:"きりころ",   power:"1D+2", emoji:"🌿", color:"#48b04d", bg:"#ecffe8", img:"dice-battle-char3.png" },
      { id:"shadow",   name:"かげぴん",   power:"1D+4", emoji:"🌙", color:"#8c56d8", bg:"#f4eaff", img:"dice-battle-char4.png" },
      { id:"electric", name:"びりびりん", power:"2D-1", emoji:"⚡", color:"#ffb400", bg:"#fff7da", img:"dice-battle-char5.png" },
      { id:"angel",    name:"てんしるん", power:"2D",   emoji:"✨", color:"#69bfff", bg:"#eef9ff", img:"dice-battle-char6.png" }
    ];

    let selectedChar = null;
    let cpuChar = null;
    let battleLocked = false;
    const imageOk = {};

    const screenTitle  = document.getElementById("screenTitle");
    const screenPick   = document.getElementById("screenPick");
    const screenIntro  = document.getElementById("screenIntro");
    const screenResult = document.getElementById("screenResult");
    const screenBattle = document.getElementById("screenBattle");

    const pickGrid = document.getElementById("pickGrid");
    const startBtn = document.getElementById("startBtn");
    const battleBtn = document.getElementById("battleBtn");
    const goBattleBtn = document.getElementById("goBattleBtn");
    const reselectBtn = document.getElementById("reselectBtn");

    const playerImg = document.getElementById("playerImg");
    const cpuImg = document.getElementById("cpuImg");
    const playerEmoji = document.getElementById("playerEmoji");
    const cpuEmoji = document.getElementById("cpuEmoji");
    const playerName = document.getElementById("playerName");
    const cpuName = document.getElementById("cpuName");
    const playerPower = document.getElementById("playerPower");
    const cpuPower = document.getElementById("cpuPower");

    const introPlayerImg = document.getElementById("introPlayerImg");
    const introCpuImg = document.getElementById("introCpuImg");
    const introPlayerEmoji = document.getElementById("introPlayerEmoji");
    const introCpuEmoji = document.getElementById("introCpuEmoji");
    const introPlayerName = document.getElementById("introPlayerName");
    const introCpuName = document.getElementById("introCpuName");
    const introPlayerPower = document.getElementById("introPlayerPower");
    const introCpuPower = document.getElementById("introCpuPower");

    const resultPlayerImg = document.getElementById("resultPlayerImg");
    const resultPlayerEmoji = document.getElementById("resultPlayerEmoji");
    const resultPlayerName = document.getElementById("resultPlayerName");
    const resultPlayerPower = document.getElementById("resultPlayerPower");
    const resultIcon = document.getElementById("resultIcon");
    const resultTitle = document.getElementById("resultTitle");
    const resultSub = document.getElementById("resultSub");
    const resultTotal = document.getElementById("resultTotal");
    const resultDiceSummary = document.getElementById("resultDiceSummary");
    const resultAgainBtn = document.getElementById("resultAgainBtn");
    const resultBackBtn = document.getElementById("resultBackBtn");

    const countText = document.getElementById("countText");
    const midMessage = document.getElementById("midMessage");
    const midSub = document.getElementById("midSub");

    const diceArea = document.getElementById("diceArea");
    const playerRolls = document.getElementById("playerRolls");
    const cpuRolls = document.getElementById("cpuRolls");
    const playerTotal = document.getElementById("playerTotal");
    const cpuTotal = document.getElementById("cpuTotal");


    function showScreen(name){
      screenTitle.classList.add("hidden");
      screenPick.classList.add("hidden");
      screenIntro.classList.add("hidden");
      screenResult.classList.add("hidden");
      screenBattle.classList.add("hidden");
      if(name === "title") screenTitle.classList.remove("hidden");
      if(name === "pick") screenPick.classList.remove("hidden");
      if(name === "intro") screenIntro.classList.remove("hidden");
      if(name === "result") screenResult.classList.remove("hidden");
      if(name === "battle") screenBattle.classList.remove("hidden");
    }

    function checkOneImage(src){
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
      });
    }

    async function preloadImages(){
      for(const char of characters){
        imageOk[char.id] = await checkOneImage(char.img);
      }
    }

    function buildPickGrid(){
      pickGrid.innerHTML = "";
      characters.forEach(char => {
        const card = document.createElement("button");
        card.className = "char-card";
        card.type = "button";
        card.dataset.id = char.id;
        card.style.background = char.bg;
        card.innerHTML = `
          <div class="swatch" style="background:${char.color};"></div>
          <div class="char-thumb-wrap">
            <img class="char-thumb hidden" alt="${char.name}">
            <div class="char-thumb-fallback">${char.emoji}</div>
          </div>
          <div class="char-name">${char.name}</div>
          <div class="char-power">${char.power}</div>
        `;
        const img = card.querySelector(".char-thumb");
        const fallback = card.querySelector(".char-thumb-fallback");

        if(imageOk[char.id]){
          img.src = char.img;
          img.classList.remove("hidden");
          fallback.style.display = "none";
        } else {
          img.classList.add("hidden");
          fallback.style.display = "block";
        }

        card.addEventListener("click", () => selectCharacter(char.id));
        pickGrid.appendChild(card);
      });
    }

    function selectCharacter(id){
      selectedChar = characters.find(c => c.id === id);
      [...pickGrid.children].forEach(el => {
        el.classList.toggle("selected", el.dataset.id === id);
      });
      battleBtn.disabled = false;
      battleBtn.style.opacity = "1";
    }

    function randomCpu(){
      const idx = Math.floor(Math.random() * characters.length);
      return characters[idx];
    }

    function setVisual(imgEl, emojiEl, char){
      if(imageOk[char.id]){
        imgEl.src = char.img;
        imgEl.classList.remove("hidden");
        emojiEl.style.display = "none";
      } else {
        imgEl.classList.add("hidden");
        emojiEl.style.display = "block";
        emojiEl.textContent = char.emoji;
      }
    }

    function setIntroView(){
      introPlayerName.textContent = selectedChar.name;
      introPlayerPower.textContent = selectedChar.power;
      introCpuName.textContent = cpuChar.name;
      introCpuPower.textContent = cpuChar.power;
      setVisual(introPlayerImg, introPlayerEmoji, selectedChar);
      setVisual(introCpuImg, introCpuEmoji, cpuChar);
    }

    function setBattleView(){
      playerName.textContent = selectedChar.name;
      playerPower.textContent = selectedChar.power;
      cpuName.textContent = cpuChar.name;
      cpuPower.textContent = cpuChar.power;

      setVisual(playerImg, playerEmoji, selectedChar);
      setVisual(cpuImg, cpuEmoji, cpuChar);

      countText.textContent = "3";
      midMessage.textContent = "よーい！";
      midSub.textContent = "3びょうで かんがえて！";

      diceArea.classList.add("hidden");

      playerRolls.textContent = "-";
      cpuRolls.textContent = "-";
      playerTotal.textContent = "0";
      cpuTotal.textContent = "0";
    }


    function setResultView(kind, playerResult, cpuResult){
      resultPlayerName.textContent = selectedChar.name;
      resultPlayerPower.textContent = selectedChar.power;
      resultTotal.textContent = `あなたの けっか: ${playerResult.total}`;
      setVisual(resultPlayerImg, resultPlayerEmoji, selectedChar);

      resultDiceSummary.innerHTML = `
        <div class="dice-area">
          <div class="dice-box">
            <div class="dice-title">あなた</div>
            <div class="dice-rolls">${playerResult.rolls.join(" + ")}</div>
            <div class="dice-total">${playerResult.total}</div>
          </div>
          <div class="dice-box">
            <div class="dice-title">CPU</div>
            <div class="dice-rolls">${cpuResult.rolls.join(" + ")}</div>
            <div class="dice-total">${cpuResult.total}</div>
          </div>
        </div>
      `;

      if(kind === "win"){
        resultIcon.textContent = "✨";
        resultTitle.textContent = "かった！";
        resultSub.textContent = "あなたの かち！";
        resultTitle.style.color = "#ff7b00";
      } else if(kind === "lose"){
        resultIcon.textContent = "😢";
        resultTitle.textContent = "ざんねん！";
        resultSub.textContent = "つぎは がんばろう！";
        resultTitle.style.color = "#4f86ff";
      } else {
        resultIcon.textContent = "🤝";
        resultTitle.textContent = "ひきわけ！";
        resultSub.textContent = "もういっかい！";
        resultTitle.style.color = "#49a449";
      }
    }

    function prepareIntro(){
      if(!selectedChar) return;
      cpuChar = randomCpu();
      setIntroView();
      showScreen("intro");
    }

    function d6(){
      return 1 + Math.floor(Math.random() * 6);
    }

    function rollByPower(power){
      let rolls = [];
      let total = 0;

      if(power === "1D+3"){
        const r = d6();
        rolls = [r];
        total = r + 3;
      } else if(power === "2D"){
        const r1 = d6(), r2 = d6();
        rolls = [r1, r2];
        total = r1 + r2;
      } else if(power === "1D+2"){
        const r = d6();
        rolls = [r];
        total = r + 2;
      } else if(power === "1D+4"){
        const r = d6();
        rolls = [r];
        total = r + 4;
      } else if(power === "2D-1"){
        const r1 = d6(), r2 = d6();
        rolls = [r1, r2];
        total = r1 + r2 - 1;
      } else {
        const r = d6();
        rolls = [r];
        total = r;
      }

      return { rolls, total };
    }

    function wait(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function startBattle(){
      if(battleLocked || !selectedChar || !cpuChar) return;
      battleLocked = true;

      showScreen("battle");
      setBattleView();

      const counts = ["3", "2", "1"];
      for(const c of counts){
        countText.textContent = c;
        midMessage.textContent = "どっちが かつ？";
        midSub.textContent = "よーく みてね！";
        await wait(850);
      }

      countText.textContent = "🎲";
      midMessage.textContent = "バトル！";
      midSub.textContent = "ダイス ころころ…";
      diceArea.classList.remove("hidden");

      for(let i=0;i<7;i++){
        const a = d6();
        const b = d6();
        const c = d6();
        const d = d6();
        playerRolls.textContent = `${a} ${b}`;
        cpuRolls.textContent = `${c} ${d}`;
        playerTotal.textContent = "?";
        cpuTotal.textContent = "?";
        await wait(110);
      }

      const p = rollByPower(selectedChar.power);
      const c = rollByPower(cpuChar.power);

      playerRolls.textContent = p.rolls.join(" + ");
      cpuRolls.textContent = c.rolls.join(" + ");
      playerTotal.textContent = p.total;
      cpuTotal.textContent = c.total;

      countText.textContent = "✨";
      midSub.textContent = "けっか はっぴょう！";

      await wait(500);

      if(p.total > c.total){
        setResultView("win", p, c);
      } else if(p.total < c.total){
        setResultView("lose", p, c);
      } else {
        setResultView("draw", p, c);
      }

      showScreen("result");
      setTimeout(() => {
        const el = document.getElementById("playGuide");
        if(el) el.style.opacity = 1;
      }, 800);
      battleLocked = false;
    }

    function resetToPick(){
      showScreen("pick");
    }

    function replaySameChar(){
      if(!selectedChar) return;
      prepareIntro();
    }

    startBtn.addEventListener("click", () => {
      selectedChar = characters[Math.floor(Math.random()*characters.length)];
      cpuChar = randomCpu();
      setIntroView();
      showScreen("intro");
    });
    battleBtn.addEventListener("click", prepareIntro);
    goBattleBtn.addEventListener("click", startBattle);
    reselectBtn.addEventListener("click", resetToPick);
    resultAgainBtn.addEventListener("click", replaySameChar);
    resultBackBtn.addEventListener("click", resetToPick);

    (async function init(){
      await preloadImages();
      buildPickGrid();
      selectedChar = characters[Math.floor(Math.random()*characters.length)];
      cpuChar = randomCpu();
      setIntroView();
      showScreen("intro");
    })();
  </script>
</body>
</html>
