<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>どうぶつ どれかな？</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  text-align: center;
  background: #f0f8ff;
}

h1 { color: #ff6b6b; }

#question {
  font-size: 32px;
  font-weight: bold;
  margin: 10px;
}

#message {
  font-size: 26px;
  height: 40px;
}

#score {
  font-size: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  border-radius: 15px;
  padding: 10px;
  font-size: 20px;
}

.emoji {
  font-size: 50px;
}

.correct { background: #c8f7c5; }
.wrong { background: #ffcdd2; }
</style>
</head>

<body>

<h1>どうぶつ どれかな？</h1>
<div id="question"></div>
<div id="message"></div>
<div id="score"></div>

<div id="grid" class="grid"></div>

<script>
const animals = [
  { name: "いぬ", emoji: "🐶" },
  { name: "ねこ", emoji: "🐱" },
  { name: "うさぎ", emoji: "🐰" },
  { name: "ぞう", emoji: "🐘" },
  { name: "きりん", emoji: "🦒" },
  { name: "さる", emoji: "🐵" },
  { name: "くま", emoji: "🐻" },
  { name: "ぶた", emoji: "🐷" },
  { name: "とり", emoji: "🐤" },
  { name: "ライオン", emoji: "🦁" },
  { name: "とら", emoji: "🐯" },
  { name: "かえる", emoji: "🐸" },
  { name: "さかな", emoji: "🐟" },
  { name: "ぱんだ", emoji: "🐼" },
  { name: "こあら", emoji: "🐨" },

  { name: "ひつじ", emoji: "🐑" },
  { name: "うし", emoji: "🐮" },
  { name: "やぎ", emoji: "🐐" },
  { name: "うま", emoji: "🐴" },
  { name: "にわとり", emoji: "🐔" },
  { name: "あひる", emoji: "🦆" },
  { name: "ふくろう", emoji: "🦉" },
  { name: "こうもり", emoji: "🦇" },
  { name: "ねずみ", emoji: "🐭" },
  { name: "りす", emoji: "🐿️" },
  { name: "かめ", emoji: "🐢" },
  { name: "わに", emoji: "🐊" },
  { name: "たこ", emoji: "🐙" },
  { name: "えび", emoji: "🦐" },
  { name: "かに", emoji: "🦀" }
];

const grid = document.getElementById("grid");
const questionEl = document.getElementById("question");
const messageEl = document.getElementById("message");
const scoreEl = document.getElementById("score");

let correctAnimal;
let total = 0;
let correct = 0;
let lock = false;

function shuffle(arr) {
  return arr.sort(() => Math.random() - 0.5);
}

function next() {
  lock = false;
  messageEl.textContent = "";
  grid.innerHTML = "";

  const choices = shuffle([...animals]).slice(0, 9);
  correctAnimal = choices[Math.floor(Math.random() * 9)];

  questionEl.textContent = correctAnimal.name + " は どれ？";

  choices.forEach(a => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<div class="emoji">${a.emoji}</div>${a.name}`;

    div.onclick = () => {
      if (lock) return;
      lock = true;

      if (a.name === correctAnimal.name) {
        correct++;
        total++;
        div.classList.add("correct");
        messageEl.style.color = "green";
        messageEl.textContent = "せいかい！";
      } else {
        total++;
        div.classList.add("wrong");
        messageEl.style.color = "red";
        messageEl.textContent = "まちがい　" + a.name;
      }

      update();
      setTimeout(next, 1000);
    };

    grid.appendChild(div);
  });
}

function update() {
  scoreEl.textContent = "せいかい " + correct + " / " + total;
}

update();
next();
</script>

</body>
</html>
