<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>3秒サバイバー V2</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// 定数・チューニング
// ============================================================
const CW = 360, CH = 640;

const CONFIGS = {
  3:  { label: '3秒', dur: 3,  enemySpeed: 88,  waveMulti: 1.0 },
  5:  { label: '5秒', dur: 5,  enemySpeed: 78,  waveMulti: 1.3 },
  10: { label: '10秒', dur: 10, enemySpeed: 70,  waveMulti: 1.8 },
};

const WEAPONS = {
  bullet: {
    id: 'bullet', name: 'ショット', desc: '速い弾を一直線に',
    icon: '⊙', color: '#ffe066',
    interval: 0.28, fn: shootBullet,
  },
  spread: {
    id: 'spread', name: 'スプレッド', desc: '3方向に同時発射',
    icon: '⊛', color: '#44ffaa',
    interval: 0.42, fn: shootSpread,
  },
  laser: {
    id: 'laser', name: 'レーザー', desc: '貫通する光線',
    icon: '▶', color: '#ff44ff',
    interval: 0.55, fn: shootLaser,
  },
  bomb: {
    id: 'bomb', name: 'ボム', desc: '爆発で範囲ダメージ',
    icon: '◉', color: '#ff7722',
    interval: 0.8, fn: shootBomb,
  },
};

const PLAYER_SPEED = 190, PLAYER_HP = 3, PLAYER_R = 14, HIT_R = 9;
const BULLET_SPEED = 430;

// 敵ウェーブテンプレート（倍率で調整）
function buildWaves(mul) {
  return [
    [0.0,  Math.round(5*mul),  'normal'],
    [0.5,  Math.round(4*mul),  'normal'],
    [0.9,  Math.round(3*mul),  'fast'],
    [1.4,  Math.round(6*mul),  'normal'],
    [1.9,  Math.round(4*mul),  'tank'],
    [2.3,  Math.round(8*mul),  'normal'],
    [2.7,  Math.round(4*mul),  'fast'],
    [3.5,  Math.round(10*mul), 'normal'],
    [4.2,  Math.round(6*mul),  'fast'],
    [5.0,  Math.round(12*mul), 'normal'],
    [6.0,  Math.round(8*mul),  'tank'],
    [7.0,  Math.round(14*mul), 'normal'],
    [8.5,  Math.round(6*mul),  'fast'],
    [9.0,  Math.round(20*mul), 'normal'],
  ];
}

const ENEMY_TYPES = {
  normal: { speed: 1.0, hp: 1, r: 13, color: '#f44', outlineColor: 'rgba(255,80,80,0.5)', score: 1 },
  fast:   { speed: 2.2, hp: 1, r: 9,  color: '#ff0', outlineColor: 'rgba(255,240,0,0.5)',  score: 2 },
  tank:   { speed: 0.5, hp: 3, r: 20, color: '#a44', outlineColor: 'rgba(200,40,40,0.5)',  score: 5 },
};

// ============================================================
// Canvas
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let scale = 1;

function resize() {
  const s = Math.min(window.innerWidth / CW, window.innerHeight / CH);
  scale = s;
  canvas.width  = CW; canvas.height = CH;
  canvas.style.width  = (CW * s) + 'px';
  canvas.style.height = (CH * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// Web Audio SE
// ============================================================
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol=0.15, endFreq=null) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type; osc.frequency.value = freq;
    if (endFreq) osc.frequency.linearRampToValueAtTime(endFreq, ac.currentTime + dur);
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
function seShoot()   { playTone(880, 'square', 0.06, 0.08, 440); }
function seHit()     { playTone(200, 'sawtooth', 0.15, 0.2, 80); }
function seKill()    { playTone(660, 'sine', 0.12, 0.1, 880); }
function seClear()   {
  [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f,'sine',0.25,0.18), i*80));
}
function seGameOver(){ playTone(200, 'sawtooth', 0.6, 0.2, 50); }
function seLaser()   { playTone(1200, 'sawtooth', 0.18, 0.1, 200); }
function seBomb()    { playTone(120, 'sawtooth', 0.3, 0.25, 40); }

// ============================================================
// 状態
// ============================================================
const S = { TITLE:'title', WEAPON:'weapon', COUNTDOWN:'countdown', PLAY:'play', CLEAR:'clear', OVER:'over' };
let state = S.TITLE;

let player, enemies, bullets, effects, lasers;
let gameTime, elapsed, shootTimer, waveIndex, waves;
let killCount, hp, score;
let lastTime = 0;
let countdownVal;
let keys = {};
let selectedWeapon = 'bullet';
let selectedDur = 3;
let activeConfig, activeWeapon;

// タッチ仮想スティック
let stick = { active: false, baseX: 0, baseY: 0, dx: 0, dy: 0, id: null };

// ============================================================
// 入力
// ============================================================
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === S.TITLE && (e.key === 'Enter' || e.key === ' ')) goWeaponSelect();
  if ((state === S.CLEAR || state === S.OVER) && (e.key === 'Enter' || e.key === ' ')) goWeaponSelect();
});
window.addEventListener('keyup', e => keys[e.key] = false);

canvas.addEventListener('pointerdown', e => {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) / scale;
  const y = (e.clientY - r.top) / scale;

  if (state === S.TITLE)   { goWeaponSelect(); return; }
  if (state === S.CLEAR || state === S.OVER) { goWeaponSelect(); return; }

  if (state === S.WEAPON) {
    handleWeaponClick(x, y);
    return;
  }

  if (state === S.PLAY) {
    stick.active = true;
    stick.baseX = x; stick.baseY = y;
    stick.dx = 0; stick.dy = 0;
    stick.id = e.pointerId;
    canvas.setPointerCapture(e.pointerId);
  }
});

canvas.addEventListener('pointermove', e => {
  if (state !== S.PLAY || !stick.active || e.pointerId !== stick.id) return;
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) / scale;
  const y = (e.clientY - r.top) / scale;
  const maxR = 50;
  let dx = x - stick.baseX, dy = y - stick.baseY;
  const len = Math.hypot(dx, dy);
  if (len > maxR) { dx = dx/len*maxR; dy = dy/len*maxR; }
  stick.dx = dx / maxR; stick.dy = dy / maxR;
});

canvas.addEventListener('pointerup', e => {
  if (e.pointerId === stick.id) { stick.active = false; stick.dx = 0; stick.dy = 0; }
});

// ============================================================
// 武器選択
// ============================================================
const WEAPON_KEYS = Object.keys(WEAPONS);
const DUR_KEYS = [3, 5, 10];

function handleWeaponClick(x, y) {
  // 武器ボタン（描画: bx=20+col*165, by=100+row*100, w=150, h=88）
  WEAPON_KEYS.forEach((k, i) => {
    const col = i % 2, row = Math.floor(i / 2);
    const bx = 20 + col * 165, by = 100 + row * 100;
    if (x >= bx && x <= bx+150 && y >= by && y <= by+88) { selectedWeapon = k; }
  });
  // 時間ボタン（描画: bx=20+i*108, by=345, w=96, h=40）
  DUR_KEYS.forEach((d, i) => {
    const bx = 20 + i * 108, by = 345;
    if (x >= bx && x <= bx+96 && y >= by && y <= by+40) { selectedDur = d; }
  });
  // スタートボタン（描画: x=60, y=405, w=240, h=54）
  if (x >= 60 && x <= 300 && y >= 405 && y <= 459) { startCountdown(); }
}

// ============================================================
// 武器関数
// ============================================================
function shootBullet() {
  const t = nearestEnemy();
  if (!t) return;
  const a = Math.atan2(t.y - player.y, t.x - player.x);
  addBullet(a, BULLET_SPEED, 5, WEAPONS.bullet.color, 1);
  seShoot();
}

function shootSpread() {
  const t = nearestEnemy();
  if (!t) return;
  const base = Math.atan2(t.y - player.y, t.x - player.x);
  [-0.35, 0, 0.35].forEach(off => addBullet(base + off, BULLET_SPEED * 0.9, 4, WEAPONS.spread.color, 1));
  seShoot();
}

function shootLaser() {
  const t = nearestEnemy();
  if (!t) return;
  const a = Math.atan2(t.y - player.y, t.x - player.x);
  lasers.push({ x: player.x, y: player.y, angle: a, life: 1, maxLife: 0.22, hit: new Set() });
  seLaser();
}

function shootBomb() {
  const t = nearestEnemy();
  if (!t) return;
  const a = Math.atan2(t.y - player.y, t.x - player.x);
  addBullet(a, BULLET_SPEED * 0.7, 8, WEAPONS.bomb.color, 1, true);
  seShoot();
}

function addBullet(angle, speed, r, color, dmg, isBomb=false) {
  bullets.push({ x: player.x, y: player.y,
    vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
    r, color, dmg, isBomb, life: 1 });
}

function nearestEnemy() {
  let closest = null, minD = Infinity;
  for (const e of enemies) {
    const d = Math.hypot(e.x - player.x, e.y - player.y);
    if (d < minD) { minD = d; closest = e; }
  }
  return closest;
}

// ============================================================
// 初期化 / 状態遷移
// ============================================================
function goWeaponSelect() { state = S.WEAPON; }

function startCountdown() {
  activeConfig = CONFIGS[selectedDur];
  activeWeapon = WEAPONS[selectedWeapon];
  waves = buildWaves(activeConfig.waveMulti);
  initGame();
  state = S.COUNTDOWN;
  countdownVal = 3;
  elapsed = 0;
}

function initGame() {
  player = { x: CW/2, y: CH/2, r: PLAYER_R, hitR: HIT_R, invincible: 0, flashTimer: 0, angle: 0 };
  enemies = []; bullets = []; effects = []; lasers = [];
  gameTime = activeConfig.dur;
  elapsed = 0; shootTimer = 0; waveIndex = 0;
  killCount = 0; score = 0; hp = PLAYER_HP;
}

// ============================================================
// スポーン
// ============================================================
function spawnEnemy(count, type) {
  const t = ENEMY_TYPES[type] || ENEMY_TYPES.normal;
  for (let i = 0; i < count; i++) {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0)      { x = Math.random() * CW; y = -t.r - 5; }
    else if (side === 1) { x = CW + t.r + 5;       y = Math.random() * CH; }
    else if (side === 2) { x = Math.random() * CW; y = CH + t.r + 5; }
    else                 { x = -t.r - 5;            y = Math.random() * CH; }
    enemies.push({ x, y, r: t.r, hp: t.hp, maxHp: t.hp,
      speed: activeConfig.enemySpeed * t.speed + Math.random()*25,
      color: t.color, outlineColor: t.outlineColor, score: t.score, type });
  }
}

// ============================================================
// エフェクト
// ============================================================
function addExplosion(x, y, color, count=8, maxR=28) {
  for (let i = 0; i < count; i++) {
    const a = (Math.PI*2/count)*i + Math.random()*0.5;
    const spd = 60 + Math.random() * 100;
    effects.push({ type:'spark', x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, maxLife:0.4, color, size: 3+Math.random()*4 });
  }
  effects.push({ type:'ring', x, y, r:0, maxR, life:1, color });
}

function addFloatText(x, y, text, color, size=18) {
  effects.push({ type:'text', x, y, text, color, size, life:1, maxLife:0.7, vy:-70 });
}

function addHitEffect(x, y) {
  effects.push({ type:'ring', x, y, r:0, maxR:44, life:1, color:'#ff3333' });
  addFloatText(x, y-18, 'OUCH!', '#ff4444', 20);
}

// ============================================================
// 更新
// ============================================================
function update(dt) {
  if (state === S.COUNTDOWN) {
    elapsed += dt;
    countdownVal = 3 - Math.floor(elapsed);
    if (elapsed >= 3) { state = S.PLAY; elapsed = 0; }
    return;
  }
  if (state !== S.PLAY) return;

  elapsed += dt;
  gameTime = Math.max(0, activeConfig.dur - elapsed);

  // ウェーブ
  while (waveIndex < waves.length && elapsed >= waves[waveIndex][0]) {
    const [, cnt, type] = waves[waveIndex];
    spawnEnemy(cnt, type); waveIndex++;
  }

  // プレイヤー移動（キーボード）
  let dx = 0, dy = 0;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) dx -= 1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;
  if (keys['ArrowUp']    || keys['w'] || keys['W']) dy -= 1;
  if (keys['ArrowDown']  || keys['s'] || keys['S']) dy += 1;
  // タッチスティック
  if (stick.active) { dx += stick.dx; dy += stick.dy; }

  const mv = Math.hypot(dx, dy);
  if (mv > 0) {
    dx /= Math.max(mv, 1); dy /= Math.max(mv, 1);
    player.angle = Math.atan2(dy, dx);
  }
  player.x = Math.max(player.r, Math.min(CW - player.r, player.x + dx * PLAYER_SPEED * dt));
  player.y = Math.max(player.r, Math.min(CH - player.r, player.y + dy * PLAYER_SPEED * dt));

  if (player.invincible > 0) player.invincible -= dt;
  player.flashTimer += dt;

  // 射撃
  shootTimer -= dt;
  if (shootTimer <= 0 && enemies.length > 0) {
    shootTimer = activeWeapon.interval;
    activeWeapon.fn();
  }

  // レーザー処理
  for (const l of lasers) {
    l.life -= dt / l.maxLife;
    if (l.life > 0) {
      const ex = l.x + Math.cos(l.angle) * 600;
      const ey = l.y + Math.sin(l.angle) * 600;
      for (const e of enemies) {
        if (l.hit.has(e)) continue;
        if (pointSegDist(e.x, e.y, l.x, l.y, ex, ey) < e.r + 4) {
          l.hit.add(e);
          e.hp -= 2;
          if (e.hp <= 0) killEnemy(e);
          else addFloatText(e.x, e.y, '-2', '#ff44ff', 14);
        }
      }
    }
  }
  lasers = lasers.filter(l => l.life > 0);

  // 弾
  for (const b of bullets) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    if (b.x < -30 || b.x > CW+30 || b.y < -30 || b.y > CH+30) { b.life = 0; continue; }
    for (const e of enemies) {
      if (e.dead) continue;
      if (Math.hypot(b.x - e.x, b.y - e.y) < b.r + e.r) {
        if (!b.isBomb) b.life = 0;
        e.hp -= b.dmg;
        if (e.hp <= 0) killEnemy(e);
        else addFloatText(e.x, e.y, '-' + b.dmg, '#fff', 13);
        if (b.isBomb) {
          // 爆発範囲ダメージ
          addExplosion(b.x, b.y, WEAPONS.bomb.color, 16, 55);
          seBomb();
          b.life = 0;
          for (const ee of enemies) {
            if (!ee.dead && Math.hypot(b.x - ee.x, b.y - ee.y) < 55) {
              ee.hp -= 2;
              if (ee.hp <= 0) killEnemy(ee);
            }
          }
        }
      }
    }
  }

  // 敵移動 & プレイヤー衝突
  for (const e of enemies) {
    if (e.dead) continue;
    const a = Math.atan2(player.y - e.y, player.x - e.x);
    e.x += Math.cos(a) * e.speed * dt;
    e.y += Math.sin(a) * e.speed * dt;
    if (player.invincible <= 0 && Math.hypot(e.x - player.x, e.y - player.y) < player.hitR + e.r) {
      hp--;
      player.invincible = 0.9;
      player.flashTimer = 0;
      addHitEffect(player.x, player.y);
      seHit();
      e.dead = true;
      if (hp <= 0) { state = S.OVER; seGameOver(); return; }
    }
  }

  // エフェクト更新
  for (const ef of effects) {
    ef.life -= dt / (ef.maxLife || 0.7);
    if (ef.type === 'spark') { ef.x += ef.vx*dt; ef.y += ef.vy*dt; ef.vx*=0.9; ef.vy*=0.9; }
    if (ef.type === 'ring')  { ef.r = (1-ef.life) * ef.maxR; }
    if (ef.type === 'text')  { ef.y += ef.vy*dt; }
  }

  bullets = bullets.filter(b => b.life > 0);
  enemies = enemies.filter(e => !e.dead);
  effects = effects.filter(e => e.life > 0);

  if (gameTime <= 0) { state = S.CLEAR; seClear(); }
}

function killEnemy(e) {
  e.dead = true;
  killCount++;
  score += e.score || 1;
  addExplosion(e.x, e.y, e.color, e.type === 'tank' ? 16 : 8, e.type === 'tank' ? 50 : 28);
  addFloatText(e.x, e.y - 10, e.type === 'tank' ? '+5!' : '+1', '#ffdd44', e.type === 'tank' ? 22 : 16);
  seKill();
}

function pointSegDist(px, py, ax, ay, bx, by) {
  const abx = bx-ax, aby = by-ay;
  const len2 = abx*abx + aby*aby;
  if (len2 === 0) return Math.hypot(px-ax, py-ay);
  let t = ((px-ax)*abx + (py-ay)*aby) / len2;
  t = Math.max(0, Math.min(1, t));
  return Math.hypot(px-(ax+t*abx), py-(ay+t*aby));
}

// ============================================================
// 描画ユーティリティ
// ============================================================
function drawBg() {
  ctx.fillStyle = '#080810';
  ctx.fillRect(0, 0, CW, CH);
  ctx.strokeStyle = 'rgba(255,255,255,0.035)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < CW; x += 36) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,CH); ctx.stroke(); }
  for (let y = 0; y < CH; y += 36) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(CW,y); ctx.stroke(); }
}

function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.flashTimer * 14) % 2 === 0) return;
  const { x, y, r } = player;
  // 外周オーラ
  ctx.beginPath(); ctx.arc(x, y, r+6, 0, Math.PI*2);
  ctx.strokeStyle = `rgba(68,170,255,${0.2 + 0.1*Math.sin(Date.now()*0.006)})`;
  ctx.lineWidth = 3; ctx.stroke();
  // 本体
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = '#4af'; ctx.fill();
  // ハイライト
  ctx.beginPath(); ctx.arc(x-4, y-4, r*0.38, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fill();
  // 十字
  ctx.strokeStyle = 'rgba(255,255,255,0.85)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x-6,y); ctx.lineTo(x+6,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y-6); ctx.lineTo(x,y+6); ctx.stroke();
}

function drawEnemy(e) {
  const { x, y, r, color, outlineColor, hp: ehp, maxHp } = e;
  // 外周
  ctx.beginPath(); ctx.arc(x, y, r+3, 0, Math.PI*2);
  ctx.strokeStyle = outlineColor; ctx.lineWidth = 2; ctx.stroke();
  // 本体
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fillStyle = color; ctx.fill();
  // タンクはHPバー
  if (maxHp > 1) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x-r, y+r+3, r*2, 4);
    ctx.fillStyle = '#ff4444';
    ctx.fillRect(x-r, y+r+3, r*2*(ehp/maxHp), 4);
  }
  // バツ印
  ctx.strokeStyle = 'rgba(255,255,255,0.65)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x-5,y-5); ctx.lineTo(x+5,y+5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+5,y-5); ctx.lineTo(x-5,y+5); ctx.stroke();
}

function drawBullet(b) {
  ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
  ctx.fillStyle = b.color; ctx.fill();
  if (b.isBomb) {
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r+3, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,119,34,0.5)'; ctx.lineWidth = 2; ctx.stroke();
  }
}

function drawLaser(l) {
  const alpha = l.life * 0.85;
  ctx.save();
  ctx.globalAlpha = alpha;
  const ex = l.x + Math.cos(l.angle) * 600;
  const ey = l.y + Math.sin(l.angle) * 600;
  ctx.beginPath(); ctx.moveTo(l.x, l.y); ctx.lineTo(ex, ey);
  ctx.strokeStyle = '#ff44ff'; ctx.lineWidth = 6; ctx.stroke();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  ctx.restore();
}

function drawEffect(ef) {
  const a = Math.max(0, ef.life);
  ctx.globalAlpha = a;
  if (ef.type === 'spark') {
    ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.size*a, 0, Math.PI*2);
    ctx.fillStyle = ef.color; ctx.fill();
  } else if (ef.type === 'ring') {
    ctx.beginPath(); ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI*2);
    ctx.strokeStyle = ef.color; ctx.lineWidth = 2; ctx.stroke();
  } else if (ef.type === 'text') {
    ctx.font = `bold ${ef.size || 18}px sans-serif`;
    ctx.fillStyle = ef.color; ctx.textAlign = 'center';
    ctx.fillText(ef.text, ef.x, ef.y);
  }
  ctx.globalAlpha = 1;
}

function drawStick() {
  if (!stick.active) return;
  ctx.globalAlpha = 0.35;
  ctx.beginPath(); ctx.arc(stick.baseX, stick.baseY, 50, 0, Math.PI*2);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath();
  ctx.arc(stick.baseX + stick.dx*50, stick.baseY + stick.dy*50, 22, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.globalAlpha = 1;
}

function drawHUD() {
  const barW = CW - 40;
  const ratio = Math.max(0, gameTime / activeConfig.dur);

  // タイムバー背景
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath(); ctx.roundRect(20, 18, barW, 12, 6); ctx.fill();
  // タイムバー
  const barColor = ratio > 0.5 ? '#4af' : ratio > 0.25 ? '#fa4' : '#f44';
  ctx.fillStyle = barColor;
  ctx.beginPath(); ctx.roundRect(20, 18, barW * ratio, 12, 6); ctx.fill();

  // 残り時間
  ctx.font = 'bold 30px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText(gameTime.toFixed(2) + '秒', CW/2, 66);

  // ドキドキ演出
  if (gameTime < 0.6) {
    const p = 0.5 + 0.5 * Math.sin(Date.now() * 0.025);
    ctx.globalAlpha = p;
    ctx.font = 'bold 20px sans-serif'; ctx.fillStyle = '#ff4444';
    ctx.fillText('‼ あとすこし ‼', CW/2, 94);
    ctx.globalAlpha = 1;
  }

  // HP
  ctx.textAlign = 'left';
  ctx.font = '13px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('HP', 20, CH-42);
  for (let i = 0; i < PLAYER_HP; i++) {
    ctx.beginPath(); ctx.arc(50 + i*22, CH-48, 7, 0, Math.PI*2);
    ctx.fillStyle = i < hp ? '#f44' : 'rgba(255,255,255,0.15)'; ctx.fill();
  }

  // スコア
  ctx.textAlign = 'right';
  ctx.font = 'bold 20px sans-serif'; ctx.fillStyle = '#ffdd44';
  ctx.fillText('Score: ' + score, CW-14, CH-36);

  // 武器アイコン（左上）
  ctx.textAlign = 'left';
  ctx.font = '13px sans-serif'; ctx.fillStyle = activeWeapon.color;
  ctx.fillText(activeWeapon.name, 14, 100);

  // 敵数
  ctx.textAlign = 'right';
  ctx.font = '12px sans-serif'; ctx.fillStyle = 'rgba(255,80,80,0.7)';
  ctx.fillText('敵×' + enemies.length, CW-14, 100);
}

// ============================================================
// 各画面描画
// ============================================================
function drawTitle() {
  drawBg();

  // 背景光
  const grad = ctx.createRadialGradient(CW/2, CH/2-80, 0, CW/2, CH/2-80, 180);
  grad.addColorStop(0, 'rgba(68,170,255,0.1)'); grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, CW, CH);

  ctx.textAlign = 'center';
  ctx.font = 'bold 64px sans-serif'; ctx.fillStyle = '#4af';
  ctx.fillText('3秒', CW/2, CH/2 - 100);
  ctx.fillStyle = '#fff';
  ctx.fillText('サバイバー', CW/2, CH/2 - 34);

  ctx.font = '13px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('V2', CW/2, CH/2 - 5);

  ctx.font = '17px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('3秒にげきれ！', CW/2, CH/2 + 32);

  ctx.font = '13px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('矢印 / WASD / タッチで移動', CW/2, CH/2 + 62);

  ctx.fillStyle = '#4af';
  ctx.beginPath(); ctx.roundRect(CW/2-100, CH/2+96, 200, 54, 27); ctx.fill();
  ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText('はじめる！', CW/2, CH/2+132);

  // 回転する敵アイコン
  for (let i = 0; i < 10; i++) {
    const a = (Math.PI*2/10)*i + Date.now()*0.0008;
    ctx.beginPath();
    ctx.arc(CW/2 + Math.cos(a)*155, CH/2-60 + Math.sin(a)*140, 8, 0, Math.PI*2);
    ctx.fillStyle = i%3===0 ? '#ff0' : i%3===1 ? '#a44' : '#f44';
    ctx.globalAlpha = 0.45; ctx.fill(); ctx.globalAlpha = 1;
  }
}

function drawWeaponSelect() {
  drawBg();
  ctx.textAlign = 'center';

  ctx.font = 'bold 26px sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText('武器を選べ！', CW/2, 55);

  ctx.font = '13px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText('攻撃は自動。移動だけ集中！', CW/2, 80);

  // 武器カード
  WEAPON_KEYS.forEach((k, i) => {
    const w = WEAPONS[k];
    const col = i % 2, row = Math.floor(i / 2);
    const bx = 20 + col*165, by = 100 + row*100;
    const selected = selectedWeapon === k;
    ctx.fillStyle = selected ? 'rgba(68,170,255,0.2)' : 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.roundRect(bx, by, 150, 88, 12); ctx.fill();
    ctx.strokeStyle = selected ? '#4af' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.beginPath(); ctx.roundRect(bx, by, 150, 88, 12); ctx.stroke();

    ctx.font = 'bold 20px sans-serif'; ctx.fillStyle = w.color; ctx.textAlign = 'center';
    ctx.fillText(w.icon + ' ' + w.name, bx+75, by+30);
    ctx.font = '12px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.fillText(w.desc, bx+75, by+52);
    ctx.font = '11px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText('間隔 ' + w.interval.toFixed(2) + '秒', bx+75, by+72);
  });

  // 難易度（時間）選択
  ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.textAlign = 'center';
  ctx.fillText('生存時間', CW/2, 330);

  DUR_KEYS.forEach((d, i) => {
    const bx = 20 + i*108, by = 345;
    const selected = selectedDur === d;
    ctx.fillStyle = selected ? 'rgba(68,170,255,0.25)' : 'rgba(255,255,255,0.05)';
    ctx.beginPath(); ctx.roundRect(bx, by, 96, 40, 10); ctx.fill();
    ctx.strokeStyle = selected ? '#4af' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.beginPath(); ctx.roundRect(bx, by, 96, 40, 10); ctx.stroke();
    ctx.font = 'bold 16px sans-serif';
    ctx.fillStyle = selected ? '#4af' : '#fff';
    ctx.fillText(CONFIGS[d].label, bx+48, by+26);
  });

  // スタートボタン
  ctx.fillStyle = '#4af';
  ctx.beginPath(); ctx.roundRect(60, 405, 240, 54, 27); ctx.fill();
  ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText('スタート！', CW/2, 441);

  ctx.font = '12px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText('クリックまたは Enter', CW/2, 480);
}

function drawCountdown() {
  drawBg();
  ctx.textAlign = 'center';
  const num = Math.max(1, countdownVal);
  const pulse = 1 + 0.08 * Math.sin(Date.now() * 0.015);
  ctx.save();
  ctx.translate(CW/2, CH/2+30);
  ctx.scale(pulse, pulse);
  ctx.font = 'bold 160px sans-serif'; ctx.fillStyle = 'rgba(68,170,255,0.9)';
  ctx.fillText(num, 0, 0);
  ctx.restore();
  ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText('準備して！', CW/2, CH/2+120);
  ctx.font = '15px sans-serif'; ctx.fillStyle = activeWeapon.color;
  ctx.fillText(activeWeapon.icon + ' ' + activeWeapon.name + ' × ' + activeConfig.label, CW/2, CH/2+150);
}

function drawPlaying() {
  drawBg();
  for (const ef of effects) { if (ef.type === 'ring') drawEffect(ef); }
  for (const l of lasers)   drawLaser(l);
  for (const b of bullets)  drawBullet(b);
  for (const e of enemies)  drawEnemy(e);
  drawPlayer();
  for (const ef of effects) { if (ef.type !== 'ring') drawEffect(ef); }
  drawStick();
  drawHUD();
}

function drawResult(cleared) {
  drawBg();
  ctx.fillStyle = cleared ? 'rgba(0,20,50,0.88)' : 'rgba(40,0,0,0.88)';
  ctx.fillRect(0, 0, CW, CH);
  ctx.textAlign = 'center';

  if (cleared) {
    ctx.font = 'bold 62px sans-serif'; ctx.fillStyle = '#4af';
    ctx.fillText('クリア！', CW/2, CH/2 - 120);
    ctx.font = 'bold 20px sans-serif'; ctx.fillStyle = '#ffe066';
    ctx.fillText(activeConfig.label + '生き残った！', CW/2, CH/2 - 78);
  } else {
    ctx.font = 'bold 46px sans-serif'; ctx.fillStyle = '#f44';
    ctx.fillText('ゲームオーバー', CW/2, CH/2 - 120);
    ctx.font = 'bold 19px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fillText('あと ' + gameTime.toFixed(2) + '秒…！', CW/2, CH/2 - 80);
  }

  // スコアボード
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.roundRect(30, CH/2-58, CW-60, 150, 16); ctx.fill();

  ctx.font = '14px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText('撃破数', CW/2, CH/2 - 28);
  ctx.font = 'bold 54px sans-serif'; ctx.fillStyle = '#ffdd44';
  ctx.fillText(killCount + '体', CW/2, CH/2 + 32);
  ctx.font = '15px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillText('スコア: ' + score, CW/2, CH/2 + 60);
  ctx.font = '13px sans-serif'; ctx.fillStyle = activeWeapon.color;
  ctx.fillText(activeWeapon.icon + ' ' + activeWeapon.name + ' ／ ' + activeConfig.label, CW/2, CH/2 + 84);

  // リトライボタン
  ctx.fillStyle = cleared ? '#4af' : '#f55';
  ctx.beginPath(); ctx.roundRect(CW/2-110, CH/2+115, 220, 54, 27); ctx.fill();
  ctx.font = 'bold 21px sans-serif'; ctx.fillStyle = '#fff';
  ctx.fillText('もう一度！', CW/2, CH/2+151);

  ctx.font = '11px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText('クリックまたは Enter', CW/2, CH/2+188);

  // 動画用テキスト
  ctx.font = 'bold 14px sans-serif'; ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.fillText(cleared ? '生き残れる？ → コメントで挑戦！' : '次こそ' + activeConfig.label + '！', CW/2, CH - 30);
}

// ============================================================
// メインループ
// ============================================================
function loop(now) {
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;

  update(dt);

  if (state === S.TITLE)     drawTitle();
  else if (state === S.WEAPON)    drawWeaponSelect();
  else if (state === S.COUNTDOWN) drawCountdown();
  else if (state === S.PLAY)      drawPlaying();
  else if (state === S.CLEAR)     drawResult(true);
  else if (state === S.OVER)      drawResult(false);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
