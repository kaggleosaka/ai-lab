<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Mini Breakout Challenge</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b12;
      --panel: #111827;
      --text: #f7fbff;
      --muted: #98a6ba;
      --cyan: #42e8ff;
      --pink: #ff5d9e;
      --gold: #ffd166;
      --green: #56f39a;
      --line: rgba(255,255,255,.14);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 0%, rgba(66, 232, 255, .18), transparent 34%),
        linear-gradient(180deg, #080b12 0%, #111827 54%, #070a10 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }

    body {
      display: grid;
      place-items: center;
    }

    .phone {
      position: relative;
      width: min(100vw, 464px);
      height: min(100vh, 825px);
      aspect-ratio: 464 / 825;
      max-width: 464px;
      max-height: 825px;
      background: #090d16;
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 26px 70px rgba(0,0,0,.55);
      overflow: hidden;
      user-select: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #090d16;
    }

    .sound {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      padding: 0;
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 8px;
      background: rgba(12, 18, 30, .72);
      color: var(--text);
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .sound svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .sound:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="Mini Breakout Challenge 464 by 825">
    <canvas id="game" width="464" height="825"></canvas>
    <button id="soundButton" class="sound" type="button" aria-label="Sound on" title="Sound on">
      <svg id="soundIcon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M4 9v6h4l5 4V5L8 9H4z"></path>
        <path d="M16 8c1.4 1.4 1.4 6.6 0 8"></path>
        <path d="M19 5c3 3.8 3 10.2 0 14"></path>
      </svg>
    </button>
  </main>

  <script>
    (() => {
      "use strict";

      const W = 464;
      const H = 825;
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const soundButton = document.getElementById("soundButton");
      const soundIcon = document.getElementById("soundIcon");

      const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
      const rand = (min, max) => min + Math.random() * (max - min);

      const savedMute = localStorage.getItem("miniBreakoutMuted");
      let muted = savedMute === "1";
      let audioStarted = false;
      let audioCtx = null;
      let musicTimer = null;
      let musicStep = 0;

      const game = {
        state: "ready",
        score: 0,
        lives: 3,
        level: 1,
        combo: 0,
        shake: 0,
        flash: "",
        flashTimer: 0,
        particles: [],
        powerUps: [],
        pointerX: W / 2,
        paddle: { x: W / 2 - 48, y: 735, w: 96, h: 16, targetX: W / 2 - 48, baseW: 96, growTimer: 0 },
        ball: { x: W / 2, y: 716, r: 7, vx: 0, vy: 0, speed: 5.2 },
        blocks: []
      };

      const blockColors = ["#ff5d7d", "#ff9a3c", "#ffd166", "#56f39a", "#42e8ff"];
      const powerColors = {
        wide: "#56f39a",
        slow: "#42e8ff",
        life: "#ff5d9e"
      };

      function setSoundIcon() {
        soundButton.setAttribute("aria-label", muted ? "Sound off" : "Sound on");
        soundButton.title = muted ? "Sound off" : "Sound on";
        soundIcon.innerHTML = muted
          ? '<path d="M4 9v6h4l5 4V5L8 9H4z"></path><path d="M18 9l4 4"></path><path d="M22 9l-4 4"></path>'
          : '<path d="M4 9v6h4l5 4V5L8 9H4z"></path><path d="M16 8c1.4 1.4 1.4 6.6 0 8"></path><path d="M19 5c3 3.8 3 10.2 0 14"></path>';
      }

      function initBlocks() {
        game.blocks.length = 0;
        const cols = 7;
        const rows = Math.min(7, 4 + game.level);
        const gap = 8;
        const bw = 52;
        const bh = 24;
        const startX = Math.floor((W - (cols * bw + (cols - 1) * gap)) / 2);
        const startY = 104;

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const pattern = (row * 3 + col * 5 + game.level) % 17;
            const isBomb = pattern === 0;
            const isPower = pattern === 5 || pattern === 12;
            const isTough = game.level > 1 && (row + col + game.level) % 9 === 0;
            const type = isBomb ? "bomb" : isPower ? "power" : isTough ? "tough" : "normal";
            game.blocks.push({
              x: startX + col * (bw + gap),
              y: startY + row * (bh + gap),
              w: bw,
              h: bh,
              alive: true,
              color: type === "bomb" ? "#ff3b58" : type === "power" ? "#7c5cff" : blockColors[row % blockColors.length],
              pulse: rand(0, Math.PI * 2),
              type,
              hits: type === "tough" ? 2 : 1
            });
          }
        }
      }

      function resetBall(stickToPaddle = true) {
        const p = game.paddle;
        game.ball.x = p.x + p.w / 2;
        game.ball.y = p.y - game.ball.r - 3;
        game.ball.vx = stickToPaddle ? 0 : rand(-2.4, 2.4);
        game.ball.vy = stickToPaddle ? 0 : -game.ball.speed;
      }

      function resetGame() {
        game.state = "ready";
        game.score = 0;
        game.lives = 3;
        game.level = 1;
        game.combo = 0;
        game.shake = 0;
        game.flash = "";
        game.flashTimer = 0;
        game.particles.length = 0;
        game.powerUps.length = 0;
        game.paddle.w = game.paddle.baseW;
        game.paddle.growTimer = 0;
        game.paddle.x = W / 2 - game.paddle.w / 2;
        game.paddle.targetX = game.paddle.x;
        game.ball.speed = 5.2;
        game.pointerX = W / 2;
        initBlocks();
        resetBall(true);
      }

      function nextLevel() {
        game.level++;
        game.state = "ready";
        game.combo = 0;
        game.flash = `Level ${game.level}`;
        game.flashTimer = 100;
        game.powerUps.length = 0;
        game.paddle.w = Math.max(70, game.paddle.baseW - (game.level - 1) * 4);
        game.paddle.growTimer = 0;
        game.paddle.x = clamp(game.paddle.x, 8, W - game.paddle.w - 8);
        game.paddle.targetX = game.paddle.x;
        game.ball.speed = Math.min(8.2, 5.2 + (game.level - 1) * 0.34);
        initBlocks();
        resetBall(true);
      }

      function startGame() {
        if (game.state === "playing") return;
        if (game.state === "gameover") {
          resetGame();
        } else if (game.state === "clear") {
          nextLevel();
        }
        game.state = "playing";
        game.combo = 0;
        resetBall(false);
        playSound("start");
        startMusic();
      }

      function ensureAudio() {
        if (audioStarted) return;
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return;
        audioCtx = new AudioCtor();
        audioStarted = true;
      }

      function resumeAudio() {
        ensureAudio();
        if (audioCtx && audioCtx.state === "suspended") {
          audioCtx.resume().catch(() => {});
        }
      }

      function tone(freq, duration, type, gain, startOffset = 0, slideTo = null) {
        if (muted || !audioCtx) return;
        const now = audioCtx.currentTime + startOffset;
        const osc = audioCtx.createOscillator();
        const vol = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        if (slideTo) {
          osc.frequency.exponentialRampToValueAtTime(slideTo, now + duration);
        }
        vol.gain.setValueAtTime(0.0001, now);
        vol.gain.exponentialRampToValueAtTime(gain, now + 0.012);
        vol.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(vol).connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + duration + 0.03);
      }

      function noise(duration, gain) {
        if (muted || !audioCtx) return;
        const len = Math.max(1, Math.floor(audioCtx.sampleRate * duration));
        const buffer = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / len);
        const src = audioCtx.createBufferSource();
        const vol = audioCtx.createGain();
        vol.gain.value = gain;
        src.buffer = buffer;
        src.connect(vol).connect(audioCtx.destination);
        src.start();
      }

      function playSound(name) {
        if (muted || !audioCtx) return;
        if (name === "tap") tone(680, 0.045, "triangle", 0.08);
        if (name === "start") {
          tone(440, 0.08, "square", 0.08, 0);
          tone(660, 0.09, "square", 0.08, 0.08);
          tone(880, 0.12, "square", 0.08, 0.16);
        }
        if (name === "paddle") tone(300, 0.08, "sine", 0.12, 0, 520);
        if (name === "wall") tone(520, 0.04, "triangle", 0.055);
        if (name === "block") {
          tone(720, 0.06, "square", 0.08, 0, 1180);
          noise(0.045, 0.035);
        }
        if (name === "power") {
          tone(880, 0.06, "triangle", 0.08, 0);
          tone(1320, 0.1, "triangle", 0.07, 0.06);
        }
        if (name === "bomb") {
          tone(90, 0.16, "sawtooth", 0.13, 0, 48);
          noise(0.12, 0.07);
        }
        if (name === "miss") {
          tone(220, 0.22, "sawtooth", 0.12, 0, 80);
        }
        if (name === "clear") {
          [523, 659, 784, 1046].forEach((f, i) => tone(f, 0.13, "triangle", 0.1, i * 0.09));
        }
        if (name === "gameover") {
          [392, 294, 220, 146].forEach((f, i) => tone(f, 0.16, "sine", 0.105, i * 0.12));
        }
      }

      function musicTick() {
        if (muted || !audioCtx || game.state !== "playing") return;
        const melody = [262, 330, 392, 523, 392, 330, 294, 392];
        const bass = [98, 98, 131, 131, 87, 87, 110, 110];
        const idx = musicStep % melody.length;
        tone(melody[idx], 0.11, "square", 0.025);
        if (musicStep % 2 === 0) tone(bass[idx], 0.14, "triangle", 0.035);
        musicStep++;
      }

      function startMusic() {
        if (musicTimer) return;
        musicStep = 0;
        musicTick();
        musicTimer = setInterval(musicTick, 185);
      }

      function stopMusic() {
        if (!musicTimer) return;
        clearInterval(musicTimer);
        musicTimer = null;
      }

      function spawnParticles(x, y, color, count = 10) {
        for (let i = 0; i < count; i++) {
          game.particles.push({
            x,
            y,
            vx: rand(-2.9, 2.9),
            vy: rand(-2.7, 1.2),
            life: rand(24, 42),
            max: 42,
            r: rand(1.5, 3.2),
            color
          });
        }
      }

      function showFlash(text, time = 80) {
        game.flash = text;
        game.flashTimer = time;
      }

      function spawnPowerUp(x, y, forcedType = null) {
        const types = ["wide", "slow", "life"];
        const type = forcedType || types[Math.floor(rand(0, types.length))];
        game.powerUps.push({
          x,
          y,
          type,
          color: powerColors[type],
          vy: 2.1 + game.level * 0.12,
          size: 22,
          spin: rand(0, Math.PI * 2)
        });
      }

      function applyPowerUp(type) {
        if (type === "wide") {
          const p = game.paddle;
          p.w = Math.min(150, p.w + 28);
          p.growTimer = 720;
          p.targetX = clamp(p.targetX, 8, W - p.w - 8);
          showFlash("Wide Paddle");
        }
        if (type === "slow") {
          const b = game.ball;
          const scale = 0.78;
          b.vx *= scale;
          b.vy *= scale;
          b.speed = Math.max(4.6, b.speed * 0.92);
          showFlash("Slow Ball");
        }
        if (type === "life") {
          game.lives = Math.min(5, game.lives + 1);
          showFlash("Extra Life");
        }
        spawnParticles(game.paddle.x + game.paddle.w / 2, game.paddle.y, powerColors[type], 18);
        playSound("power");
      }

      function destroyBlock(block, award = true) {
        if (!block.alive) return;
        block.alive = false;
        if (award) {
          game.combo++;
          game.score += 100 + Math.min(game.combo * 14, 220) + (block.type === "tough" ? 80 : 0);
        }
        spawnParticles(block.x + block.w / 2, block.y + block.h / 2, block.color, block.type === "bomb" ? 26 : 14);
        if (block.type === "power") spawnPowerUp(block.x + block.w / 2, block.y + block.h / 2);
      }

      function triggerBomb(block) {
        destroyBlock(block);
        game.shake = 16;
        playSound("bomb");
        for (const other of game.blocks) {
          if (!other.alive || other === block) continue;
          const closeX = Math.abs((other.x + other.w / 2) - (block.x + block.w / 2)) < 74;
          const closeY = Math.abs((other.y + other.h / 2) - (block.y + block.h / 2)) < 52;
          if (closeX && closeY) {
            destroyBlock(other);
          }
        }
      }

      function pointerToGameX(clientX) {
        const rect = canvas.getBoundingClientRect();
        return (clientX - rect.left) * (W / rect.width);
      }

      function movePaddle(clientX) {
        const x = pointerToGameX(clientX);
        game.pointerX = clamp(x, 0, W);
        game.paddle.targetX = clamp(game.pointerX - game.paddle.w / 2, 8, W - game.paddle.w - 8);
        if (game.state === "ready") {
          game.paddle.x = game.paddle.targetX;
          resetBall(true);
        }
      }

      function handlePointerDown(event) {
        resumeAudio();
        movePaddle(event.clientX);
        if (event.target === soundButton) return;
        if (game.state !== "playing") startGame();
      }

      function handlePointerMove(event) {
        movePaddle(event.clientX);
      }

      canvas.addEventListener("pointerdown", handlePointerDown);
      canvas.addEventListener("pointermove", handlePointerMove);

      soundButton.addEventListener("pointerdown", event => {
        event.stopPropagation();
        resumeAudio();
        muted = !muted;
        localStorage.setItem("miniBreakoutMuted", muted ? "1" : "0");
        if (muted) {
          stopMusic();
        } else {
          playSound("tap");
          if (game.state === "playing") startMusic();
        }
        setSoundIcon();
      });

      function circleRectHit(ball, rect) {
        const cx = clamp(ball.x, rect.x, rect.x + rect.w);
        const cy = clamp(ball.y, rect.y, rect.y + rect.h);
        const dx = ball.x - cx;
        const dy = ball.y - cy;
        return dx * dx + dy * dy <= ball.r * ball.r;
      }

      function updatePlaying() {
        const p = game.paddle;
        const b = game.ball;

        p.x += (p.targetX - p.x) * 0.32;
        if (p.growTimer > 0) {
          p.growTimer--;
          if (p.growTimer === 0) {
            p.w = Math.max(70, p.baseW - (game.level - 1) * 4);
            p.targetX = clamp(p.targetX, 8, W - p.w - 8);
          }
        }

        b.x += b.vx;
        b.y += b.vy;

        if (b.x - b.r < 0) {
          b.x = b.r;
          b.vx = Math.abs(b.vx);
          playSound("wall");
        }
        if (b.x + b.r > W) {
          b.x = W - b.r;
          b.vx = -Math.abs(b.vx);
          playSound("wall");
        }
        if (b.y - b.r < 56) {
          b.y = 56 + b.r;
          b.vy = Math.abs(b.vy);
          playSound("wall");
        }

        if (b.vy > 0 && circleRectHit(b, p)) {
          const hit = ((b.x - (p.x + p.w / 2)) / (p.w / 2));
          b.y = p.y - b.r - 1;
          b.vx = hit * 5.2;
          b.vy = -Math.sqrt(Math.max(10, b.speed * b.speed - b.vx * b.vx * 0.35));
          game.combo = 0;
          spawnParticles(b.x, p.y, "#42e8ff", 6);
          playSound("paddle");
        }

        for (const block of game.blocks) {
          if (!block.alive || !circleRectHit(b, block)) continue;
          block.hits--;
          game.shake = block.type === "bomb" ? 14 : 6;
          if (block.hits <= 0) {
            if (block.type === "bomb") {
              triggerBomb(block);
            } else {
              destroyBlock(block);
              playSound("block");
            }
            if (game.combo > 2) showFlash(`${game.combo} Combo`, 44);
          } else {
            game.score += 45;
            block.pulse = Math.PI;
            spawnParticles(block.x + block.w / 2, block.y + block.h / 2, "#ffffff", 8);
            playSound("wall");
          }

          const overlapLeft = Math.abs((b.x + b.r) - block.x);
          const overlapRight = Math.abs((block.x + block.w) - (b.x - b.r));
          const overlapTop = Math.abs((b.y + b.r) - block.y);
          const overlapBottom = Math.abs((block.y + block.h) - (b.y - b.r));
          const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
          if (minOverlap === overlapLeft || minOverlap === overlapRight) {
            b.vx *= -1;
          } else {
            b.vy *= -1;
          }
          break;
        }

        if (!game.blocks.some(block => block.alive)) {
          game.score += 1000 + game.level * 250;
          game.state = "clear";
          showFlash("Stage Clear", 90);
          stopMusic();
          playSound("clear");
        }

        if (b.y - b.r > H) {
          game.lives--;
          game.combo = 0;
          game.shake = 12;
          playSound("miss");
          if (game.lives <= 0) {
            game.state = "gameover";
            stopMusic();
            playSound("gameover");
          } else {
            game.state = "ready";
            game.powerUps.length = 0;
            resetBall(true);
          }
        }
      }

      function updatePowerUps() {
        const p = game.paddle;
        for (let i = game.powerUps.length - 1; i >= 0; i--) {
          const item = game.powerUps[i];
          item.y += item.vy;
          item.spin += 0.1;
          const caught =
            item.y + item.size / 2 >= p.y &&
            item.y - item.size / 2 <= p.y + p.h &&
            item.x + item.size / 2 >= p.x &&
            item.x - item.size / 2 <= p.x + p.w;
          if (caught) {
            applyPowerUp(item.type);
            game.powerUps.splice(i, 1);
          } else if (item.y - item.size > H) {
            game.powerUps.splice(i, 1);
          }
        }
      }

      function updateParticles() {
        for (let i = game.particles.length - 1; i >= 0; i--) {
          const part = game.particles[i];
          part.x += part.vx;
          part.y += part.vy;
          part.vy += 0.05;
          part.life--;
          if (part.life <= 0) game.particles.splice(i, 1);
        }
      }

      function update() {
        if (game.state === "playing") {
          updatePlaying();
        } else {
          game.paddle.x += (game.paddle.targetX - game.paddle.x) * 0.28;
          if (game.state === "ready") resetBall(true);
        }
        updatePowerUps();
        updateParticles();
        if (game.flashTimer > 0) game.flashTimer--;
        game.shake *= 0.84;
      }

      function roundedRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
      }

      function drawBackground() {
        const grd = ctx.createLinearGradient(0, 0, 0, H);
        grd.addColorStop(0, "#0d1324");
        grd.addColorStop(0.55, "#101827");
        grd.addColorStop(1, "#070a11");
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.globalAlpha = 0.16;
        ctx.strokeStyle = "#7aa2ff";
        ctx.lineWidth = 1;
        for (let y = 74; y < H; y += 42) {
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(W, y);
          ctx.stroke();
        }
        for (let x = -60; x < W + 80; x += 44) {
          ctx.beginPath();
          ctx.moveTo(x, 55);
          ctx.lineTo(x - 105, H);
          ctx.stroke();
        }
        ctx.restore();

        ctx.fillStyle = "rgba(255,255,255,.06)";
        ctx.fillRect(0, 54, W, 1);
      }

      function drawHud() {
        ctx.save();
        ctx.fillStyle = "rgba(7,10,17,.54)";
        ctx.fillRect(0, 0, W, 55);
        ctx.fillStyle = "#f7fbff";
        ctx.font = "700 18px system-ui, sans-serif";
        ctx.textBaseline = "middle";
        ctx.fillText(`Score ${game.score}`, 18, 28);
        ctx.fillStyle = "#ffd166";
        ctx.fillText(`Lv ${game.level}`, 190, 28);
        ctx.fillStyle = "#ff5d9e";
        ctx.fillText(`Lives ${game.lives}`, 314, 28);
        if (game.combo > 1 && game.state === "playing") {
          ctx.textAlign = "right";
          ctx.fillStyle = "#56f39a";
          ctx.font = "800 15px system-ui, sans-serif";
          ctx.fillText(`${game.combo}x`, W - 18, 50);
        }
        ctx.restore();
      }

      function drawBlocks() {
        for (const block of game.blocks) {
          if (!block.alive) continue;
          ctx.save();
          const pulse = Math.sin(block.pulse) * 2;
          block.pulse += 0.06;
          ctx.shadowColor = block.color;
          ctx.shadowBlur = block.type === "bomb" ? 22 : 13;
          roundedRect(block.x, block.y, block.w, block.h, 6);
          ctx.fillStyle = block.color;
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.fillStyle = "rgba(255,255,255,.22)";
          roundedRect(block.x + 4, block.y + 4 + pulse, block.w - 8, 5, 3);
          ctx.fill();
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "800 16px system-ui, sans-serif";
          ctx.fillStyle = "rgba(7,10,17,.72)";
          if (block.type === "bomb") ctx.fillText("*", block.x + block.w / 2, block.y + block.h / 2 + 1);
          if (block.type === "power") ctx.fillText("+", block.x + block.w / 2, block.y + block.h / 2 + 1);
          if (block.type === "tough") {
            ctx.fillStyle = "rgba(255,255,255,.72)";
            ctx.fillText(block.hits, block.x + block.w / 2, block.y + block.h / 2 + 1);
          }
          ctx.restore();
        }
      }

      function drawPaddle() {
        const p = game.paddle;
        ctx.save();
        ctx.shadowColor = "#42e8ff";
        ctx.shadowBlur = 22;
        const grd = ctx.createLinearGradient(p.x, p.y, p.x + p.w, p.y);
        grd.addColorStop(0, "#8bf6ff");
        grd.addColorStop(0.5, "#42e8ff");
        grd.addColorStop(1, "#56f39a");
        ctx.fillStyle = grd;
        roundedRect(p.x, p.y, p.w, p.h, 8);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,.35)";
        roundedRect(p.x + 9, p.y + 3, p.w - 18, 4, 2);
        ctx.fill();
        ctx.restore();
      }

      function drawBall() {
        const b = game.ball;
        ctx.save();
        ctx.shadowColor = "#ffffff";
        ctx.shadowBlur = 18;
        const grd = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, b.r + 3);
        grd.addColorStop(0, "#ffffff");
        grd.addColorStop(0.58, "#ffeaa1");
        grd.addColorStop(1, "#ffd166");
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawPowerUps() {
        for (const item of game.powerUps) {
          ctx.save();
          ctx.translate(item.x, item.y);
          ctx.rotate(item.spin);
          ctx.shadowColor = item.color;
          ctx.shadowBlur = 18;
          ctx.fillStyle = item.color;
          roundedRect(-item.size / 2, -item.size / 2, item.size, item.size, 7);
          ctx.fill();
          ctx.shadowBlur = 0;
          ctx.rotate(-item.spin);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "800 13px system-ui, sans-serif";
          ctx.fillStyle = "#071019";
          ctx.fillText(item.type === "wide" ? "W" : item.type === "slow" ? "S" : "1", 0, 1);
          ctx.restore();
        }
      }

      function drawParticles() {
        for (const part of game.particles) {
          ctx.save();
          ctx.globalAlpha = clamp(part.life / part.max, 0, 1);
          ctx.fillStyle = part.color;
          ctx.shadowColor = part.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(part.x, part.y, part.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }

      function drawFlash() {
        if (game.flashTimer <= 0 || !game.flash) return;
        ctx.save();
        ctx.globalAlpha = clamp(game.flashTimer / 28, 0, 1);
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.font = "800 25px system-ui, sans-serif";
        ctx.fillStyle = "#f7fbff";
        ctx.shadowColor = "#42e8ff";
        ctx.shadowBlur = 18;
        ctx.fillText(game.flash, W / 2, 88);
        ctx.restore();
      }

      function drawOverlay() {
        if (game.state === "playing") return;
        ctx.save();
        ctx.fillStyle = "rgba(4,7,13,.36)";
        ctx.fillRect(0, 55, W, H - 55);

        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "#f7fbff";

        if (game.state === "ready") {
          ctx.font = "800 34px system-ui, sans-serif";
          ctx.fillText(game.level === 1 ? "Mini Breakout" : `Level ${game.level}`, W / 2, 392);
          ctx.font = "700 20px system-ui, sans-serif";
          ctx.fillStyle = "#42e8ff";
          ctx.fillText("Tap to Start", W / 2, 438);
          ctx.font = "500 14px system-ui, sans-serif";
          ctx.fillStyle = "rgba(247,251,255,.72)";
          ctx.fillText("* bomb  + item  number needs hits", W / 2, 469);
        }

        if (game.state === "clear") {
          ctx.font = "800 36px system-ui, sans-serif";
          ctx.fillStyle = "#56f39a";
          ctx.fillText(`Level ${game.level} Clear`, W / 2, 395);
          ctx.font = "700 19px system-ui, sans-serif";
          ctx.fillStyle = "#f7fbff";
          ctx.fillText(`Score ${game.score}`, W / 2, 440);
          ctx.fillStyle = "#42e8ff";
          ctx.fillText("Tap for Next Level", W / 2, 478);
        }

        if (game.state === "gameover") {
          ctx.font = "800 38px system-ui, sans-serif";
          ctx.fillStyle = "#ff5d9e";
          ctx.fillText("Game Over", W / 2, 395);
          ctx.font = "700 19px system-ui, sans-serif";
          ctx.fillStyle = "#f7fbff";
          ctx.fillText(`Score ${game.score}`, W / 2, 440);
          ctx.fillStyle = "#ffd166";
          ctx.fillText("Tap to Retry", W / 2, 478);
        }
        ctx.restore();
      }

      function draw() {
        const dx = game.shake > 0.5 ? rand(-game.shake, game.shake) : 0;
        const dy = game.shake > 0.5 ? rand(-game.shake, game.shake) : 0;

        ctx.save();
        ctx.translate(dx, dy);
        drawBackground();
        drawBlocks();
        drawPowerUps();
        drawParticles();
        drawPaddle();
        drawBall();
        ctx.restore();

        drawHud();
        drawFlash();
        drawOverlay();
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener("blur", stopMusic);
      window.addEventListener("focus", () => {
        if (!muted && game.state === "playing") startMusic();
      });

      setSoundIcon();
      resetGame();
      loop();
    })();
  </script>
</body>
</html>
