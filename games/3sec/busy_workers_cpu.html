function normalizePlayer(p){
  if(!p)return;
  p.workers=Math.max(0, p.workers|0);
  p.traineeWorkers=Math.max(0, p.traineeWorkers||0);
  const cap=workerLimit(p);
  if(p.workers>cap)p.workers=cap;
  if(p.workers+p.traineeWorkers>cap)p.traineeWorkers=Math.max(0,cap-p.workers);
  p.availableWorkers=Math.max(0, Math.min(p.availableWorkers|0, p.workers));
}

function evalCard(card,p){
  let s=card.vp-card.cost*2;
  const r=game.round;
  if(card.vp>=18)s+=r>=7?18:6;
  if(card.vp>=24)s+=r>=7?28:8;
  // v39: 農場は序盤の燃料。ラウンド5以降に新しく建てる価値は低めにする。
  if(card.id==='farm')s+=r<=4?14:(r<=6?-18:-45);
  if(card.id==='plantation')s+=r<=6?16:(r<=8?7:1);
  if(card.id==='factory')s+=r<=7?14:6;
  if(card.id==='warehouse')s+=r<=5?10:1;
  if(card.id==='housing')s+=r<=5?18:(r<=6?6:-10);
  if(card.id==='builder')s+=r<=7?13:4;
  if(card.id==='general_contractor')s+=r<=8?16:6;
  if(card.id==='mansion')s+=r>=7?22:0;
  if(card.id==='realtor')s+=p.buildings.length*3 + (r>=7?12:0);
  if(card.id==='union')s+=p.workers*6 + (r>=7?8:0);
  if(card.id==='hq')s+=countKey(p)*6 + (r>=7?10:0);
  if(card.id==='railway')s+=countFactoryIcon(p)*8 + (r>=7?10:0);
  // v36: 人間ログ由来の優先カードを、単なる点数以上に評価する。
  s += cpuPriorityCardBonus(card, p);

function cpuLateBuildQualityAdjustment(card,p,discount=0){
  if(!card || !p || !p.isCPU)return 0;
  const r=game.round;
  let adj=0;
  if(r>=5 && card.id==='slash_burn')adj-=2200;
  if(r>=6 && ['farm','coffee'].includes(card.id))adj-=1300;
  if(r>=6 && ['warehouse','housing'].includes(card.id))adj-=700;
  if(r>=7 && card.vp<12)adj-=1500;
  if(r>=7 && card.sellable && card.vp<=10)adj-=1800;
  if(r>=6 && ['factory','steel','chemical','auto_factory','restaurant','builder','general_contractor','nikoshi','mansion','hq','railway','union','realtor'].includes(card.id))adj+=320;
  if(r>=7 && card.vp>=16)adj+=260;
  if(r>=7 && card.vp>=18)adj+=220;
  if(r>=8 && card.vp>=20)adj+=220;
  return adj;
}
function cpuLateBuildTargetIsGood(card,p){

  if(game.round<6)return true;
  return cpuLateBuildQualityAdjustment(card,p,0)>-500;
}

function drawableCardsAvailable(){return game.deck.length+game.discard.length;}
function needsDrawableCards(s){return ['draw','drawNextFirst','revealChoose','chemicalDraw'].includes(s.action);}
function canExecute(p,s){if(s.action==='none')return false; if(needsDrawableCards(s)&&drawableCardsAvailable()<=0)return false; if(['gainMoney','discardGain'].includes(s.action)&&s.amount&&!canGain(s.amount))return false; if(['discardGain','discardDraw'].includes(s.action)&&!canPay(p,s.discardCount||0))return false; if(s.action==='setWorkers')return s.amount?totalWorkersIncludingTraining(p)<workerLimit(p):totalWorkersIncludingTraining(p)<Math.min(s.target||0,workerLimit(p)); if(s.action==='addWorkerNow')return totalWorkersIncludingTraining(p)<workerLimit(p); if(s.action==='build')return !!bestBuild(p,0,null); if(s.action==='buildDiscount')return !!bestBuild(p,s.discount||1,null); if(s.action==='buildThenDraw')return !!bestBuild(p,0,null); if(s.action==='freeBuildFarm')return !!bestBuild(p,999,c=>c.icon==='farm'); if(s.action==='buildTwoSameCost')return canBuildTwo(p); return true;}
function cannotReason(p,s){

  if(['gainMoney','discardGain'].includes(s.action)&&s.amount&&!canGain(s.amount))return `${s.name}は家計不足です。必要$${s.amount}、現在$${game.household}です。`;
  if(['discardGain','discardDraw'].includes(s.action)&&!canPay(p,s.discardCount||0))return `${s.name}にはカード${s.discardCount}枚が必要です。建物${p.hand.length}枚＋消費財${p.goods}枚です。`;
  if(s.action==='build')return buildCannotReason(p,0,null,s.name);
  if(s.action==='buildDiscount')return buildCannotReason(p,s.discount||1,null,s.name);
  if(s.action==='buildThenDraw')return buildCannotReason(p,0,null,s.name);
  if(s.action==='freeBuildFarm')return buildCannotReason(p,999,c=>c.icon==='farm',s.name);
  if(s.action==='buildTwoSameCost')return canBuildTwo(p)?`${s.name}は現在使えません。`:`${s.name}は同じコストの建物カード2枚と支払いカードが足りません。`;

function buildCannotReason(p,discount=0,filter=null,name='建築'){
  const candidates=p.hand.filter(c=>!filter||filter(c));
  if(candidates.length===0)return `${name}で建てられる建物カードが手札にありません。`;
  const affordable=candidates.filter(c=>totalHandCount(p)-1>=Math.max(0,c.cost-(discount>=999?c.cost:discount)));
  if(!affordable.length){
    const best=candidates.slice().sort((a,b)=>Math.max(0,a.cost-(discount>=999?a.cost:discount))-Math.max(0,b.cost-(discount>=999?b.cost:discount)))[0];
    const need=Math.max(0,best.cost-(discount>=999?best.cost:discount));
    return `${name}で建てるには支払いカードが足りません。最小必要${need}枚分、現在は建物${p.hand.length-1}枚＋消費財${p.goods}枚です。`;
  }
  return `${name}は現在使えません。`;
}
function discardHand(p,uids){uids.forEach(uid=>{const i=p.hand.findIndex(c=>c.uid===uid);if(i>=0)game.discard.push(p.hand.splice(i,1)[0]);});}
function cpuProtectedCard(card,p){
  if(!card)return false;
  if(card.vp>=18)return true;
  if(['mansion','hq','railway','union','realtor','auto_factory','general_contractor','builder','nikoshi','factory','steel','chemical','restaurant','orchard','plantation'].includes(card.id))return true;
  if(cpuPriorityCardTier(card)>=4)return true;
  if(game.round>=7 && card.vp>=16)return true;
  // v64: ここで cpuBuildPlan() を呼ぶと、
  // cpuBuildPlan -> evalCard -> cpuPriorityCardBonus -> 二胡市ペア判定 -> lowCards -> cpuDiscardValue -> cpuProtectedCard

  return false;
}
function cpuDiscardValueBasic(card,p){
  if(!card)return 0;
  let v=card.vp + card.cost*0.5;
  const tier=cpuPriorityCardTier(card);
  if(card.vp>=18)v+=120;
  if(['mansion','hq','railway','union','realtor','auto_factory','general_contractor','builder','nikoshi','factory','steel','chemical','restaurant','orchard','plantation'].includes(card.id))v+=120;
  if(tier>=4)v+=180;
  if(tier===3)v+=90;
  if(game.round>=7 && card.vp>=14)v+=30;
  if(card.id==='farm'&&game.round>=7)v-=20;
  if(card.id==='warehouse'&&game.round>=7)v-=15;
  return v;

function cpuDiscardValue(card,p){

  let v=cpuDiscardValueBasic(card,p);
  if(cpuProtectedCard(card,p))v+=120;

}
function lowCards(p,n,exclude=[]){return p.hand.filter(c=>!exclude.includes(c.uid)).sort((a,b)=>cpuDiscardValue(a,p)-cpuDiscardValue(b,p)||a.cost-b.cost).slice(0,n);} 
function lowCardsBasic(p,n,exclude=[]){return p.hand.filter(c=>!exclude.includes(c.uid)).sort((a,b)=>cpuDiscardValueBasic(a,p)-cpuDiscardValueBasic(b,p)||a.cost-b.cost).slice(0,n);} 
function autoPay(p,cost,exclude=[]){let g=Math.min(p.goods,cost);p.goods-=g;let r=cost-g;if(r>0)discardHand(p,lowCards(p,r,exclude).map(c=>c.uid));addLog(`${p.name}は支払いとして消費財${g}枚、建物カード${r}枚を使いました。`);}
function buildCard(p,uid,cost,payUids,goodsUsed){const i=p.hand.findIndex(c=>c.uid===uid);if(i<0)return false;if(payUids.length+goodsUsed!==cost||p.goods<goodsUsed)return false;const card=p.hand.splice(i,1)[0];p.goods-=goodsUsed;discardHand(p,payUids);card.used=false;if(p.isCPU&&['builder','general_contractor'].includes(card.id)){card.needsFirstUse=true;card.builtRound=game.round;}p.buildings.push(card);trackBuiltCardStats(p,card);addLog(`${p.name}は${card.name}を建てました。コストは建物カード${payUids.length}枚、消費財${goodsUsed}枚です。`);return true;} function cpuBuild(p,card,discount=0){const cost=discount>=999?0:Math.max(0,card.cost-discount);const g=Math.min(p.goods,cost);const r=cost-g;const pay=lowCards(p,r,[card.uid]).map(c=>c.uid);buildCard(p,card.uid,cost,pay,g);}
// v58: 公共化した工場・レストラン・建築系など、支払い/選択モーダルを開く行動は
// watchdogで途中復帰させない。v57では1.5秒watchdogがモーダル待ちを「停止」と誤判定し、
// 労働者だけ使用済み・効果なしに見える事故が起きた。
function humanPublicActionMayWaitForChoice(s){
  return ['discardGain','discardDraw','build','buildDiscount','buildThenDraw','revealChoose','freeBuildFarm','buildTwoSameCost'].includes(s.action);
}
function isModalOpen(){
  const m=$('modalBack');
  return !!m && m.style.display==='flex';
}
function usePublic(id){
  const p=currentPlayer();
  if(recoverHumanInputIfStale(true))render();
  if(p.isCPU||game.thinking||game.actionLock||game.gameOver)return;
  const s=publicSources().find(x=>pkey(x)===id||x.id===id);
  if(!s)return;
  if(!s.multiUse&&usedPublic(s)){addLog('その公共職場は使用済みです。');render();return;}
  if(!canExecute(p,s)){addLog(cannotReason(p,s));render();return;}
  if(!spendWorker(p)){render();return;}
  game.actionLock=true;
  markPublic(s);

  let settled=false;
  const mayWait=humanPublicActionMayWaitForChoice(s);
  const clearAndSettle=()=>{settled=true;if(humanWatchdog)clearTimeout(humanWatchdog);};
  const humanWatchdog=mayWait?null:setTimeout(()=>{
    if(settled || game.gameOver || isModalOpen())return;
    clearAndSettle();
    addLog(`${s.name}の処理が止まったため、安全復帰しました。`);
    unmarkPublic(s);
    refundWorker(p);
    game.thinking=false;
    game.actionLock=false;
    render();
  },2500);

  const ok=()=>{
    if(settled)return;
    clearAndSettle();
    finishAction(p);
  };
  const cancel=()=>{
    if(settled)return;
    clearAndSettle();
    unmarkPublic(s);
    refundWorker(p);
    game.actionLock=false;
    render();
  };

  try{
    executeAction(p,s,null,ok,cancel);
    // 支払い/建築/選択系はここでモーダルが開いていれば正常。OK/キャンセルまで待つ。
    // モーダルが開かなかった場合でも、executeAction内で即時完了するものはok()が呼ばれている。
    if(mayWait && !settled && !isModalOpen()){
      addLog(`${s.name}の選択画面を開けなかったため、行動を取り消しました。`);
      cancel();
    }
  }catch(e){
    console.error('usePublic failed',e);
    addLog(`${s.name}の処理でエラーが出たため、行動を取り消しました。`);
    cancel();
  }
}
function useBuilding(uid){
  const p=humanPlayer();
  if(recoverHumanInputIfStale(true))render();
  if(game.thinking||game.actionLock||game.gameOver)return;
  if(!currentPlayer() || currentPlayer().id!==p.id){addLog('今はあなたの手番ではありません。');render();return;}
  const b=p.buildings.find(x=>x.uid===uid);
  if(!b){addLog('その建物が見つかりません。');render();return;}
  if(b.used||b.action==='none'||!canExecute(p,b)){
    addLog(b.used?`${b.name}は使用済みです。`:cannotReason(p,b));
    render();
    return;
  }
  if(!spendWorker(p)){render();return;}
  game.actionLock=true;
  b.used=true;

  // v51: 人間の建物使用をロック付きで原子的に処理する。
  // クリック連打や0msのターン進行待ちで、労働者だけ消えて効果が見えない事故を防ぐ。
  const cancel=()=>{b.used=false;refundWorker(p);game.actionLock=false;render();};
  const ok=()=>{if(['builder','general_contractor'].includes(b.id))b.needsFirstUse=false;finishAction(p);};

  // 製鉄所などの「支払いなし即時ドロー」は、ここで確実に実行する。
  if(b.action==='draw'){
    const drew=drawCards(p,b.drawCount||1);
    if(drew<=0){addLog(`${b.name}は山札・捨て札が空のため、カードを引けませんでした。`);}
    finishAction(p);
    return;
  }
  if(b.action==='chemicalDraw'){
    const drawN=p.hand.length===0?4:2;
    const drew=drawCards(p,drawN);
    if(drew<=0){addLog(`${b.name}は山札・捨て札が空のため、カードを引けませんでした。`);}
    finishAction(p);
    return;
  }

  executeAction(p,b,b,ok,cancel);
}

// 先に actionLock を解除してからターン進行する。advanceTurn 側も例外で止まらないように保護する。
function finishAction(actor=null){
  const actorPlayer=actor||currentPlayer();
  game.actionLock=false;
  const go=()=>{
    try{
      advanceTurn();
    }catch(e){
      console.error('advanceTurn failed',e);
      addLog('ターン進行でエラーが出たため、安全復帰しました。');
      game.thinking=false;
      game.actionLock=false;
      render();
    }
  };
  if(actorPlayer&&actorPlayer.isCPU)setTimeout(go,250);
  else go();
}

function advanceTurn(){
  if(game.gameOver)return;
  normalizeAllPlayers();
  const a=game.players[0],b=game.players[1];
  if(a.availableWorkers<=0&&b.availableWorkers<=0){
    if(!game.roundEndReady){
      game.roundEndReady=true;
      addLog('全員の労働者を配置しました。ラウンド終了ボタンを押して給料支払いへ進んでください。');
    }
    render();
    return;
  }
  game.roundEndReady=false;
  const cur=game.currentPlayerIndex,oth=otherIndex(cur);
  if(game.players[oth].availableWorkers>0)game.currentPlayerIndex=oth;
  else if(game.players[cur].availableWorkers>0)game.currentPlayerIndex=cur;
  render();
  if(currentPlayer().isCPU)scheduleCpuTurn(600);
}

function cpuBuildTwo(p,onOK,onCancel){const groups={};p.hand.forEach(c=>(groups[c.cost]??=[]).push(c));let best=null;Object.keys(groups).forEach(k=>{const cost=+k,arr=groups[k];if(arr.length>=2&&totalHandCount(p)-2>=cost){const top=[...arr].sort((a,b)=>evalCard(b,p)-evalCard(a,p)).slice(0,2);const val=evalCard(top[0],p)+evalCard(top[1],p);if(!best||val>best.val)best={cost,cards:top,val};}});if(!best){onCancel();return;}let g=Math.min(p.goods,best.cost);let r=best.cost-g;const pay=lowCards(p,r,best.cards.map(c=>c.uid)).map(c=>c.uid);p.goods-=g;discardHand(p,pay);best.cards.forEach(s=>{const i=p.hand.findIndex(c=>c.uid===s.uid);if(i>=0){const b=p.hand.splice(i,1)[0];b.used=false;p.buildings.push(b);trackBuiltCardStats(p,b);}});addLog(`${p.name}は二胡市建設で${best.cards[0].name}と${best.cards[1].name}を建てました。`);onOK();}
function wageWorkers(p){return totalWorkersIncludingTraining(p);}

function cpuSafetyMargin(){return game.round<=3?3:(game.round<=6?6:10);}

function cpuBuildPlan(p){
  if(!p.hand.length)return null;
  let best=null;
  p.hand.forEach(c=>{
    const need=Math.max(0,c.cost);
    const canNow=totalHandCount(p)-1>=need;
    let v=evalCard(c,p)+c.vp+cpuPriorityCardBonus(c,p);
    if(game.round>=7)v+=c.vp*1.4;
    if(c.vp>=18)v+=25;
    if(c.sellable && c.vp>=16)v+= game.round>=7 ? 45 : 18;

    if(!canNow)v-=Math.max(0,need-(totalHandCount(p)-1))*10;
    if(!best||v>best.value)best={card:c,value:v,need,canNow};
  });

function cpuGoodsValue(p){

// ===== v36: 人間ログ由来のCPU判断ヘルパー =====
// 人間の強い動き：建設会社・ゼネコンで点数化、果樹園/大農園/レストランで燃料確保、
// 工場/製鉄所/化学工場で手札を再生、二胡市建設は来た時だけ高く見る。
function cpuPriorityCardTier(card){
  if(!card)return 0;
  if(['builder','general_contractor'].includes(card.id))return 5;          // 建築エンジン
  if(card.id==='nikoshi')return 5;                                         // 高得点2枚建て狙い
  if(['factory','steel','chemical','auto_factory'].includes(card.id))return 4; // 手札再生
  if(['orchard','plantation','restaurant'].includes(card.id))return 4;      // 消費財/現金エンジン
  if(['mansion','hq','railway','realtor','coop','union'].includes(card.id))return 3; // 終盤得点源
  if(card.vp>=18)return 3;
  if(card.vp>=16)return 2;
  return 0;
}
function cpuIsEngineCard(card){return cpuPriorityCardTier(card)>=4;}
function cpuPriorityCardBonus(card,p){
  if(!card)return 0;
  const r=game.round;
  let b=0;
  const tier=cpuPriorityCardTier(card);
  if(tier>=5)b+=r>=6?160:110;
  else if(tier>=4)b+=r>=6?115:80;
  else if(tier>=3)b+=r>=7?90:35;
  if(card.id==='factory')b+=r<=7?95:50;                 // コスト2で4枚引く準備を作る
  if(card.id==='steel')b+=r>=6?130:75;                  // 20点+3枚引き
  if(card.id==='chemical')b+=r>=6?110:65;
  if(card.id==='restaurant')b+=r>=5?135:75;             // 16点+$15+売却保険
  if(card.id==='orchard')b+=totalHandCount(p)<=3?100:45; // 手札合計4枚まで消費財
  if(card.id==='plantation')b+=p.goods<=2?80:35;
  if(card.id==='builder')b+=p.hand.length>=2?100:60;
  if(card.id==='general_contractor')b+=p.hand.length>=2?125:75;
  if(card.id==='nikoshi'){
    const pair=cpuBestTwoBuildPair(p);
    const pairAfter=cpuBestTwoBuildPairAfterBuilding(p,card,0);
    if(pair)b+=pair.val>=38?260:(pair.val>=30?180:90);
    if(pairAfter)b+=pairAfter.val>=38?340:(pairAfter.val>=30?260:130);
    b+=cpuNikoshiTimingBonus(p,card,0);
  }
  // 消費財があるほど高コスト建物を建てやすい。人間ログではここが強い。
  if(card.cost>=4 && p.goods>=2)b+=45;
  if(card.cost>=4 && p.goods>=3)b+=45;
  // v39: ラウンド5以降、農場を新規建築する優先度を下げる。果樹園・大農園は維持。
  if(card.id==='farm' && r>=5)b-=r>=7?120:70;
  return b;
}
function cpuSimplePairCardValue(c,p){
  return c.vp + cpuPriorityCardTier(c)*12 + (c.id==='mansion'?18:0) + (c.id==='union'?p.workers*6:0) + (c.id==='realtor'?p.buildings.length*3:0) + (c.id==='coop'?p.goods*3:0);
}
function cpuBestTwoBuildPairFromCards(p,cards,goodsLeft){
  const groups={};
  cards.forEach(c=>(groups[c.cost]??=[]).push(c));
  let best=null;
  Object.keys(groups).forEach(k=>{
    const cost=+k, arr=groups[k];
    if(arr.length<2 || (cards.length+goodsLeft)-2<cost)return;
    const top=arr.slice().sort((a,b)=>cpuSimplePairCardValue(b,p)-cpuSimplePairCardValue(a,p)).slice(0,2);
    const val=top[0].vp+top[1].vp;

    if(['steel','chemical','auto_factory','factory'].includes(s.id))bonus+=300;

  if(cpuSafetyGap(p)>0 && !['gainMoney','discardGain'].includes(s.action))bonus=Math.round(bonus*0.45);

}

  if(quarry && r>=6 && r<=8 && p.availableWorkers>=1){
    const incomeScore=bestIncome?bestIncome.score:-999;
    const st=ensureStats(p);
    const cashSafeForQuarry = p.money>=cpuWageDue(p)+6 && cpuSafetyGap(p)===0 && (st.quarryActions||0)<=1;

function cpuLikelyBuildingSaleAfterAction(p,s){
  if(game.round<7)return false;
  if(!cpuLikelySalaryShortAfterAction(p,s))return false;
  // この行動後に労働者が残らないなら、給料時に売却がかなり濃厚。
  // 労働者が残る場合でも、現金不足が大きく収入行動でないなら危険扱いにする。
  const projectedShort=cpuProjectedWageDueAfterAction(p,s)-cpuProjectedMoneyAfterAction(p,s);
  const workersLeftAfterThis=Math.max(0,p.availableWorkers-1);
  const isIncome=['gainMoney','discardGain'].includes(s.action);
  if(workersLeftAfterThis<=0)return true;
  return !isIncome && projectedShort>=8;
}

// ===== v46: 終盤に建てた建物をそのまま給料で売る動きを止める =====
// v45でもラウンド8〜9に、現金が足りないのに建設会社で工場を建て、
// 直後の給料でその工場を売る動きが残った。
// 建物の点数ではなく「給料後に残せるか」を強く見る。
function cpuLateBuildCashRiskPenalty(p,s,target){
  if(!p || !p.isCPU || !target || !cpuIsBuildAction(s))return 0;
  if(game.round<7)return 0;
  const wageDue=cpuProjectedWageDueAfterAction(p,s);
  const cashAfter=cpuProjectedMoneyAfterAction(p,s);
  const allowedUnpaid=game.round>=8?6:4;
  const shortage=Math.max(0,wageDue-cashAfter);
  if(shortage<=allowedUnpaid)return 0;

  const workersLeftAfterThis=Math.max(0,p.availableWorkers-1);
  let pen=0;

  // 最後の労働者で現金不足のまま建てると、ほぼ売却確定。
  if(workersLeftAfterThis<=0)pen-=5200;
  else pen-=2200 + shortage*90;

  // ラウンド8以降は、低〜中VPの売却可能建物を「給料担保」として建てない。
  if(game.round>=8 && target.sellable)pen-=900;
  if(game.round>=8 && target.sellable && target.vp<=12)pen-=1600;

  // 工場は強いが、終盤に現金不足のまま建てると売却ループになりやすい。
  if(game.round>=8 && ['factory','coffee','farm','orchard'].includes(target.id))pen-=1800;

  // ただし高得点・非売却の最終得点カードは少しだけ許容する。
  if(!target.sellable && target.vp>=18)pen+=900;
  if(target.vp>=24)pen+=700;
  return pen;
}
function cpuSalaryGuardMode(p){
  const due=cpuWageDue(p);
  const st=ensureStats(p);
  // v52: 売却だけでなく、未払いが2回以上出た時点でも守備モードへ入る。
  // 今回のログでは売却1回でも未払い6回になっていたため、未払い癖を早めに止める。
  // v75: 建物が少なすぎる段階で守備モードに入ると、現金行動だけで沈む。
  // 売却/未払い後でも、序中盤かつ建物0〜1枚なら強い建築で復帰できる余地を残す。
  const trouble=((p.soldBuildings||0)>=2 || (st.unpaidEvents||0)>=2 || (st.unpaidAmount||0)>=10);
  if(!trouble || cpuAttackReady(p) || p.money>=due+12)return false;
  if(game.round<=6 && p.buildings.length<2 && cpuStrongBuildCandidate(p))return false;
  return true;
}
function cpuSalaryGuardReleased(p){
  const st=ensureStats(p);
  return ((p.soldBuildings||0)>=2 || (st.unpaidEvents||0)>=2 || (st.unpaidAmount||0)>=10) && cpuAttackReady(p);
}

// ===== v43: 守備から攻撃へ戻る判定 =====
// v40でCPUは破産しにくくなったが、終盤に公共職場へ寄りすぎることがあった。
// 現金と消費財に余裕がある時は、建設を再び強く評価する。
function cpuAttackReady(p){
  const wageDue=cpuWageDue(p);
  if(game.round<7 || wageDue<=0)return false;
  const strongBuild=!!cpuStrongBuildCandidate(p);
  // v50: 4人だと給料2回分は$40になり、攻撃モードに一度も入れなかった。
  // 「次給料 + 10」または「次給料を払える＋強い建築候補」で攻撃復帰を許可する。
  if(p.money>=wageDue+10 && (p.goods>=1 || p.hand.length>=3 || strongBuild))return true;
  if(p.money>=wageDue && p.goods>=2 && strongBuild)return true;
  if(game.round>=8 && p.money>=wageDue+4 && strongBuild && p.buildings.length<=3)return true;
  return false;
}
function cpuAttackBuildBonus(p){
  let b=820;
  if(p.buildings.length<=2)b+=1250;
  else if(p.buildings.length<=3)b+=950;
  else if(p.buildings.length<=5)b+=520;
  b+=cpuBehindBuildingGoal(p)*145;
  if(game.round>=8)b+=260;
  return b;
}
function cpuAttackIncomePenalty(p){
  if(!cpuAttackReady(p))return 0;
  let pen=360;
  if(p.buildings.length<=3)pen+=620;
  else if(p.buildings.length<=5)pen+=300;
  if(game.round>=8)pen+=160;
  return pen;
}

function cpuIncomeScore(p,amount,cost){
  const need=cpuNeedsMoney(p);
  const emergency=cpuEmergency(p);
  const safetyGap=cpuSafetyGap(p);
  const wageDue=cpuWageDue(p);
  const cashShort=Math.max(0,wageDue-p.money);
  const goodsUse=Math.min(p.goods,cost);
  const handUse=Math.max(0,cost-goodsUse);
  let sc=0;
  if(emergency){
    const gap=Math.max(0,-cpuSolvency(p));
    // 未払い回避中は現金を最優先。カードを捨てても未払いを減らす価値が高い。
    sc += 160 + amount*8 + Math.min(amount,Math.max(gap,cashShort))*14;
    if(amount>=cashShort) sc += 70;
    if(handUse>0) sc -= handUse*(game.round>=8?10:6);
    if(goodsUse>0) sc -= goodsUse*2;
    return sc;
  }else if(safetyGap>0 || cashShort>0){
    const target=Math.max(safetyGap,cashShort);
    sc += 80 + Math.min(amount,target)*8 + Math.max(0,amount-target)*1.2;
    if(amount>=target)sc+=35;
    sc -= handUse*(game.round>=8?14:8);
    sc -= goodsUse*2;
    return sc;
  }else if(need>0){
    sc += Math.min(amount,need)*5 + Math.max(0,amount-need)*0.8;
  }else{
    sc += amount*(game.round>=7?0.12:0.35);
    if(game.round>=7) sc-=32;
  }
  sc -= cpuEffectiveCostPenalty(p,cost);
  if(game.round>=8 && cost>0 && safetyGap===0 && !emergency) sc-=30;
  return sc;
}
function cpuWorkerScore(p,s){
  const r=game.round;
  const after = cpuWorkerAfterAction(p,s);
  const add = Math.max(0,after-p.workers);
  if(add<=0)return -80;
  let risk=cpuWorkerGrowthRisk(p,after);
  // v75: 研修中労働者も給料対象なので、学校系のリスクは軽減しない。
  let sc=0;

  // 3人目は最優先級。2人のままでは行動回数が足りない。
  if(after<=3){
    sc += r<=2 ? 1450 : (r<=3 ? 1050 : (r<=5 ? 650 : 260));
    sc -= risk*0.45;
    return sc;
  }

  // 4人目はCPUの基本ゴール。ラウンド4〜6で強く取り、7以降でも3人以下ならまだ狙う。
  if(after===4){
    if(r<=3)sc += 180;             // 早すぎる4人化は少し控えめ
    else if(r<=6)sc += 1250;       // 本命タイミング
    else if(r<=8)sc += 820;        // 終盤でも4人未満なら価値あり
    else sc += 300;
    if(p.workers<=2)sc += 260;     // 2人から一気に4人にできるなら強い
    if(!cpuCanGrowTo(p,4))sc -= r<=6 ? 950 : 1150;
    else if(cpuIncomeOpportunity(p) || cpuStrongBuildCandidate(p))sc += 220;
    sc -= risk*0.55;
    return sc;
  }

  // 5人目は原則抑制。給料2回分級の余裕がある時だけ小さく評価。
  if(after>=5){
    sc += cpuCanGrowTo(p,after) ? 180 : -1300;
    sc -= risk*0.8;
    if(r>=7)sc-=420;
    return sc;
  }
  return -80;
}

function evalSource(s,p,isPub){
  let sc=isPub&&s.id!=='mine'?3:0;
  const r=game.round;
  const emergency=cpuEmergency(p);
  const safetyGap=cpuSafetyGap(p);
  const behind=cpuBehindBuildingGoal(p);
  const plan=cpuBuildPlan(p);
  const beforeSolvency=cpuSolvency(p);
  switch(s.action){
    case'draw': sc+=(s.drawCount||1)*cpuDrawValue(); if(p.hand.length<=2)sc+=8; if(r>=7)sc-=12; if(plan&&!plan.canNow&&r<=7)sc+=6; break;
    case'drawGoods':
    case'drawGoodsSelfTrash': {
      sc+=(s.drawCount||1)*cpuGoodsValue(p);
      if(plan&&!plan.canNow&&plan.need>p.goods)sc+=Math.min((s.drawCount||1),plan.need-p.goods)*18;
      if(p.hand.some(c=>cpuPriorityCardTier(c)>=3 && c.cost>=3))sc+=(s.drawCount||1)*(r<=7?18:8);
      if(['orchard','plantation'].includes(s.id))sc+=r<=7?90:35;
      if(r>=8 && !bestBuild(p,0,null))sc-=22;
      break;
    }
    case'gainMoney': sc+=cpuIncomeScore(p,s.amount||0,0); break;
    case'discardGain': sc+=cpuIncomeScore(p,s.amount||0,s.discardCount||0); if(s.id==='restaurant')sc+=game.round>=5?120:70; break;
    case'discardDraw': sc=(s.drawCount||0)*cpuDrawValue()-cpuEffectiveCostPenalty(p,s.discardCount||0); if(p.hand.length<=2)sc+=12; if(['factory','auto_factory'].includes(s.id))sc+=r<=7?85:35; if(r>=7)sc-=25; break;
    case'build': {
      const c=bestBuild(p,0,null);
      sc=c?evalCard(c,p)+cpuBuildBias()+cpuBuildShortageBonus(p,c)+cpuSellableInsuranceBonus(p,c)+cpuPriorityCardBonus(c,p)+cpuNikoshiTimingBonus(p,c,0):-999;
      if(c){ sc+=behind*24; if(r>=7)sc+=c.vp*1.4; if(plan&&plan.card&&plan.card.uid===c.uid)sc+=30; if(safetyGap>0)sc+=c.sellable?20:-90; if(r>=7 && p.money<cpuWageDue(p))sc+=c.sellable?35:-140; }
      if(c && emergency){
        // v46: 終盤は売却目的の建築をしない。序中盤だけ売却保険を少し評価。
        sc += game.round>=7 ? (c.sellable ? -900 : -120) : (c.sellable ? c.vp*2 : -45);
      }
      break;
    }
    case'buildDiscount': {
      const c=bestBuild(p,s.discount||1,null);
      sc=c?evalCard(c,p)+cpuBuildBias()+8+cpuBuildShortageBonus(p,c)+cpuSellableInsuranceBonus(p,c)+cpuPriorityCardBonus(c,p)+cpuNikoshiTimingBonus(p,c,s.discount||1):-999;
      if(c){ sc+=behind*24; if(r>=7)sc+=c.vp*1.4; if(plan&&plan.card&&plan.card.uid===c.uid)sc+=32; if(safetyGap>0)sc+=c.sellable?20:-90; if(r>=7 && p.money<cpuWageDue(p))sc+=c.sellable?35:-140; }
      if(c && emergency) sc += game.round>=7 ? (c.sellable ? -900 : -120) : (c.sellable ? c.vp*2 : -45);
      break;
    }
    case'buildThenDraw': {
      const c=bestBuild(p,0,null);
      sc=c?evalCard(c,p)+cpuBuildBias()+8+(s.drawCount||2)*cpuDrawValue()+cpuBuildShortageBonus(p,c)+cpuSellableInsuranceBonus(p,c)+cpuPriorityCardBonus(c,p)+cpuNikoshiTimingBonus(p,c,0):-999;
      if(c){ sc+=behind*24; if(r>=7)sc+=c.vp*1.4; if(plan&&plan.card&&plan.card.uid===c.uid)sc+=32; if(safetyGap>0)sc+=c.sellable?20:-90; if(r>=7 && p.money<cpuWageDue(p))sc+=c.sellable?35:-140; }
      if(c && emergency) sc += game.round>=7 ? (c.sellable ? -900 : -120) : (c.sellable ? c.vp*2 : -45);
      break;
    }
    case'setWorkers':
    case'addWorkerNow': sc=cpuWorkerScore(p,s); break;
    case'revealChoose': sc=(r<=6?16:4); if(p.hand.length<=2)sc+=8; if(r>=8)sc-=12; break;
    case'chemicalDraw': sc=(p.hand.length===0?4:2)*cpuDrawValue(); break;
    case'freeBuildFarm': {
      const c=bestBuild(p,999,c=>c.icon==='farm');
      sc=c?evalCard(c,p)+cpuBuildBias()+4+cpuBuildShortageBonus(p,c)+cpuSellableInsuranceBonus(p,c)+cpuPriorityCardBonus(c,p)+cpuNikoshiTimingBonus(p,c,999):-999;
      if(c && emergency) sc += game.round>=7 ? (c.sellable ? -900 : -120) : (c.sellable ? c.vp*2 : -45);
      if(r>=8)sc-=20;
      break;
    }
    case'buildTwoSameCost': sc=canBuildTwo(p)?cpuBuildBias()+60+behind*28+cpuBuildShortageBonus(p,null)+(r>=7?55:0):-999; break;
    case'drawUntilHand': sc=Math.max(0,(s.target||4)-totalHandCount(p))*cpuGoodsValue(p); break;
    default: sc=0;
  }


  // v44: ラウンド6以降、建設会社・大工・ゼネコンで低価値建物を建てる動きは強く抑える。
  // 低価値建物を増やして給料時に売るループを防ぎ、製鉄所・工場・レストラン・高VP建物へ寄せる。
  if(cpuIsBuildAction(s)){
    const target=cpuBuildResultCardForAction(p,s);
    if(target){
      sc += cpuLateBuildQualityAdjustment(target,p,(s.action==='buildDiscount')?(s.discount||1):(s.action==='freeBuildFarm'?999:0));
      if(game.round>=6 && !cpuLateBuildTargetIsGood(target,p))sc-=900;
      sc += cpuLateBuildCashRiskPenalty(p,s,target);
    }
  }

  // 強い公共化建物や強い建築職場は取り合いなので高く評価する。
  if(isPub){
    const pp=cpuPublicPower(s);
    if(pp>0)sc += pp*(r>=7?0.9:0.45);
    const block=cpuOpponentBlockBonus(p,s);
    if(block>0)sc += block;
    if(cpuIsBuildAction(s) && r>=7)sc += 180;
  }

  // 未払い回避モード：現金か売却可能資産につながらない行動は強く下げる。
  if(emergency){
    const isIncome=['gainMoney','discardGain'].includes(s.action);
    const isBuild=['build','buildDiscount','buildThenDraw','freeBuildFarm','buildTwoSameCost'].includes(s.action);
    if(!isIncome && !isBuild) sc-=70;
    if(['draw','drawGoods','drawGoodsSelfTrash','revealChoose','discardDraw','chemicalDraw','drawUntilHand'].includes(s.action)) sc-=35;
  }

  // 給料安全ライン：不足している時は現金収入を優先し、準備行動を抑える。
  if(safetyGap>0){
    if(['gainMoney','discardGain'].includes(s.action))sc+=Math.min(s.amount||0,safetyGap)*4;
    else if(!['build','buildDiscount','buildThenDraw','freeBuildFarm','buildTwoSameCost'].includes(s.action))sc-=35;
  }
  // v40: ラウンド6以降、給料不足になりそうなら現金行動を強く加点する。
  if(r>=6 && ['gainMoney','discardGain'].includes(s.action) && cpuLikelySalaryShortAfterAction(p,s)){
    sc += 1000;
  }

  // v40: ラウンド7以降、給料時に建物売却が起きそうな行動は大きく減点する。
  if(r>=7 && cpuLikelyBuildingSaleAfterAction(p,s)){
    sc -= 3000;
  }

  // v40: CPUが2回以上建物を売った後は、給料2回分の現金を持つまで守備的にする。
  if(cpuSalaryGuardMode(p)){
    const noBuildingRecovery=(p.buildings.length===0 && game.round>=5);
    if(['gainMoney','discardGain'].includes(s.action))sc += (noBuildingRecovery?360:1100) + Math.min(s.amount||0, cpuSafetyGap(p)+8)*12;
    if(cpuIsBuildAction(s))sc += noBuildingRecovery ? 1250 : -950;
    if(s.action==='drawNextFirst')sc -= 1300;
    if(['setWorkers','addWorkerNow'].includes(s.action))sc -= 900;
    if(['draw','revealChoose','discardDraw','chemicalDraw'].includes(s.action))sc -= 320;
    if(['drawGoods','drawGoodsSelfTrash','drawUntilHand'].includes(s.action))sc += 20;
  }

  // v40: ただし現金が給料2回分を超えたら、守備モードを解除して建設重視に戻す。
  if(cpuSalaryGuardReleased(p) && cpuIsBuildAction(s)){
    sc += 650 + behind*80;
  }

  // v43: 給料2回分以上の現金＋消費財2枚以上なら、守備から攻撃へ戻す。
  if(cpuAttackReady(p)){
    if(cpuIsBuildAction(s))sc += cpuAttackBuildBonus(p);
    else if(['gainMoney','discardGain'].includes(s.action) && cpuNeedsMoney(p)===0)sc -= cpuAttackIncomePenalty(p);
    else if(['drawGoods','drawGoodsSelfTrash','drawUntilHand'].includes(s.action) && bestBuild(p,0,null))sc -= 90;

    // v44: 安全圏で$5〜$6の小銭行動へ流れ続けるのを抑える。
    if(['gainMoney','discardGain'].includes(s.action) && cpuNeedsMoney(p)===0){
      const amt=s.amount||0;
      if(amt<=6)sc-=950;
      else if(amt<=12)sc-=420;
    }
    if(game.round>=8 && ['farm','slash_burn','orchard'].includes(s.id) && bestBuild(p,0,null))sc-=260;
  }

  // v50: 攻撃復帰条件を満たしたら、守備パッチより建設を上に押し戻す。
  if(cpuAttackReady(p)){
    if(cpuIsBuildAction(s)){
      const target=cpuBuildResultCardForAction(p,s);
      if(target && cpuLateBuildTargetIsGood(target,p))sc += 520;
    }
    if(['gainMoney','discardGain'].includes(s.action) && cpuNeedsMoney(p)===0){
      const amt=s.amount||0;
      if(amt<=12)sc-=300;
    }
  }

  // ラウンド別目標：建物枚数が遅れている時は建築を強く優先する。
  if(behind>0){
    if(cpuIsBuildAction(s))sc+=behind*(r>=7?42:30);
    if(r>=5 && ['gainMoney','discardGain'].includes(s.action) && safetyGap===0)sc-=behind*(r>=8?48:22);
  }
  // 終盤の現金行動は、給料穴埋め以外では点になりにくい。
  sc-=cpuLateCashPenalty(p,s);
  // 終盤の得点効率：点にならない準備行動を大きく下げる。
  if(r>=8 && !cpuIsBuildAction(s) && !['gainMoney','discardGain'].includes(s.action))sc-=35;
  // 現金が給料分より少ないラウンド後半は、準備行動を避ける。
  if(r>=6 && cpuCashSurplus(p)<0 && ['draw','drawGoods','drawGoodsSelfTrash','revealChoose','discardDraw','chemicalDraw','drawUntilHand'].includes(s.action)) sc-=25;
  if(r>=7 && ['market','supermarket','department','expo','stall'].includes(s.id) && cpuNeedsMoney(p)===0 && !emergency)sc-=24;
  if(r>=8 && ['university','vocational'].includes(s.id))sc-=90;
  if(r>=8 && ['school','highschool'].includes(s.id) && p.workers>=4)sc-=50;
  if(beforeSolvency<5 && ['school','highschool','university','vocational'].includes(s.id))sc-=60;
  if(s.action==='drawNextFirst'){
    const publicPower=cpuBestPublicPower();
    const st=ensureStats(p);
    sc += cpuDrawValue();
    // v52: 採石所連打で先手を取っても、現金不足だと未払いが増えるだけ。
    // 先手予約は「給料を払える＋強い奪い先がある＋まだ取りすぎていない」時だけ高評価。
    sc += game.round<=2 ? 20 : (game.round<=6 ? 35 : 45);
    if(publicPower>0)sc += Math.min(420, publicPower*.45);
    if(game.nextFirstPlayerIndex===game.players.indexOf(p)) sc -= 80;
    if((st.quarryActions||0)>=2) sc -= 650;
    if((st.quarryActions||0)>=3) sc -= 1200;
    if(emergency || safetyGap>0 || p.money<cpuWageDue(p)+6) sc -= 900;
    if(publicPower<620 && game.round>=6) sc -= 320;
    if(game.round>=9) sc -= 999;
  }
  // デバッグ表示で極端なマイナスが並ぶと、判断不能に見えるため下限を設ける。
  // ただし順位付けは保つため、完全な0固定ではなく軽い下限にする。
  if(sc<-5000)sc=-5000;
  return sc;
}
function cpuActions(p){
  const a=[];
  publicSources().forEach(s=>{if((s.multiUse||!usedPublic(s))&&canExecute(p,s))a.push({type:'public',s,label:s.name,score:evalSource(s,p,true)});});
  p.buildings.forEach(b=>{if(!b.used&&b.action!=='none'&&canExecute(p,b))a.push({type:'building',s:b,label:b.name,score:evalSource(b,p,false)});});
  return a.sort((x,y)=>y.score-x.score);
}
function cpuScoreText(score){
  const n=Math.round(score);
  // CPU候補ログはプレイヤー向け表示なので、マイナス点をそのまま出さない。
  // 内部評価は負のまま使うが、表示は 0〜 に丸める。
  const shown=Math.max(0,n);
  return (shown>0?'+':'')+shown;
}

function cpuMode(p){
  const due=cpuWageDue(p);
  if(cpuAttackReady(p))return 'attack';
  if(p.money<due)return 'danger';
  return 'safe';
}
function cpuModeLabel(mode){return mode==='danger'?'危険':mode==='safe'?'安全':'攻撃';}
function cpuModePolicyText(p,mode){
  if(mode==='danger')return '給料不足回避。現金行動を優先し、建設・増員は原則抑える。';
  if(p.workers<3)return '3人化を急ぐ。給料が払える範囲で学校を狙う。';
  if(p.workers<4)return '4人化を狙う。現金を守りながら高等学校を評価。';
  if(mode==='safe')return '給料1回分は確保。強い建設だけ通し、低価値建築は避ける。';
  return '攻撃復帰条件を満たした。強い建設・得点源を優先し、小銭行動を抑える。';
}
function cpuActionDetail(p,a){
  if(!a||!a.s)return '';
  const s=a.s;
  const parts=[];
  if(['gainMoney','discardGain'].includes(s.action))parts.push(`収入$${s.amount||0}`);
  if(['setWorkers','addWorkerNow'].includes(s.action))parts.push(`労働者${p.workers}→${cpuWorkerAfterAction(p,s)}`);
  if(cpuIsBuildAction(s)){
    const c=cpuBuildResultCardForAction(p,s);
    if(c)parts.push(`建築候補:${c.name}(${c.vp}点)`);
    else if(s.action==='buildTwoSameCost'){
      const pair=cpuBestTwoBuildPair(p);
      if(pair)parts.push(`2枚建築:${pair.cards.map(c=>c.name).join('＋')}`);
    }
  }
  if(s.action==='drawNextFirst')parts.push('次ラウンド先手');
  if(a&&a.type==='public'&&cpuOpponentBlockBonus(p,s)>0)parts.push('相手妨害');
  if(['draw','discardDraw','chemicalDraw'].includes(s.action))parts.push(`ドロー${s.drawCount||''}`);
  if(['drawGoods','drawGoodsSelfTrash','drawUntilHand'].includes(s.action))parts.push('消費財');
  return parts.length?`［${parts.join(' / ')}］`:'';
}
function logCpuState(p,acts){
  const mode=cpuMode(p);
  const st=ensureStats(p);
  if(mode==='danger')st.modeDanger++; else if(mode==='safe')st.modeSafe++; else st.modeAttack++;
  st.decisionLogCount++;
  const due=cpuWageDue(p);
  const sellCover=p.money+cpuSellableValue(p);
  const top=acts.slice(0,3).map(a=>`${a.label}${cpuScoreText(a.score)}`).join(' / ')||'なし';
  addLog(`CPU状態：${cpuModeLabel(mode)}モード / 現金$${p.money} / 次給料$${due} / 労働者${p.workers}人 / 建物${p.buildings.length}枚 / 売却込み$${sellCover}`);
  addLog(`CPU方針：${cpuModePolicyText(p,mode)}`);
  addLog(`CPU候補：${top}`);
}

// v65: CPU安定化調整用ログ。
// 「止まった場所」ではなく、「なぜ危険時に建設したか」「行動後に給料安全度が改善したか」を追う。
function cpuActionCategory(a){
  const s=a&&a.s;
  if(!s)return '不明';
  if(['gainMoney','discardGain'].includes(s.action))return '現金';
  if(cpuIsBuildAction(s))return '建設';
  if(['setWorkers','addWorkerNow'].includes(s.action))return '増員';
  if(['draw','drawNextFirst','discardDraw','revealChoose','chemicalDraw'].includes(s.action))return 'ドロー';
  if(['drawGoods','drawGoodsSelfTrash','drawUntilHand'].includes(s.action))return '消費財';
  return 'その他';
}
function cpuSnapshot(p){
  const due=cpuWageDue(p);
  const sellable=cpuSellableValue(p);
  return {round:game.round,money:p.money,due,workers:p.workers,available:p.availableWorkers,buildings:p.buildings.length,hand:p.hand.length,goods:p.goods,totalCards:totalHandCount(p),household:game.household,sellable,cashGap:p.money-due,assetGap:p.money+sellable-due,mode:cpuMode(p)};
}
function cpuSnapshotText(x){
  return `現金$${x.money} / 次給料$${x.due} / 現金差${x.cashGap>=0?'+':''}${x.cashGap} / 売却込差${x.assetGap>=0?'+':''}${x.assetGap} / 手札${x.hand}+消費財${x.goods} / 建物${x.buildings} / 家計$${x.household}`;
}
function cpuActionOutcomeText(before,after){
  const dm=after.money-before.money, dc=after.totalCards-before.totalCards, dg=after.goods-before.goods, db=after.buildings-before.buildings, da=after.assetGap-before.assetGap;
  const cashPay=after.cashGap>=0?'現金で次給料OK':'現金不足';
  const assetPay=after.assetGap>=0?'売却込みOK':'売却込み不足';
  return `現金${dm>=0?'+':''}${dm} / カード${dc>=0?'+':''}${dc} / 消費財${dg>=0?'+':''}${dg} / 建物${db>=0?'+':''}${db} / 売却込差${da>=0?'+':''}${da} / ${cashPay} / ${assetPay}`;
}
function cpuBestIncomeAvailable(acts){
  return (acts||[]).filter(a=>a&&a.s&&['gainMoney','discardGain'].includes(a.s.action)).sort((x,y)=>y.score-x.score)[0]||null;
}
function cpuLogAdjustmentBefore(p,a,acts,reason){
  if(!game.autoTestMode || !a)return null;
  const before=cpuSnapshot(p);
  const st=ensureStats(p);
  st.stableActionLogs++;
  const cat=cpuActionCategory(a);
  const income=cpuBestIncomeAvailable(acts);
  const top=(acts||[]).slice(0,5).map(x=>`${x.label}(${cpuActionCategory(x)}${cpuScoreText(x.score)})`).join(' / ')||'なし';
  addLog(`調整ログ BEFORE：${p.name} R${game.round} ${cpuModeLabel(before.mode)} / ${cpuSnapshotText(before)}`);
  addLog(`調整ログ CHOICE：${a.label} / 分類=${cat} / 理由=${reason||'通常'} / 評価=${cpuScoreText(a.score)} / 詳細=${cpuActionDetail(p,a)||'なし'}`);
  addLog(`調整ログ TOP5：${top}`);
  if(a.v68CrisisReason)addLog(`調整ログ v68：${a.v68CrisisReason}`);
  if(income && cat!=='現金'){
    st.cashActionSkipped++;
    addLog(`調整ログ NOTE：現金候補あり=${income.label}${cpuScoreText(income.score)}。今回は${cat}を選択。`);
  }
  if(before.cashGap<0 && cat==='建設'){
    st.dangerBuildActions++;
    if(before.assetGap<0)st.buildWhenCannotPayCash++;
    addLog(`調整ログ WARNING：現金不足中に建設。現金差${before.cashGap}、売却込差${before.assetGap}。`);
  }
  if(before.cashGap<0 && cat==='増員'){
    st.dangerWorkerActions++;
    addLog(`調整ログ WARNING：現金不足中に増員。次給料負担が増える可能性。`);
  }
  if(before.cashGap<0 && income && cat!=='現金'){
    st.dangerNonIncomeWithIncomeAvailable++;
    addLog(`調整ログ WARNING：現金不足かつ現金候補ありなのに非現金行動。調整対象。`);
  }
  return before;
}
function cpuLogAdjustmentAfter(p,a,before){
  if(!game.autoTestMode || !a || !before)return;
  const after=cpuSnapshot(p);
  const st=ensureStats(p);
  const beforeRisk=before.assetGap;
  const afterRisk=after.assetGap;
  if(afterRisk<beforeRisk)st.wageRiskWorseActions++;
  else if(afterRisk>beforeRisk)st.wageRiskBetterActions++;
  addLog(`調整ログ AFTER：${p.name} ${a.label} 結果 / ${cpuActionOutcomeText(before,after)}`);
  if(afterRisk<0)addLog(`調整ログ RISK：行動後も売却込みで次給料不足。差${afterRisk}。`);
  else if(beforeRisk<0 && afterRisk>=0)addLog(`調整ログ GOOD：売却込み不足を解消。${beforeRisk}→${afterRisk}`);
  else if(afterRisk<beforeRisk)addLog(`調整ログ CHECK：給料安全度が悪化。${beforeRisk}→${afterRisk}`);
}

function cpuDesiredWorkers(p=cpuPlayer()){
  // v75: 4人化で建物を全部売る事故が出たため、まず3人で会社基盤を作る。
  // 4人目は「建物2枚以上＋次給料を現金でほぼ払える」時だけ目標にする。
  if(!p)return 3;
  if(game.round<=2)return 3;
  const due4=4*currentWage();
  const hasBase=p.buildings.length>=2 || cpuStrongBuildCandidate(p);
  const cashReady=p.money>=due4+(game.round<=6?4:8);
  if(game.round>=4 && game.round<=7 && hasBase && cashReady)return 4;
  return 3;
}

function cpuWorkerOverride(p,acts){
  const target=cpuDesiredWorkers(p);
  if(p.workers>=target)return null;
  // 現金が本当に危ない時は、先に収入行動を優先する。
  if(cpuWageDue(p)>p.money && cpuSafetyGap(p)>0)return null;
  const workerActs=acts.filter(a=>['setWorkers','addWorkerNow'].includes(a.s.action));
  if(!workerActs.length)return null;
  const useful=workerActs
    .map(a=>{
      const after=cpuWorkerAfterAction(p,a.s);
      const add=Math.max(0,after-p.workers);
      let priority=a.score;
      if(add<=0)priority-=9999;
      if(after>=3 && p.workers<3)priority+=game.round<=2?900:520;
      if(after>=4 && p.workers<4){
        priority += game.round>=4 && game.round<=6 ? 900 : 420;
        priority += cpuCanGrowTo(p,4) ? 320 : -520;
      }
      // 5人化は、4人化の邪魔なら強く抑える。
      if(after>=5 && p.workers<5){
        priority += cpuCanGrowTo(p,after) ? -120 : -1800;
      }
      return {...a,workerPriority:priority,after,add};
    })
    .filter(a=>a.add>0)
    .sort((x,y)=>y.workerPriority-x.workerPriority);
  const best=useful[0]||null;
  if(!best)return null;
  if(!cpuV67DangerWorkerAllowed(p,best))return null;
  // 3人目は使えるなら強制。
  if(p.workers<3 && best.after>=3)return best;
  // 4人目は中盤なら多少強引に狙う。終盤は安全条件を満たす時だけ。
  if(p.workers<4 && best.after>=4){
    // v75: 4人化は強いが、建物ゼロ〜1枚で行くと給料地獄になる。
    // 建物2枚以上、または強い建築候補を持ち、現金で次給料を払える時だけ許可。
    const due4=4*currentWage();
    const baseReady=p.buildings.length>=2 || cpuStrongBuildCandidate(p);
    const cashReady=p.money>=due4+(game.round<=6?4:8);
    if(baseReady && cashReady && game.round>=4 && game.round<=7 && cpuCanGrowTo(p,4) && best.workerPriority>120)return best;
  }
  // 5人目は基本取らない。
  if(p.workers<5 && best.after>=5 && cpuCanGrowTo(p,best.after) && p.workers>=4)return best;
  return null;
}


function cpuBuildResultCardForAction(p,s){
  if(!s)return null;
  if(s.action==='build')return bestBuild(p,0,null);
  if(s.action==='buildDiscount')return bestBuild(p,s.discount||1,null);
  if(s.action==='buildThenDraw')return bestBuild(p,0,null);
  if(s.action==='freeBuildFarm')return bestBuild(p,999,c=>c.icon==='farm');
  return null;
}
function cpuBestBuildAction(acts,p){
  const builds=acts.filter(a=>cpuIsBuildAction(a.s));
  builds.forEach(a=>{a.buildResultCard=cpuBuildResultCardForAction(p,a.s);});
  return builds.sort((x,y)=>y.score-x.score)[0]||null;
}
function cpuBestIncomeActionByScore(acts){
  return acts.filter(a=>['gainMoney','discardGain'].includes(a.s.action)).sort((x,y)=>y.score-x.score)[0]||null;
}
function cpuBuildCreatesWageInsurance(p,a){
  if(!a)return false;
  const c=a.buildResultCard||cpuBuildResultCardForAction(p,a.s);
  if(!c || !c.sellable)return false;
  return p.money + cpuSellableValue(p) + c.vp >= cpuWageDue(p);
}
function cpuBuildOverride(p,acts){
  const build=cpuBestBuildAction(acts,p);
  if(!build)return null;
  if(!cpuV67DangerBuildAllowed(p,build))return null;
  const income=cpuBestIncomeActionByScore(acts);
  const bestOther=acts.filter(a=>!cpuIsBuildAction(a.s)).sort((x,y)=>y.score-x.score)[0]||null;
  const behind=cpuBehindBuildingGoal(p);
  const coveredByAssets = p.money + cpuSellableValue(p) >= cpuWageDue(p);
  const coveredByBuild = cpuBuildCreatesWageInsurance(p,build);
  const tolerateSmallUnpaid = cpuCanTolerateSmallUnpaid(p);
  const attackReady = cpuAttackReady(p);
  const goodLateBuildTarget = cpuLateBuildTargetIsGood(build.buildResultCard,p);
  const cashRiskPenalty = cpuLateBuildCashRiskPenalty(p,build.s,build.buildResultCard);
  if(game.round>=7 && cashRiskPenalty<=-3000 && !(cpuAttackReady(p) && goodLateBuildTarget && build.buildResultCard && build.buildResultCard.vp>=18))return null;

  // v44: 安全圏に戻っても、農場・珈琲店・焼畑などの低価値建築では復帰しない。
  if(attackReady && goodLateBuildTarget && cashRiskPenalty>-2500 && (p.buildings.length<=5 || game.round>=8)){
    const incomeGap = income ? build.score - income.score : 999;
    const otherGap = bestOther ? build.score - bestOther.score : 999;
    if(incomeGap>=-450 && otherGap>=-300)return build;
  }

  // 建築候補が現金候補より少しでも明確に高ければ建築を優先する。
  // 以前の+150では安全運転すぎたため、終盤は+25で建築へ寄せる。
  if(income && (game.round<6 || goodLateBuildTarget) && build.score > income.score + (game.round>=7?25:60) && (coveredByAssets || coveredByBuild || tolerateSmallUnpaid || game.round>=8))return build;
  if(!income && bestOther && (game.round<6 || goodLateBuildTarget) && build.score > bestOther.score + (game.round>=7?20:60) && (coveredByAssets || coveredByBuild || tolerateSmallUnpaid))return build;

  // 建物枚数が少ない時は建築を強制寄りにする。
  if(behind>=2 && (game.round<6 || goodLateBuildTarget) && (coveredByAssets || coveredByBuild || tolerateSmallUnpaid || game.round<=6))return build;
  if(game.round>=7 && goodLateBuildTarget && p.buildings.length<5 && (coveredByAssets || coveredByBuild || tolerateSmallUnpaid))return build;
  if(game.round>=8 && goodLateBuildTarget && p.buildings.length<6 && (!bestOther || build.score >= bestOther.score-40) && (coveredByAssets || coveredByBuild || tolerateSmallUnpaid))return build;
  return null;
}


// v75: 序盤に現金行動へ逃げ続けて建物ゼロになる事故を防ぐ。
function cpuEarlyBuildOverride(p,acts){
  if(!p || !acts || !acts.length)return null;
  if(game.round>6)return null;
  if(p.buildings.length>=2)return null;
  const build=cpuBestBuildAction(acts,p);
  if(!build || !cpuActionStillUsable(p,build) || !cpuV67DangerBuildAllowed(p,build))return null;
  const target=build.buildResultCard||cpuBuildResultCardForAction(p,build.s);
  if(!target)return null;
  const strong=target.vp>=10 || target.sellable || cpuPriorityCardTier(target)>=3;
  if(!strong)return null;
  const income=cpuBestIncomeActionByScore(acts);
  const afterGap=cpuV67BuildInsuranceGap(p,build);
  // 売却込みで大崩れしないなら、最低限の会社基盤を優先。
  if(afterGap>=-4 && (!income || build.score>=income.score-260)){
    build.v75EarlyBuild=true;
    return build;
  }
  return null;
}

// v66: 危険時の現金強制ルール。
// v65ログでは「現金候補があるのに鉱山・工場・建設へ逃げる」ケースが多かった。
// 現金差がマイナスなら、実行可能な現金行動を最優先する。
function cpuStrictCashOverride(p,acts){
  if(!p || !acts || !acts.length)return null;
  const wageDue=cpuWageDue(p);
  const cashGap=p.money-wageDue;
  if(cashGap>=0)return null;

  const income=acts
    .filter(a=>a && a.s && ['gainMoney','discardGain'].includes(a.s.action) && cpuActionStillUsable(p,a))
    .map(a=>{
      const amount=a.s.amount||0;
      const cost=a.s.discardCount||0;
      const goodsUse=Math.min(p.goods,cost);
      const handUse=Math.max(0,cost-goodsUse);
      const afterCash=p.money+amount;
      const afterGap=afterCash-wageDue;
      const clearsCash=afterGap>=0;
      const improvesBy=Math.min(amount,Math.max(0,-cashGap));
      let strictScore=0;
      strictScore += amount*100;
      strictScore += improvesBy*180;
      if(clearsCash)strictScore += 1200;
      if(afterGap>=-3)strictScore += 360;
      // 終盤でもカードを全部捨てて小銭を取るより、支払い効率を少し見る。
      // v77: 建物0枚の時に収入行動で建物カードを捨て続けると復帰不能になるため重く見る。
      strictScore -= handUse*(p.buildings.length===0 ? (game.round>=8?420:300) : (game.round>=8?120:75));
      strictScore -= goodsUse*20;
      // 家計が少ない時は金額が小さくても、今取れる現金を優先。
      if(game.round>=7)strictScore += 260;
      return {...a,strictCashScore:strictScore,strictAfterGap:afterGap};
    })
    .sort((x,y)=>y.strictCashScore-x.strictCashScore);
  const best=income[0]||null;
  if(!best)return null;

  // v73: 現金不足でも、強い建設で売却保険を作れる場合は現金行動の強制を少し緩める。
  // v72では露店・市場にカードを払い続けて、CPUが建物1枚のまま終盤へ行くことがあった。
  const build=cpuBestBuildAction(acts,p);
  if(build && cpuActionStillUsable(p,build)){
    const target=build.buildResultCard||cpuBuildResultCardForAction(p,build.s);
    const afterGap=cpuV67BuildInsuranceGap(p,build);
    const workersLeft=Math.max(0,p.availableWorkers-1);
    const strongTarget=target && (target.vp>=12 || cpuPriorityCardTier(target)>=3);
    const incomeClears=best.strictAfterGap>=0;
    const buildClearlyBetter=(build.score||0)>(best.score||0)+(game.round>=6?180:260);
    if(strongTarget && afterGap>=0 && workersLeft>=1 && (!incomeClears || buildClearlyBetter)){
      return null;
    }
  }

  const bestNonIncome=acts.filter(a=>a && a.s && !['gainMoney','discardGain'].includes(a.s.action)).sort((x,y)=>y.score-x.score)[0]||null;
  const assetGap=p.money+cpuSellableValue(p)-wageDue;
  const hardDanger=assetGap<0;
  const lateDanger=game.round>=6;
  const clearOrNear=best.strictAfterGap>=-3;

  // v75: 序盤に建物が少ない時は、売却込みで大崩れしない建築を現金強制より優先させる。
  if(game.round<=5 && p.buildings.length<2){
    const earlyBuild=cpuEarlyBuildOverride(p,acts);
    if(earlyBuild)return null;
  }

  // 売却込みでも不足、または中盤以降で現金不足なら強制。
  if(hardDanger || lateDanger || clearOrNear || (best.score||0)>=500){
    best.v66StrictCash=true;
    best.v66StrictCashReason=`現金差${cashGap} / 売却込差${assetGap} / 現金候補${best.label}`;
    return best;
  }

  // 序盤は、非現金が圧倒的に強い時だけ許す。
  if(bestNonIncome && bestNonIncome.score > best.score + 900)return null;
  best.v66StrictCash=true;
  best.v66StrictCashReason=`序盤現金不足 / 現金候補${best.label}`;
  return best;
}

function cpuIncomeOverride(p,acts){
  const wageDue=cpuWageDue(p);
  const hardNeed=Math.max(0,wageDue-p.money);
  const sellableCover=p.money+cpuSellableValue(p);
  const allowedUnpaid = game.round>=8 ? 6 : (game.round>=7 ? 4 : 0);
  const trueDanger=sellableCover+allowedUnpaid<wageDue;
  const st=ensureStats(p);
  const cashGuardDanger = game.round>=4 && p.money < wageDue + 6;
  const unpaidGuardDanger = (st.unpaidEvents||0)>=2 && p.money < wageDue + 12;

  // v52: 売却込みで払えるから大丈夫、という判定を弱める。
  // 実戦では売却込み安全でも未払いが連発したため、現金そのものを次給料+αまで戻す。
  if(!trueDanger && !cashGuardDanger && !unpaidGuardDanger)return null;

  const scoreIncomeAction=a=>{
    const amount=a.s.amount||0;
    const cost=a.s.discardCount||0;
    const handUse=Math.max(0,cost-Math.min(p.goods,cost));
    const targetNeed=Math.max(hardNeed, Math.max(0, wageDue+6-p.money));
    let sc=amount*12 + Math.min(amount,targetNeed)*24 - handUse*(game.round>=8?20:10);
    if(amount>=hardNeed && hardNeed>0)sc+=120;
    if(amount>=targetNeed && targetNeed>0)sc+=90;
    if(game.round>=8)sc-=20;
    return sc;
  };

  const income=acts.filter(a=>['gainMoney','discardGain'].includes(a.s.action));
  income.forEach(a=>{a.emergencyScore=scoreIncomeAction(a);});
  const bestNow=income.slice().sort((x,y)=>y.emergencyScore-x.emergencyScore)[0]||null;
  const build=cpuBestBuildAction(acts,p);
  const bestIncomeByScore=cpuBestIncomeActionByScore(acts);

  // v52: 現金ガード中は、かなり強い建築以外では現金を優先する。
  // ただし高得点で売却保険にもなる建築だけは通す。
  if(build && bestIncomeByScore){
    const target=build.buildResultCard||cpuBuildResultCardForAction(p,build.s);
    // v73: 20点以上だけでなく、工場・建設会社・レストラン級でも建設復帰を許可する。
    const veryStrongBuild = target && (target.vp>=16 || cpuPriorityCardTier(target)>=3 || cpuBuildCreatesWageInsurance(p,build)) && cpuBuildCreatesWageInsurance(p,build) && build.score > bestIncomeByScore.score + (game.round>=6?90:150);
    if(veryStrongBuild)return null;
  }

  // v66: 現金不足中に、現金候補があるのに鉱山へ逃げる動きを止める。
  // 未来の大きい収入を狙う鉱山挟みは、今すぐ取れる現金がない時だけ許可する。
  const mine=acts.find(a=>a.s.id==='mine'&&a.s.action==='draw');
  if(!bestNow && mine && p.availableWorkers>=2){
    const currentCards=totalHandCount(p);
    const futureIncome=publicSources()
      .filter(s=>(s.multiUse||!usedPublic(s)) && ['gainMoney','discardGain'].includes(s.action) && (!s.amount||canGain(s.amount)))
      .map(s=>{
        const cost=s.discardCount||0;
        const drawNeed=Math.max(0,cost-currentCards);
        const workersNeed=drawNeed+1;
        const amount=s.amount||0;
        let value=amount*10 + Math.min(amount,hardNeed)*24 - drawNeed*8;
        if(amount>=hardNeed && hardNeed>0)value+=110;
        if(game.round>=8)value-=35;
        return {s,cost,drawNeed,workersNeed,amount,value};
      })
      .filter(x=>x.drawNeed>0 && x.workersNeed<=p.availableWorkers);
    const bestFuture=futureIncome.sort((a,b)=>b.value-a.value)[0]||null;
    const bestNowAmount=bestNow?(bestNow.s.amount||0):0;
    const bestNowScore=bestNow?bestNow.emergencyScore:-999;
    if(bestFuture && (bestFuture.amount>bestNowAmount+3 || bestFuture.value>bestNowScore+25)){
      mine.emergencyScore=bestFuture.value;
      mine.deferIncomeTarget=bestFuture.s.name;
      return mine;
    }
  }

  // ラウンド6以降、スーパー・市場・露店は本当に他に手がない時だけ。
  // 建築エンジンや強い公共化建物があるなら、現金行動の強制を止める。
  if(bestNow && game.round>=6 && ['stall','market','supermarket'].includes(bestNow.s.id)){
    const build=cpuBestBuildAction(acts,p);
    const strongPublic=acts.filter(a=>a.type==='public' && a.s.id!=='mine' && a.s.id!=='quarry')
      .some(a=>cpuStrongPublicHumanValue(a.s,p)>=420);
    if((build && (build.score>bestNow.score-80 || cpuActionBuildsPriorityCard(p,build))) || strongPublic){
      const stillFatal=p.money+cpuSellableValue(p)+(game.round>=8?3:0)<cpuWageDue(p)-8;
      if(!stillFatal)return null;
    }
  }
  return bestNow;
}
// ===== v56: CPUターン制御を小さく安全に作り直し =====
// CPU思考ロジックは「候補を選ぶ」だけにし、実行直前に必ず再検証する。
// どこで失敗しても thinking/actionLock が残らないように、完了処理を1か所に集約する。
function cpuActionStillUsable(p,a){
  if(!p || !a || !a.s || p.availableWorkers<=0)return false;
  if(a.type==='public'){
    if(!a.s.multiUse && usedPublic(a.s))return false;
  }else if(a.type==='building'){
    if(!p.buildings.some(b=>b.uid===a.s.uid))return false;
    if(a.s.used || a.s.action==='none')return false;
  }else{
    return false;
  }
  return canExecute(p,a.s);
}

// v67: 危険モード中の建設・増員をさらに抑制する。
// v66で現金候補スキップは0になったが、危険建設・危険増員が残ったため、
// 最終選択直前にも安全条件を確認する。
function cpuV67BuildInsuranceGap(p,a){
  if(!p || !a || !a.s)return -999;
  const target=a.buildResultCard||cpuBuildResultCardForAction(p,a.s);
  const addSellable=(target && target.sellable)?target.vp:0;
  return p.money + cpuSellableValue(p) + addSellable - cpuProjectedWageDueAfterAction(p,a.s);
}
function cpuV67DangerBuildAllowed(p,a){
  if(!p || !a || !cpuIsBuildAction(a.s))return true;
  const due=cpuProjectedWageDueAfterAction(p,a.s);
  const cashGap=p.money-due;
  if(cashGap>=0)return true;

  const target=a.buildResultCard||cpuBuildResultCardForAction(p,a.s);
  if(!target)return false;
  const assetGap=p.money+cpuSellableValue(p)-due;
  const afterGap=cpuV67BuildInsuranceGap(p,a);
  const workersLeft=Math.max(0,p.availableWorkers-1);
  const cashEngine=['restaurant','coffee'].includes(target.id);
  const strongEngine=['factory','steel','chemical','auto_factory','general_contractor','builder','nikoshi','plantation','orchard'].includes(target.id);

  // 序盤〜中盤は、建物が少なすぎると売却保険も点数も作れないため、完全には止めない。
  if(game.round<=6){
    if(afterGap>=0 && target.vp>=10)return true;
    if(cashEngine && workersLeft>=1)return true;
    if(strongEngine && afterGap>=-4)return true;
    return false;
  }

  // 終盤は「建てた直後に売るだけ」を抑える。ただし売却保険が増える高VP・現金エンジンは許可。
  if(assetGap<0){
    if(cashEngine && workersLeft>=1 && afterGap>=6)return true;
    if(target.vp>=18 && afterGap>=12)return true;
    return false;
  }
  if(assetGap<10){
    if(cashEngine && workersLeft>=1 && afterGap>=8)return true;
    if(target.vp>=16 && afterGap>=12)return true;
    if(strongEngine && afterGap>=15)return true;
    return false;
  }
  if(afterGap<10 && !cashEngine)return false;
  return target.vp>=12 || cashEngine || strongEngine;
}
function cpuV67DangerWorkerAllowed(p,a){
  if(!p || !a || !a.s || !['setWorkers','addWorkerNow'].includes(a.s.action))return true;
  const due=cpuWageDue(p);
  const cashGap=p.money-due;
  const assetGap=p.money+cpuSellableValue(p)-due;
  const after=cpuWorkerAfterAction(p,a.s);
  // v75: 4人目以降は、会社基盤と現金がない場合は最終選択でも止める。
  if(after>=4 && p.workers<4){
    const afterDue=after*currentWage();
    const baseReady=p.buildings.length>=2 || cpuStrongBuildCandidate(p);
    const cashReady=p.money>=afterDue+(game.round<=6?4:8);
    if(!baseReady || !cashReady)return false;
  }
  if(after>=5)return false;
  // v75: 学校系の研修中労働者も給料対象。増員後の給料を払えるかで許可する。
  if(a.s.action==='setWorkers'){
    const afterDue=after*currentWage();
    const afterCashGap=p.money-afterDue;
    const afterAssetGap=p.money+cpuSellableValue(p)-afterDue;
    if(afterCashGap>=0 && after<=4)return true;
    if(game.round<=6 && after<=4 && afterAssetGap>=-2)return true;
  }
  if(cashGap>=10 || assetGap>=20)return true;
  // 2人から3人への増員だけは序盤に少し許可する。
  if(game.round<=2 && p.workers<3 && after>=3 && assetGap>=0)return true;
  return false;
}
function cpuV67ActionAllowed(p,a){
  if(!a || !a.s)return false;
  if(cpuIsBuildAction(a.s))return cpuV67DangerBuildAllowed(p,a);
  if(['setWorkers','addWorkerNow'].includes(a.s.action))return cpuV67DangerWorkerAllowed(p,a);
  return true;
}
function cpuV67BestSafeAction(p,acts){
  return (acts||[]).filter(a=>cpuActionStillUsable(p,a) && cpuV67ActionAllowed(p,a)).sort((x,y)=>y.score-x.score)[0]||null;
}
function cpuV67BlockReason(p,a){
  if(!a || !a.s)return '';
  const due=cpuProjectedWageDueAfterAction(p,a.s);
  const cashGap=p.money-due;
  const assetGap=p.money+cpuSellableValue(p)-due;
  if(cpuIsBuildAction(a.s)){
    const target=a.buildResultCard||cpuBuildResultCardForAction(p,a.s);
    const afterGap=cpuV67BuildInsuranceGap(p,a);
    return `危険建設抑制：${a.label} / 現金差${cashGap} / 売却込差${assetGap} / 建設後差${afterGap}${target?` / 候補${target.name}(${target.vp}点)`:''}`;
  }
  if(['setWorkers','addWorkerNow'].includes(a.s.action)){
    return `危険増員抑制：${a.label} / 現金差${cashGap} / 売却込差${assetGap}`;
  }
  return '';
}


// v68: 売却込みでも不足している危険状態では、消費財だけ増やしても給料問題が解決しない。
// 現金候補がない時は、1) 売れる建物で売却保険を作る、2) ドローで現金行動の材料を探す、
// 3) 手札上限に余裕がある時だけ消費財、の順にする。
function cpuV68ProjectedAssetGap(p,a){
  if(!p || !a || !a.s)return -999;
  const s=a.s;
  if(cpuIsBuildAction(s))return cpuV67BuildInsuranceGap(p,a);
  return p.money + cpuSellableValue(p) - cpuProjectedWageDueAfterAction(p,s);
}
function cpuV68IsUsefulDraw(a){
  const act=a&&a.s&&a.s.action;
  return ['draw','drawNextFirst','discardDraw','revealChoose','chemicalDraw'].includes(act);
}
function cpuV68IsGoodsAction(a){
  const act=a&&a.s&&a.s.action;
  return ['drawGoods','drawGoodsSelfTrash','drawUntilHand'].includes(act);
}
function cpuV68CrisisOverride(p,acts){
  if(!p || cpuMode(p)!=='danger')return null;
  const due=cpuWageDue(p);
  const beforeGap=p.money+cpuSellableValue(p)-due;
  if(beforeGap>=0)return null;
  const usable=(acts||[]).filter(a=>cpuActionStillUsable(p,a));
  if(!usable.length)return null;

  // 現金候補がある時はv66の現金強制に任せる。
  const income=cpuBestIncomeActionByScore(usable);
  if(income)return null;

  const handRoom=handLimit(p)-totalHandCount(p);
  const buildCandidates=usable
    .filter(a=>cpuIsBuildAction(a.s))
    .map(a=>{
      const target=a.buildResultCard||cpuBuildResultCardForAction(p,a.s);
      const afterGap=cpuV68ProjectedAssetGap(p,a);
      const sellableVp=(target&&target.sellable)?target.vp:0;
      let crisisScore=afterGap*40 + (target?target.vp:0)*8 + (a.score||0)/10;
      if(afterGap>=0)crisisScore+=500;
      if(sellableVp>=12)crisisScore+=220;
      if(!target || !target.sellable)crisisScore-=900;
      if(game.round>=8 && target && target.vp>=18)crisisScore+=160;
      return {...a,v68AfterGap:afterGap,v68Target:target,v68CrisisScore:crisisScore};
    })
    .filter(a=>a.v68Target && a.v68Target.sellable && a.v68Target.vp>=10 && a.v68AfterGap>beforeGap)
    .sort((x,y)=>y.v68CrisisScore-x.v68CrisisScore);
  const bestBuild=buildCandidates[0]||null;
  if(bestBuild && (bestBuild.v68AfterGap>=0 || bestBuild.v68AfterGap>=beforeGap+8 || game.round>=8)){
    bestBuild.v68CrisisReason=`売却込み不足${beforeGap}→建設後${bestBuild.v68AfterGap}`;
    return bestBuild;
  }

  // 建設で解決できないなら、消費財よりドローを優先して現金行動の材料を探す。
  const draw=usable.filter(cpuV68IsUsefulDraw).sort((x,y)=>{
    const ax=cpuV68IsGoodsAction(x)?-1000:0;
    const ay=cpuV68IsGoodsAction(y)?-1000:0;
    return (y.score+ay)-(x.score+ax);
  })[0]||null;
  if(draw){
    draw.v68CrisisReason=`売却込み不足${beforeGap}。現金候補なしのためドロー優先`;
    return draw;
  }

  // 消費財は、すでに十分ある時や手札上限が近い時は選ばない。
  const goods=usable.filter(cpuV68IsGoodsAction)
    .filter(a=>p.goods<3 && handRoom>=3)
    .sort((x,y)=>y.score-x.score)[0]||null;
  if(goods){
    goods.v68CrisisReason=`売却込み不足${beforeGap}。手札余裕ありのため消費財`;
    return goods;
  }
  return null;
}


// ===== v76: 人間ログ学習CPU補正 =====
// 今回の人間ログ: 5人化 + 大量ドロー + 二胡市建設2枚建て + 終盤高得点建築で106点。
// CPUが安全運転だけで57点に止まるのを防ぐため、終盤だけ少しリスクを許容する。
function cpuV76ActionTargetCard(p,a){
  if(!a || !a.s)return null;
  try{
    if(typeof cpuBuildResultCardForAction==='function')return cpuBuildResultCardForAction(p,a.s);
  }catch(e){}
  return null;
}
function cpuV76IsWorkerAction(a){
  return !!(a && a.s && ['setWorkers','addWorkerNow'].includes(a.s.action));
}
function cpuV76IsBigDrawAction(a){
  if(!a || !a.s)return false;
  const s=a.s;
  if(s.action==='discardDraw' && (s.drawCount||0)>=4)return true;
  if(['draw','chemicalDraw','revealChoose'].includes(s.action) && (s.drawCount||0)>=3)return true;
  if(['steel','factory','auto_factory','chemical'].includes(s.id))return true;
  return false;
}
function cpuV76PairValue(p,card=null){
  try{
    const pair = card && typeof cpuBestTwoBuildPairAfterBuilding==='function'
      ? cpuBestTwoBuildPairAfterBuilding(p,card,0)
      : (typeof cpuBestTwoBuildPair==='function' ? cpuBestTwoBuildPair(p) : null);
    return pair ? pair.val : 0;
  }catch(e){return 0;}
}
function cpuV76BuildPotentialScore(p,a){
  if(!a || !a.s || !cpuIsBuildAction(a.s))return -999999;
  const c=cpuV76ActionTargetCard(p,a);
  let v=a.score||0;
  if(c){
    v += c.vp*18;
    if(c.vp>=16)v+=380;
    if(c.vp>=18)v+=520;
    if(c.vp>=20)v+=420;
    if(['nikoshi','general_contractor','builder','auto_factory','steel','chemical','mansion','hq','railway','union','realtor'].includes(c.id))v+=520;
    if(game.round>=7 && c.vp<12)v-=900;
  }
  if(a.s.id==='nikoshi' || (c && c.id==='nikoshi')){
    const pairVal=cpuV76PairValue(p,c);
    v+=900 + pairVal*28;
    if(pairVal>=24)v+=450;
    if(pairVal>=30)v+=700;
    if(pairVal>=36)v+=900;
  }
  if(a.s.action==='buildTwoSameCost'){
    const pairVal=cpuV76PairValue(p,null);
    v+=pairVal*30;
    if(pairVal>=24)v+=500;
    if(pairVal>=30)v+=800;
  }
  return v;
}
function cpuV76HumanLearningOverride(p,acts){
  if(!p || !p.isCPU || !acts || !acts.length)return null;
  const usable=acts.filter(a=>cpuActionStillUsable(p,a));
  if(!usable.length)return null;
  const wageDue=cpuWageDue(p);
  const cashGap=p.money-wageDue;
  const assetGap=p.money+cpuSellableValue(p)-wageDue;
  const r=game.round;

  // 1. R4〜R6で3人のままなら、4人化をかなり強める。
  //    現金がギリギリでも、売却込みで給料を見られるなら増員する。
  if(r>=4 && r<=6 && p.workers<4){
    const worker=usable
      .filter(cpuV76IsWorkerAction)
      .filter(a=>{
        const after=cpuWorkerAfterAction(p,a.s);
        return after>=4;
      })
      .sort((x,y)=>(y.score||0)-(x.score||0))[0]||null;
    if(worker && (assetGap>=-2 || cashGap>=0 || p.money>=wageDue-4)){
      worker.v76Reason='R4-R6で3人止まりを回避。4人化を優先';
      worker.score=(worker.score||0)+1800;
      return worker;
    }
  }

  // 2. R6以降で3人以下なら、大学/専門学校/高等学校をまだ評価する。
  if(r>=6 && p.workers<5){
    const worker=usable
      .filter(cpuV76IsWorkerAction)
      .filter(a=>assetGap>=0 || r>=8 || p.money>=wageDue)
      .sort((x,y)=>(y.score||0)-(x.score||0))[0]||null;
    if(worker && (r<=7 || p.availableWorkers>=2)){
      worker.v76Reason='終盤の行動数不足を回避。増員を優先';
      worker.score=(worker.score||0)+900;
      return worker;
    }
  }

  // 3. 二胡市建設コンボ・高得点建設を、現金行動より優先できる場面を作る。
  const bestBuild=usable
    .filter(a=>cpuIsBuildAction(a.s))
    .map(a=>({...a,v76Score:cpuV76BuildPotentialScore(p,a),v76Target:cpuV76ActionTargetCard(p,a)}))
    .sort((x,y)=>y.v76Score-x.v76Score)[0]||null;
  const bestIncome=usable
    .filter(a=>a.s && ['gainMoney','discardGain'].includes(a.s.action))
    .sort((x,y)=>(y.score||0)-(x.score||0))[0]||null;

  if(bestBuild){
    const c=bestBuild.v76Target;
    const high = c && (c.vp>=18 || ['nikoshi','general_contractor','auto_factory','steel','chemical','mansion','hq','railway','union'].includes(c.id));
    const nikoshi = bestBuild.s.id==='nikoshi' || (c && c.id==='nikoshi') || bestBuild.s.action==='buildTwoSameCost';
    const incomeScore=bestIncome ? (bestIncome.score||0) : -999999;
    const gap=bestBuild.v76Score-incomeScore;

    if(r>=6 && r<=7 && (high || nikoshi) && assetGap>=-2 && gap>=-250){
      bestBuild.v76Reason='R6-R7の高得点建設/二胡市建設を優先';
      bestBuild.score=(bestBuild.score||0)+1200;
      return bestBuild;
    }
    if(r>=8 && (high || nikoshi) && assetGap>=-8 && gap>=-900){
      bestBuild.v76Reason='終盤は売却リスクより最終点を優先';
      bestBuild.score=(bestBuild.score||0)+1600;
      return bestBuild;
    }
  }

  // 4. 高得点建築が見えている時は、大量ドローを現金行動より少し上に見る。
  const hasBigCard=p.hand.some(c=>c.vp>=18 || ['nikoshi','general_contractor','auto_factory','steel','chemical','mansion','hq','railway','union'].includes(c.id));
  if(r>=6 && hasBigCard && assetGap>=0){
    const bigDraw=usable
      .filter(cpuV76IsBigDrawAction)
      .sort((x,y)=>(y.score||0)-(x.score||0))[0]||null;
    if(bigDraw){
      bigDraw.v76Reason='高得点建築の材料作り。大量ドローを優先';
      bigDraw.score=(bigDraw.score||0)+650;
      return bigDraw;
    }
  }
  return null;
}

// ===== v77: 建物0枚スパイラル脱出補正 =====
// v76では4人化には成功したが、給料不足判定が強すぎて、
// CPUが「収入→支払いで手札を失う→建物0枚→また収入」に落ちることがあった。
// 人間の強いログは、多少売却しても建物を残し、建築エンジンから点を作っている。
// そのため、R5以降に建物が0〜1枚なら、現金強制より先に「売却保険になる建設」を許す。
function cpuV77ProjectedAssetGapAfterBuild(p,a){
  const target=(a&&a.v76Target)||cpuV76ActionTargetCard(p,a);
  const addSell=(target && target.sellable)?target.vp:0;
  return p.money + cpuSellableValue(p) + addSell - cpuWageDue(p);
}
function cpuV77RecoveryBuildScore(p,a){
  const target=(a&&a.v76Target)||cpuV76ActionTargetCard(p,a);
  if(!target)return -999999;
  const workersLeft=Math.max(0,(p.availableWorkers||0)-1);
  const afterGap=cpuV77ProjectedAssetGapAfterBuild(p,a);
  let v=(a.score||0) + target.vp*45 + cpuPriorityCardTier(target)*260;
  if(target.sellable)v += target.vp*35;
  if(target.vp>=12)v += 450;
  if(target.vp>=16)v += 700;
  if(target.vp>=18)v += 950;
  if(['factory','builder','general_contractor','steel','chemical','auto_factory','nikoshi','restaurant','plantation','orchard'].includes(target.id))v += 850;
  if(target.id==='nikoshi')v += 1200 + cpuV76PairValue(p,target)*24;
  if(a.s && a.s.action==='buildTwoSameCost')v += cpuV76PairValue(p,null)*30 + 900;
  // 最後の労働者で現金不足のまま建てると、直後に売却して終わるので避ける。
  if(workersLeft<=0 && p.money<cpuWageDue(p))v -= 5000;
  // 売却込みでも賃金に届かない建設は、建物0枚の時だけ小さく許す。
  if(afterGap<0)v += afterGap*180;
  if(p.buildings.length===0)v += 1300;
  else if(p.buildings.length===1)v += 650;
  // 手札を大きく消費する収入行動より、建設復帰を優先するための固定加点。
  if(game.round>=6)v += 900;
  if(game.round>=8)v += 700;
  return v;
}
function cpuV77NoBuildingRecoveryOverride(p,acts){
  if(!p || !p.isCPU || !acts || !acts.length)return null;
  const r=game.round;
  if(r<5)return null;
  const usable=acts.filter(a=>cpuActionStillUsable(p,a));
  if(!usable.length)return null;
  const lowBuildings=p.buildings.length<=1;
  const noCompany=p.buildings.length===0;
  if(!lowBuildings)return null;

  const workersLeftAfter=Math.max(0,(p.availableWorkers||0)-1);
  const wageDue=cpuWageDue(p);
  const assetGap=p.money+cpuSellableValue(p)-wageDue;

  const builds=usable
    .filter(a=>a && a.s && cpuIsBuildAction(a.s))
    .map(a=>({...a,v76Target:cpuV76ActionTargetCard(p,a)}))
    .filter(a=>{
      const c=a.v76Target;
      if(!c)return false;
      if(r>=7 && c.vp<10 && cpuPriorityCardTier(c)<3)return false;
      if(workersLeftAfter<=0 && p.money<wageDue)return false;
      const afterGap=cpuV77ProjectedAssetGapAfterBuild(p,a);
      // 建物0枚なら少し赤字でも売却保険を作る。1枚あるなら安全寄り。
      return noCompany ? afterGap>=-6 : afterGap>=-2;
    })
    .map(a=>({...a,v77Score:cpuV77RecoveryBuildScore(p,a)}))
    .sort((x,y)=>y.v77Score-x.v77Score);

  const best=builds[0]||null;
  if(!best)return null;

  const income=usable
    .filter(a=>a.s && ['gainMoney','discardGain'].includes(a.s.action))
    .map(a=>{
      const cost=a.s.discardCount||0;
      const handUse=Math.max(0,cost-Math.min(p.goods,cost));
      return {...a,v77IncomeScore:(a.score||0) - handUse*(noCompany?520:320)};
    })
    .sort((x,y)=>y.v77IncomeScore-x.v77IncomeScore)[0]||null;

  const buildClearlyUseful = best.v77Score >= ((income&&income.v77IncomeScore)||-999999) - 250;
  const desperateNoCompany = noCompany && workersLeftAfter>=1 && best.v77Score>-2000;
  const safeEnough = assetGap>=-8 || p.money>=wageDue-8 || r>=8;
  if((buildClearlyUseful || desperateNoCompany) && safeEnough){
    best.v77Reason = `建物${p.buildings.length}枚スパイラルを脱出。収入連打より建設を優先`;
    best.v76Reason = best.v77Reason;
    best.score=(best.score||0)+2200;
    return best;
  }
  return null;
}


// ===== v78: 終盤の強行動優先＋安全な5人化 =====
// v77で建物0〜1枚スパイラルは脱出できたが、終盤に「現金不足」の名目で
// 百貨店・スーパーへ流れ、公共化した製鉄所/自動車工場/建設系を逃す場面が残った。
// 売却込みで給料を見られる時は、終盤の1手を現金より得点源へ寄せる。
function cpuV78StrongActionScore(p,a){
  if(!p || !a || !a.s)return -999999;
  const s=a.s;
  let v=(a.score||0);
  const target=cpuIsBuildAction(s) ? cpuBuildResultCardForAction(p,s) : null;
  const pair=s.action==='buildTwoSameCost' ? cpuBestTwoBuildPair(p) : null;

  if(target){
    v += target.vp*42 + cpuPriorityCardTier(target)*260;
    if(target.sellable)v += target.vp*24;
    if(target.vp>=16)v += 500;
    if(target.vp>=18)v += 650;
    if(['nikoshi','general_contractor','builder','auto_factory','steel','chemical','mansion','hq','railway','union','realtor'].includes(target.id))v += 620;
  }
  if(pair){
    v += pair.val*45;
    if(pair.val>=24)v += 420;
    if(pair.val>=30)v += 700;
  }

  // 売却で公共化した強い建物は、相手に使わせる前に取りたい。
  if(s.sourceType==='sold'){
    if(['auto_factory','steel','chemical','factory'].includes(s.id))v += 900;
    if(['builder','general_contractor','nikoshi'].includes(s.id))v += 1050;
    if(['restaurant','plantation','orchard'].includes(s.id))v += 360;
    if((s.vp||0)>=16)v += (s.vp||0)*32;
  }
  if(['discardDraw','draw','chemicalDraw'].includes(s.action) && (s.drawCount||0)>=3)v += 520;
  if(s.action==='discardDraw' && (s.drawCount||0)>=4)v += 580;
  if(cpuIsBuildAction(s))v += 520;
  return v;
}
function cpuV78FifthWorkerOverride(p,acts){
  if(!p || !p.isCPU || !acts || !acts.length)return null;
  const r=game.round;
  if(r<6 || r>8)return null;
  if(p.workers!==4)return null;
  if((p.availableWorkers||0)<2)return null;
  const wageDue=cpuWageDue(p);
  const sellable=cpuSellableValue(p);
  // 5人化は強いが、v76のような給料地獄に戻らない条件だけ通す。
  if(p.money < wageDue + 10)return null;
  if(p.money + sellable < wageDue + 28)return null;
  if(p.buildings.length<3)return null;
  const worker=acts
    .filter(a=>cpuActionStillUsable(p,a) && cpuV76IsWorkerAction(a))
    .filter(a=>cpuWorkerAfterAction(p,a.s)>=5)
    .sort((x,y)=>(y.score||0)-(x.score||0))[0]||null;
  if(!worker)return null;
  worker.v76Reason='v78：給料余裕あり。終盤の行動数差を埋めるため5人化';
  worker.score=(worker.score||0)+1400;
  return worker;
}
function cpuV78LateScoreOverride(p,acts){
  if(!p || !p.isCPU || !acts || !acts.length)return null;
  const r=game.round;
  if(r<7)return null;
  const usable=acts.filter(a=>cpuActionStillUsable(p,a));
  if(!usable.length)return null;

  const fifth=cpuV78FifthWorkerOverride(p,usable);
  if(fifth)return fifth;

  const wageDue=cpuWageDue(p);
  const assetGap=p.money+cpuSellableValue(p)-wageDue;
  const hardFatal=p.money+cpuSellableValue(p)+(r>=8?6:3) < wageDue-5;
  if(hardFatal)return null;

  const income=usable
    .filter(a=>a.s && ['gainMoney','discardGain'].includes(a.s.action))
    .map(a=>{
      const cost=a.s.discardCount||0;
      const handUse=Math.max(0,cost-Math.min(p.goods,cost));
      return {...a,v78IncomeScore:(a.score||0) - handUse*(r>=8?180:120)};
    })
    .sort((x,y)=>y.v78IncomeScore-x.v78IncomeScore)[0]||null;
  const incomeScore=income?income.v78IncomeScore:-999999;

  const strong=usable
    .filter(a=>{
      const s=a.s;
      if(['gainMoney','discardGain'].includes(s.action))return false;
      if(cpuV76IsWorkerAction(a))return false;
      if(cpuIsBuildAction(s)){
        const c=cpuBuildResultCardForAction(p,s);
        if(!c && s.action!=='buildTwoSameCost')return false;
        if(c && c.vp<10 && cpuPriorityCardTier(c)<3)return false;
        return true;
      }
      if(s.sourceType==='sold'){
        if(['auto_factory','steel','chemical','factory','builder','general_contractor','nikoshi','restaurant','plantation','orchard'].includes(s.id))return true;
        if((s.vp||0)>=16)return true;
      }
      if(['discardDraw','draw','chemicalDraw'].includes(s.action) && (s.drawCount||0)>=3)return true;
      return false;
    })
    .map(a=>({...a,v78Score:cpuV78StrongActionScore(p,a)}))
    .sort((x,y)=>y.v78Score-x.v78Score)[0]||null;
  if(!strong)return null;

  const workersLeftAfter=Math.max(0,(p.availableWorkers||0)-1);
  const cashNeed=wageDue-p.money;
  // 最後の労働者で現金が大きく足りない時だけは、さすがに現金を取る。
  if(workersLeftAfter<=0 && cashNeed>6 && assetGap<10)return null;

  const margin = r>=8 ? -520 : -160;
  const enough = strong.v78Score >= incomeScore + margin;
  const assetSafe = assetGap>=-4 || r>=8;
  if(enough && assetSafe){
    strong.v76Reason='v78：終盤は現金連打より、強い公共化/建設/大量ドローを優先';
    strong.score=(strong.score||0)+1500;
    return strong;
  }
  return null;
}

function cpuV76FinalAllow(p,a){
  if(!a || !a.v76Reason)return false;
  const r=game.round;
  if(cpuV76IsWorkerAction(a)){
    const after=cpuWorkerAfterAction(p,a.s);
    const afterDue=after*currentWage();
    const afterAssetGap=p.money+cpuSellableValue(p)-afterDue;
    return r<=7 && after<=4 && afterAssetGap>=-2;
  }
  if(cpuIsBuildAction(a.s)){
    const target=a.v76Target || cpuV76ActionTargetCard(p,a);
    const high=target && (target.vp>=18 || ['nikoshi','general_contractor','auto_factory','steel','chemical','mansion','hq','railway','union'].includes(target.id));
    const nikoshi=a.s.id==='nikoshi' || (target && target.id==='nikoshi') || a.s.action==='buildTwoSameCost';
    const afterGap=cpuV67BuildInsuranceGap(p,a);
    if(r>=8 && (high||nikoshi) && afterGap>=-8)return true;
    if(r>=6 && r<=7 && (high||nikoshi) && afterGap>=-2)return true;
  }
  return false;
}

function cpuFallbackAction(p,acts=[]){
  const usableActs=(acts||[]).filter(a=>cpuActionStillUsable(p,a));
  if(usableActs.length)return usableActs[0];

  // 最後の保険：公共職場から、今本当に実行できるものだけを選ぶ。
  const publicFallbacks=publicSources()
    .filter(s=>(s.multiUse||!usedPublic(s)) && canExecute(p,s))
    .map(s=>({type:'public',s,label:s.name,score:-999}));
  const mine=publicFallbacks.find(a=>a.s.id==='mine');
  if(mine)return mine;
  return publicFallbacks[0]||null;
}

function cpuChooseActionSafely(p){
  let acts=[];
  try{
    acts=cpuActions(p)||[];
  }catch(e){
    console.error('cpuActions failed',e);
    addLog('CPU候補作成でエラーが出たため、安全行動に切り替えました。');
    return {action:cpuFallbackAction(p,[]),acts:[]};
  }

  try{
    logCpuState(p,acts);
  }catch(e){
    console.error('logCpuState failed',e);
    addLog('CPU状態ログでエラーが出ましたが、ゲームは続行します。');
  }

  let chosen=null;
  let reason='通常判断';
  try{
    const forcedV78=cpuV78LateScoreOverride(p,acts);
    const forcedV77=forcedV78?null:cpuV77NoBuildingRecoveryOverride(p,acts);
    const forcedStrictCash=(forcedV78||forcedV77)?null:cpuStrictCashOverride(p,acts);
    const forcedCrisis=(forcedV78||forcedV77||forcedStrictCash)?null:cpuV68CrisisOverride(p,acts);
    const forcedWorker=(forcedV78||forcedV77||forcedStrictCash||forcedCrisis)?null:cpuWorkerOverride(p,acts);
    const forcedV76=(forcedV78||forcedV77||forcedStrictCash||forcedCrisis||forcedWorker)?null:cpuV76HumanLearningOverride(p,acts);
    const forcedEarlyBuild=(forcedV78||forcedV77||forcedStrictCash||forcedCrisis||forcedWorker||forcedV76)?null:cpuEarlyBuildOverride(p,acts);
    const forcedHuman=(forcedV78||forcedV77||forcedStrictCash||forcedCrisis||forcedWorker||forcedV76||forcedEarlyBuild)?null:cpuHumanStyleOverride(p,acts);
    const forcedIncome=(forcedV78||forcedV77||forcedStrictCash||forcedCrisis||forcedWorker||forcedV76||forcedEarlyBuild||forcedHuman)?null:cpuIncomeOverride(p,acts);
    const forcedBuild=(forcedV78||forcedV77||forcedStrictCash||forcedCrisis||forcedWorker||forcedV76||forcedEarlyBuild||forcedHuman||forcedIncome)?null:cpuBuildOverride(p,acts);
    chosen=forcedV78||forcedV77||forcedStrictCash||forcedCrisis||forcedWorker||forcedV76||forcedEarlyBuild||forcedHuman||forcedIncome||forcedBuild||cpuV67BestSafeAction(p,acts)||acts[0]||null;
    if(chosen && !cpuV67ActionAllowed(p,chosen) && !cpuV76FinalAllow(p,chosen)){
      const safe=cpuV67BestSafeAction(p,acts);
      const block=cpuV67BlockReason(p,chosen);
      if(block)addLog(`調整ログ v67：${block}`);
      if(safe){chosen=safe;reason='危険抑制';}
    }
    if(reason==='危険抑制'){}
    else if(forcedV78)reason='終盤得点優先';
    else if(forcedV77)reason='建物復帰';
    else if(forcedStrictCash)reason='現金強制';
    else if(forcedCrisis)reason=forcedCrisis.v68CrisisReason?'危機対応':'危機対応';
    else if(forcedWorker)reason='労働者計画';
    else if(forcedV76)reason='人間ログ学習';
    else if(forcedEarlyBuild)reason='序盤建設復帰';
    else if(forcedHuman)reason='人間ロジック';
    else if(forcedIncome)reason='給料確保';
    else if(forcedBuild)reason='建物強化';
  }catch(e){
    console.error('CPU override failed',e);
    addLog('CPU優先判断でエラーが出たため、安全行動に切り替えました。');
  }

  if(!cpuActionStillUsable(p,chosen)){
    const fallback=cpuFallbackAction(p,acts);
    if(chosen && chosen.label)addLog(`CPUの第1候補 ${chosen.label} は実行直前に不適合だったため、安全候補へ変更しました。`);
    chosen=fallback;
    reason='安全候補';
  }

  if(chosen && chosen.v76Reason){
    addLog(`CPU学習補正 v78：${chosen.v76Reason}`);
  }
  return {action:chosen,acts,reason};
}
