// v60: CPU手番で止まったままになる事故を防ぐ。
// 「現在手番：CPU」なのに cpuTurn の setTimeout が失われると、
// 人間側はラウンド終了も操作もできなくなる。CPU手番を一元的に予約し、
// アイドル状態なら自動で再開、ロックが長すぎる時は安全にターン進行へ戻す。
function scheduleCpuTurn(delay=300){
  try{
    if(game.gameOver || game.processingRoundEnd || isModalOpen())return;
    const p=currentPlayer();
    if(!p || !p.isCPU || p.availableWorkers<=0)return;
    if(game.thinking || game.actionLock)return;
    if(game.cpuTurnScheduled)return;
    game.cpuTurnScheduled=true;
    setTimeout(()=>{
      game.cpuTurnScheduled=false;
      if(game.gameOver || game.processingRoundEnd || isModalOpen())return;
      const cp=currentPlayer();
      if(cp && cp.isCPU && cp.availableWorkers>0 && !game.thinking && !game.actionLock){
        cpuTurn();
      }
    },delay);
  }catch(e){console.error('scheduleCpuTurn failed',e);game.cpuTurnScheduled=false;}
}

function recoverCpuTurnIfStale(force=false){
  try{
    if(game.gameOver || game.processingRoundEnd || isModalOpen() || !currentPlayer())return false;
    const p=currentPlayer();
    if(!p.isCPU){game.cpuLockSince=0;return false;}
    if(p.availableWorkers<=0){game.cpuLockSince=0;return false;}

    if(game.thinking || game.actionLock){
      if(!game.cpuLockSince)game.cpuLockSince=Date.now();
      if(force || Date.now()-game.cpuLockSince>4500){
        game.thinking=false;
        game.actionLock=false;
        game.cpuTurnScheduled=false;
        game.cpuLockSince=0;
        addLog('CPU処理ロックが長く残ったため、安全復帰しました。');
        // 労働者をすでに消費している可能性があるため、まずターン進行を試す。
        setTimeout(()=>{try{advanceTurn();}catch(e){console.error('CPU recover advance failed',e);scheduleCpuTurn(300);}},0);
        return true;
      }
      return false;
    }

    game.cpuLockSince=0;
    scheduleCpuTurn(300);
  }catch(e){console.error('recoverCpuTurnIfStale failed',e);}
  return false;
}

function cpuTurn(){
  game.cpuTurnScheduled=false;
  if(game.gameOver||game.processingRoundEnd)return;
  const p=currentPlayer();
  if(!p || !p.isCPU)return;
  if(game.thinking)return;

  game.thinking=true;
  game.actionLock=true;
  normalizeAllPlayers();
  render();

  try{
    const picked=cpuChooseActionSafely(p);
    const a=picked.action;

    if(!a || !a.s){
      cpuPassSafely(p);
      return;
    }

    if(!cpuActionStillUsable(p,a)){
      addLog('CPUの行動候補が実行できないため、パスします。');
      cpuPassSafely(p);
      return;
    }

    if(picked.reason==='現金強制')addLog(`CPUは現金不足のため${a.label}を強制選択しました。`);
    else if(picked.reason==='労働者4人計画')addLog(`CPUは労働者4人計画で${a.label}を選びました。`);
    else if(picked.reason==='人間ロジック')addLog(`CPUは人間ロジックで${a.label}を選びました。`);
    else if(picked.reason==='人間ログ学習')addLog(`CPUは人間ログ学習で${a.label}を選びました。`);
    else if(picked.reason==='建物復帰')addLog(`CPUは建物0枚から復帰するため${a.label}を選びました。`);
    else if(picked.reason==='給料確保')addLog(`CPUは給料確保を優先して${a.label}を選びました。`);
    else if(picked.reason==='建物強化')addLog(`CPUは建物を伸ばすため${a.label}を選びました。`);
    else if(picked.reason==='安全候補')addLog(`CPUは安全候補として${a.label}を選びました。`);
    else addLog(`CPUは${a.label}を選びました。`);

    try{
      addLog(`CPU判断：${a.label}${cpuActionDetail(p,a)} / 評価${cpuScoreText(a.score)}`);
    }catch(e){
      console.error('cpuActionDetail failed',e);
      addLog(`CPU判断：${a.label}`);
    }

    try{ trackActionStats(p,a.s); }catch(e){ console.error('trackActionStats failed',e); }

    if(!spendWorker(p)){
      cpuFinishSafely();
      return;
    }

    if(a.type==='public')markPublic(a.s);
    else if(a.type==='building')a.s.used=true;

    let settled=false;
    const doneOK=()=>{
      if(settled)return;
      settled=true;
      if(a.type==='building'&&['builder','general_contractor'].includes(a.s.id))a.s.needsFirstUse=false;
      cpuFinishSafely();
    };
    const doneCancel=()=>{
      if(settled)return;
      settled=true;
      cpuCancelAction(p,a);
      addLog(`CPUの${a.label}は実行できなかったため取り消しました。`);
      cpuFinishSafely();
    };

    const watchdog=setTimeout(()=>{
      if(settled)return;
      settled=true;
      console.error('CPU action watchdog fired',a);
      addLog(`CPUの${a.label}処理が止まったため、安全復帰しました。`);
      game.thinking=false;
      game.actionLock=false;
      render();
      advanceTurn();
    },1200);

    const okWrapped=()=>{clearTimeout(watchdog);doneOK();};
    const cancelWrapped=()=>{clearTimeout(watchdog);doneCancel();};

    try{
      executeAction(p,a.s,a.type==='building'?a.s:null,okWrapped,cancelWrapped);
    }catch(e){
      clearTimeout(watchdog);
      console.error('executeAction failed',e);
      addLog(`CPUの${a.label}実行中にエラーが出たため取り消しました。`);
      doneCancel();
    }
  }catch(e){
    console.error('cpuTurn fatal',e);
    addLog('CPUターン制御でエラーが出たため、安全復帰しました。');
    game.thinking=false;
    game.actionLock=false;
    render();
    advanceTurn();
  }
}
function humanEndRound(){
  if(game.gameOver)return;
  recoverHumanInputIfStale(true);
  recoverRoundEndIfStale(true);
  const h=humanPlayer(),c=cpuPlayer();
  if(h.availableWorkers>0||c.availableWorkers>0){
    addLog('労働者が残っている間はラウンド終了できません。全員の労働者を配置してから押してください。');
    render();
    return;
  }
  if(isModalOpen()){
    addLog('選択画面が開いているため、先に選択を完了してください。');
    render();
    return;
  }
  // v62: 全員配置済みなら、古いthinking/actionLock/processingRoundEndをここで解除して進める。
  game.thinking=false;
  game.actionLock=false;
  game.cpuTurnScheduled=false;
  game.processingRoundEnd=false;
  game.roundEndReady=false;
  endRound();
}
function endRound(){
  if(game.processingRoundEnd)return;
  game.processingRoundEnd=true;
  normalizeAllPlayers();
  addLog(`ラウンド${game.round}終了。労働者を戻し、手札上限を確認してから給料支払いを行います。`);
  game.players.forEach(p=>{p.availableWorkers=p.workers;});
  const afterHandLimit=()=>{
    payWagesWithChoice(humanPlayer(),()=>{
      payWagesAuto(cpuPlayer());
      nextRound();
    });
  };
  const h=humanPlayer();
  if(totalHandCount(h)>handLimit(h)){
    openHandLimit(h,()=>{cpuHandLimit(cpuPlayer());afterHandLimit();});
  }else{
    cpuHandLimit(cpuPlayer());
    afterHandLimit();
  }
}
function finishPayWage(p,total){
  const wageCount=wageWorkers(p);
  let need=total;
  const paid=Math.min(p.money,need);
  p.money-=paid;
  game.household+=paid;
  need-=paid;
  const st=ensureStats(p);
  if(need>0){
    p.unpaidWages+=need;
    st.unpaidEvents++;
    st.unpaidAmount+=need;
    st.roundsWithShortage++;
    addLog(`${p.name}は未払い賃金${need}を受け取りました。`);
  }else{
    st.roundsPayFull++;
  }
  addLog(`${p.name}の給料：労働者${p.workers}人${p.traineeWorkers?`＋研修中${p.traineeWorkers}人`:''} × $${currentWage()} = $${total}。支払$${paid}、家計へ$${paid}。`);
}
function sellBuildingForWage(p,building){
  const i=p.buildings.findIndex(x=>x.uid===building.uid);
  if(i<0)return false;
  const sold=p.buildings.splice(i,1)[0];
  sold.used=false;
  sold.needsFirstUse=false;
  sold.publicOwner=p.name;
  game.publicBuildings.push(sold);
  p.money+=sold.vp;
  p.soldBuildings=(p.soldBuildings||0)+1;
  ensureStats(p).soldBuildings++;
  addLog(`${p.name}は給料不足で${sold.name}を売却し、$${sold.vp}を得ました。売却建物は公共職場になりました。`);
  return true;
}
function payWagesWithChoice(p,onDone){
  const total=wageWorkers(p)*currentWage();
  if(p.money>=total){finishPayWage(p,total);onDone();return;}
  const shortage=total-p.money;
  const sellables=p.buildings.filter(b=>b.sellable);
  if(sellables.length===0){finishPayWage(p,total);onDone();return;}
  openWageSellModal(p,total,shortage,sellables,onDone);
}
function openWageSellModal(p,total,shortage,sellables,onDone){
  const totalSellable=sellables.reduce((sum,b)=>sum+b.vp,0);
  const canCover=totalSellable>=shortage;
  openModal(`<h3>給料不足：建物を売却できます</h3><p class="hint">${p.name}の給料は$${total}です。現在の所持金は$${p.money}なので、$${shortage}不足しています。売却可能な建物を選んでください。選んだ建物の売却額を給料に充て、足りない分だけ未払い賃金にできます。</p><div class="modal-grid" id="wageSellGrid"></div><p class="hint">選択中の売却額：$<b id="sellSum">0</b>　売却後の不足見込み：$<b id="remainShort">${shortage}</b></p><p class="hint warn" id="wageSellWarn"></p><div class="actions"><button class="primary" id="confirmWageSell">選んだ建物を売却して給料支払い<br><span style="font-size:11px">足りない分は未払い</span></button><button id="autoWageSell">不足分だけ自動で売却</button></div>`);
  const selected=new Set();
  const grid=$('wageSellGrid');
  const sorted=sellables.slice().sort((a,b)=>a.vp-b.vp);
  const elems=new Map();
  sorted.forEach(b=>{
    const d=document.createElement('div');
    d.className=`choice cost${b.cost}`;
    d.innerHTML=`<b>${b.name}</b><br>資産価値 $${b.vp}<br><span class="hint">${b.effectText}</span>`;
    d.onclick=()=>{
      if(selected.has(b.uid)){selected.delete(b.uid);d.classList.remove('selected');}
      else{selected.add(b.uid);d.classList.add('selected');}
      update();
    };
    elems.set(b.uid,d);
    grid.appendChild(d);
  });
  function selectedBuildings(){return sorted.filter(b=>selected.has(b.uid));}
  function selectedSum(){return selectedBuildings().reduce((sum,b)=>sum+b.vp,0);}
  function update(){
    const sum=selectedSum();
    const remain=Math.max(0,total-(p.money+sum));
    $('sellSum').textContent=sum;
    $('remainShort').textContent=remain;
    $('confirmWageSell').disabled=(sum<=0)||((p.money+sum)<total && totalSellable>=shortage);
    $('wageSellWarn').textContent=sum<=0
      ? '建物を選んでください。売却可能な建物で足りる場合は、全額支払えるまで売却が必要です。'
      : (remain>0 ? (totalSellable>=shortage ? `まだ$${remain}不足しています。給料を払えるまで追加で売却してください。` : `すべて売っても不足するため、残り$${remain}だけ未払いになります。`) : 'この選択で給料を全額支払えます。');
  }
  function chooseAuto(){
    selected.clear();
    elems.forEach(el=>el.classList.remove('selected'));
    let best=null;
    const n=sorted.length;

    }
    if(!best){
      sorted.forEach(b=>selected.add(b.uid));
    }else{
      for(let i=0;i<n;i++)if(best.mask&(1<<i))selected.add(sorted[i].uid);

function payWagesAuto(p){

function sellForWageAuto(p,total){
  // ルールブック準拠：賃金不足時は、未払いにする前に売却可能な建物を売る。
  // できるだけ売りすぎが少ない組み合わせを選ぶ。
  if(p.money>=total)return;
  const sellables=p.buildings.filter(b=>b.sellable);
  if(!sellables.length)return;
  const shortage=total-p.money;
  let best=null;
  const n=sellables.length;
  if(n<=20){
    for(let mask=1; mask<(1<<n); mask++){
      let sum=0,cnt=0;
      for(let i=0;i<n;i++)if(mask&(1<<i)){sum+=sellables[i].vp;cnt++;}
      if(sum>=shortage && (!best || sum<best.sum || (sum===best.sum && cnt<best.cnt)))best={mask,sum,cnt};
    }
  }
  if(best){
    for(let i=0;i<n;i++)if(best.mask&(1<<i))sellBuildingForWage(p,sellables[i]);
    return;
  }
  // すべて売っても足りない場合は全売却後、不足分だけ未払い。
  sellables.slice().sort((a,b)=>a.vp-b.vp).forEach(b=>sellBuildingForWage(p,b));
}

function recoverRoundEndIfStale(force=false){
  try{
    const h=humanPlayer(), c=cpuPlayer();
    if(!h || !c || game.gameOver)return false;
    const allPlaced=h.availableWorkers<=0 && c.availableWorkers<=0;
    if(!allPlaced || isModalOpen())return false;

      if(!game.roundEndLockSince)game.roundEndLockSince=Date.now();

      game.roundEndLockSince=0;

}

function recoverHumanInputIfStale(force=false){
  try{
    const h=humanPlayer(), c=cpuPlayer();
    if(!h || !c || game.gameOver || !currentPlayer())return false;
    const allPlaced=h.availableWorkers<=0 && c.availableWorkers<=0;
    const locked=!!(game.thinking||game.actionLock);

      game.cpuTurnScheduled=false;
      game.humanInputLockSince=0;
      addLog('全員配置済みのため、残っていた処理ロックを解除しました。');
      return true;
    }

    const isHumanTurn=currentPlayer().id===h.id;
    if(!isHumanTurn || isModalOpen() || !locked){game.humanInputLockSince=0;return false;}
    if(!game.humanInputLockSince)game.humanInputLockSince=Date.now();

  return false;
}

  withCpuBrain(game.players[0],()=>payWagesAuto(game.players[0]));
  withCpuBrain(game.players[1],()=>payWagesAuto(game.players[1]));
  withCpuBrain(game.players[0],()=>cpuHandLimit(game.players[0]));
  withCpuBrain(game.players[1],()=>cpuHandLimit(game.players[1]));
  autoNextRound();
}
function autoNextRound(){
  game.roundEndReady=false;
  game.processingRoundEnd=false;
  if(game.round>=game.maxRound){
    game.gameOver=true;
    addLog('AUTO: 9ラウンド終了。ゲーム終了。');
    addFinalSummaryLog();
    return;
  }
  game.round++;
  game.publicUsed={};
  if(game.nextFirstPlayerIndex!==null){
    game.firstPlayerIndex=game.nextFirstPlayerIndex;
    addLog(`AUTO: 採石所の効果で、次の先手は${game.players[game.firstPlayerIndex].name}です。`);
  }
  game.nextFirstPlayerIndex=null;
  game.players.forEach(p=>{
    p.availableWorkers=p.workers;
    p.buildings.forEach(b=>b.used=false);
    normalizePlayer(p);
  });
  game.currentPlayerIndex=game.firstPlayerIndex;
  addLog(`AUTO: ラウンド${game.round}開始。先手は${game.players[game.firstPlayerIndex].name}です。`);
}
function autoPlayOneWorker(){
  normalizeAllPlayers();
  if(game.gameOver)return true;
  const p=currentPlayer();
  if(!p)throw new Error('currentPlayer がありません');
  if(p.availableWorkers<=0){autoAdvanceTurnOrRound();return true;}

  const picked=withCpuBrain(p,()=>cpuChooseActionSafely(p));
  const a=picked && picked.action;
  if(!a || !a.s || !withCpuBrain(p,()=>cpuActionStillUsable(p,a))){
    const before=p.availableWorkers;
    spendWorker(p);
    addLog(`AUTO: ${p.name}は実行できる行動がないためパスしました。労働者 ${before}→${p.availableWorkers}`);
    autoAdvanceTurnOrRound();
    return true;
  }

  const beforeAdjust=cpuLogAdjustmentBefore(p,a,picked.acts||[],picked.reason||'通常');
  addLog(`AUTO: ${p.name} 行動=${a.label} / 理由=${picked.reason||'通常'} / 評価=${cpuScoreText(a.score)}`);
  try{trackActionStats(p,a.s);}catch(e){addLog(`AUTO WARN: trackActionStats失敗 ${e.message||e}`);}
  if(!spendWorker(p)){
    addLog(`AUTO WARN: ${p.name}の労働者消費に失敗しました。`);
    autoAdvanceTurnOrRound();
    return true;
  }
  if(a.type==='public')markPublic(a.s);
  else if(a.type==='building')a.s.used=true;

  let settled='';
  const ok=()=>{settled='ok';};
  const cancel=()=>{settled='cancel';};
  try{
    withCpuBrain(p,()=>executeAction(p,a.s,a.type==='building'?a.s:null,ok,cancel));
  }catch(e){
    settled='error';
    addLog(`AUTO ERROR: ${p.name} ${a.label} executeAction例外: ${e.message||e}`);
  }

  if(settled===''){
    throw new Error(`${p.name} ${a.label} が完了コールバックなしで停止しました`);
  }
  if(settled==='cancel' || settled==='error'){
    if(a.type==='public')unmarkPublic(a.s);
    else if(a.type==='building')a.s.used=false;
    refundWorker(p);
    addLog(`AUTO WARN: ${p.name} ${a.label} を取り消しました。`);
    // 同じ行動で無限に詰まらないよう、1人パス扱いにする。
    if(p.availableWorkers>0)spendWorker(p);
  }else if(a.type==='building' && ['builder','general_contractor'].includes(a.s.id)){
    a.s.needsFirstUse=false;
  }

  cpuLogAdjustmentAfter(p,a,beforeAdjust);
  game.thinking=false;
  game.actionLock=false;
  game.processingRoundEnd=false;
  autoAdvanceTurnOrRound();
  return true;
}
function runOneAutoTestGame(gameNo){
  initAutoTestGame(gameNo);
  const started=Date.now();
  let steps=0;
  let status='OK';
  let error='';
  try{
    while(!game.gameOver && steps<1400){
      steps++;
      autoPlayOneWorker();
    }
    if(!game.gameOver){
      status='STOP';
      error=`最大ステップ超過。round=${game.round}, current=${currentPlayer()?currentPlayer().name:'なし'}, workers=${game.players.map(p=>p.name+':'+p.availableWorkers+'/'+p.workers).join(', ')}`;
      addLog(`AUTO STOP: ${error}`);
    }
  }catch(e){
    status='ERROR';
    error=e && e.stack ? e.stack : String(e);
    addLog(`AUTO ERROR: ${e.message||e}`);
  }
  const s0=score(game.players[0]);
  const s1=score(game.players[1]);
  const stA=ensureStats(game.players[0]);
  const stB=ensureStats(game.players[1]);
  const adjust={
    dangerBuild:(stA.dangerBuildActions||0)+(stB.dangerBuildActions||0),
    dangerWorker:(stA.dangerWorkerActions||0)+(stB.dangerWorkerActions||0),
    skippedIncome:(stA.dangerNonIncomeWithIncomeAvailable||0)+(stB.dangerNonIncomeWithIncomeAvailable||0),
    riskWorse:(stA.wageRiskWorseActions||0)+(stB.wageRiskWorseActions||0),
    riskBetter:(stA.wageRiskBetterActions||0)+(stB.wageRiskBetterActions||0)
  };
  return {
    gameNo,status,error,steps,ms:Date.now()-started,
    scoreA:s0.total,scoreB:s1.total,adjust,
    summary:`${status} / ${steps}手 / CPU-A ${s0.total}点 / CPU-B ${s1.total}点 / 売却 ${game.players[0].soldBuildings||0}-${game.players[1].soldBuildings||0} / 未払い ${game.players[0].unpaidWages}-${game.players[1].unpaidWages} / 危険建設 ${adjust.dangerBuild} / 危険増員 ${adjust.dangerWorker} / 現金候補スキップ ${adjust.skippedIncome} / 安全度悪化 ${adjust.riskWorse}`,
    log:game.log.slice().reverse()
  };
}
function runCpuVsCpu30(){
  if(!confirm('CPU対CPUで30回、CPU安定化用の調整ログを出します。現在のゲームはリセットされます。よろしいですか？'))return;
  closeModal();
  const results=[];
  const oldAlert=window.alert;
  try{
    for(let i=1;i<=30;i++)results.push(runOneAutoTestGame(i));
  }finally{
    window.alert=oldAlert;
    game.autoTestMode=false;
  }
  const ok=results.filter(r=>r.status==='OK').length;
  const ng=results.length-ok;
  const totalAdjust=results.reduce((t,r)=>{
    const a=r.adjust||{};
    t.dangerBuild+=(a.dangerBuild||0);
    t.dangerWorker+=(a.dangerWorker||0);
    t.skippedIncome+=(a.skippedIncome||0);
    t.riskWorse+=(a.riskWorse||0);
    t.riskBetter+=(a.riskBetter||0);
    return t;
  },{dangerBuild:0,dangerWorker:0,skippedIncome:0,riskWorse:0,riskBetter:0});
  const nl='\n';
  const header=`==== 30回集計 ====${nl}OK ${ok}/${results.length} / ERROR ${ng}${nl}危険建設 ${totalAdjust.dangerBuild}${nl}危険増員 ${totalAdjust.dangerWorker}${nl}現金不足＋現金候補ありで非現金 ${totalAdjust.skippedIncome}${nl}給料安全度 悪化 ${totalAdjust.riskWorse} / 改善 ${totalAdjust.riskBetter}${nl}`;
  const summary=header+nl+results.map(r=>`${String(r.gameNo).padStart(2,'0')}: ${r.summary}${r.error?' / '+r.error.split(nl)[0]:''}`).join(nl);
  const full=header+nl+nl+results.map(r=>`================ TEST ${r.gameNo} : ${r.summary} ================${nl}`+r.log.join(nl)+(r.error?`${nl}ERROR DETAIL:${nl}${r.error}`:'')).join(nl+nl);
  openModal(`<h3>CPU対CPU 30回 調整ログ結果 v68</h3><p class="hint"><b>${ok} / ${results.length} 回 OK</b>、停止/エラー ${ng} 回です。CPU安定化用に、危険時の建設・増員・現金候補スキップ・給料安全度の悪化を集計します。</p><h3>サマリー</h3><textarea id="autoSummary" style="width:100%;height:190px;font-family:monospace;font-size:12px"></textarea><h3>全ログ</h3><textarea id="autoFullLog" style="width:100%;height:420px;font-family:monospace;font-size:12px"></textarea><div class="actions"><button class="primary" id="copyAutoLogBtn">全ログをコピー</button><button onclick="closeModal()">閉じる</button></div>`);
  $('autoSummary').value=summary;
  $('autoFullLog').value=full;
  $('copyAutoLogBtn').onclick=async()=>{
    const txt=$('autoFullLog').value;
    try{await navigator.clipboard.writeText(txt);addLog('CPU対CPUテストログをコピーしました。');}
    catch(e){$('autoFullLog').focus();$('autoFullLog').select();addLog('コピーできない場合は、全ログ欄を選択してコピーしてください。');}
  };
  // テスト後は通常プレイできる初期状態へ戻す。結果ログはモーダル内に残す。
  initGame();
}

function showHelp(){openModal(`<h3>遊び方</h3><ul><li>ゲーム開始時に先手をランダムで決めます。先手$5、後手$6です。</li><li>人間とCPUが交互に労働者を1人ずつ置きます。</li><li>公共職場は取り合いです。鉱山だけ何度でも使えます。採石所は1人だけ入り、カード1枚取得＋次ラウンドの先手予約です。</li><li>消費財カードは建築コストや露店・市場・スーパーなどの支払いに使えます。</li><li>手札上限は建物カード＋消費財カードの合計で基本5枚。倉庫1つにつき+4枚です。</li><li>手札は最終得点になりません。</li><li>研修中労働者もそのラウンドの給料対象です。給料不足時は売却可能な建物を自動売却し、それでも足りなければ未払い賃金になります。</li></ul><div class="actions"><button class="primary" onclick="closeModal()">閉じる</button></div>`);}
$('endRoundBtn').onclick=humanEndRound;$('scoreBtn').onclick=()=>showScore(false);$('helpBtn').onclick=showHelp;$('newBtn').onclick=()=>{if(confirm('新規ゲームを開始しますか？現在のゲームは失われます。'))initGame();};window.usePublic=usePublic;window.useBuilding=useBuilding;window.closeModal=closeModal;initGame();
</script></body></html>
