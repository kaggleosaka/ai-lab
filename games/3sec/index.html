<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>3SEC GAMES</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: #111318;
    color: #fff;
    font-family: Arial, Helvetica, sans-serif;
  }

  body {
    display: flex;
    justify-content: center;
  }

  .wrap {
    width: 464px;
    min-height: 825px;
    max-width: 100vw;
    box-sizing: border-box;
    padding: 28px 20px 36px;
    background:
      radial-gradient(circle at 50% 0%, rgba(255,255,255,0.12), transparent 32%),
      linear-gradient(180deg, #1e2530 0%, #111318 100%);
  }

  h1 {
    margin: 12px 0 4px;
    font-size: 38px;
    letter-spacing: 2px;
    text-align: center;
  }

  .sub {
    margin: 0 0 28px;
    text-align: center;
    color: #bfc7d5;
    font-size: 15px;
  }

  .grid {
    display: grid;
    gap: 14px;
  }

  .card {
    display: block;
    text-decoration: none;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 16px;
    padding: 18px 18px;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
  }

  .card:active {
    transform: scale(0.985);
  }

  .title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .desc {
    font-size: 14px;
    line-height: 1.5;
    color: #d4d9e3;
  }

  .tag {
    display: inline-block;
    margin-top: 12px;
    padding: 5px 9px;
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    font-size: 12px;
    color: #edf2ff;
  }

  .footer {
    margin-top: 30px;
    text-align: center;
    color: #7f8794;
    font-size: 12px;
  }
</style>
</head>
<body>
  <main class="wrap">
    <h1>3SEC GAMES</h1>
    <p class="sub">Small browser games collection</p>

    <section class="grid">
      <a class="card" href="https://kaggleosaka.github.io/ai-lab/games/3sec/games/hetzer_road/hetzer_road.html">
        <div class="title">HETZER ROAD</div>
        <div class="desc">Top-down tank shooter. Move, dodge, destroy enemies, and survive the road.</div>
        <span class="tag">Tank Shooter</span>
      </a>

      <a class="card" href="https://kaggleosaka.github.io/ai-lab/games/3sec/visual-search/">
        <div class="title">VISUAL SEARCH</div>
        <div class="desc">3-second visual search games. Find the target quickly.</div>
        <span class="tag">Visual Search</span>
      </a>
    </section>

    <div class="footer">kaggleosaka / ai-lab / games / 3sec</div>
  </main>
</body>
</html>
