<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スマホでマンカラ</title>
  <style>
    :root {
      --wood-dark: #7d4c27;
      --wood-mid: #b8783d;
      --wood-light: #e3b878;
      --cream: #fff3d6;
      --ink: #2e1b0f;
      --green: #5aa05a;
      --red: #c45b42;
      --gold: #f5c84c;
      --shadow: rgba(67, 32, 8, 0.28);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      background: #2f2117;
      font-family: "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      color: var(--ink);
    }

    .game-frame {
      position: fixed;
      top: 0;
      left: 50%;
      width: 464px;
      height: 825px;
      overflow: hidden;
      transform: translateX(-50%);
    }

    .game {
      position: absolute;
      top: 0;
      left: 0;
      width: 464px;
      height: 825px;
      transform-origin: top left;
      overflow: hidden;
      padding: 20px 18px 18px;
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,0.22), transparent 25%),
        linear-gradient(100deg, rgba(95, 47, 17, 0.18) 0 10%, transparent 10% 22%, rgba(80, 39, 13, 0.14) 22% 30%, transparent 30% 45%, rgba(255,255,255,0.10) 45% 54%, transparent 54% 72%, rgba(89, 43, 16, 0.13) 72% 83%, transparent 83%),
        linear-gradient(180deg, #f3cf92, #d99851 48%, #b86c33);
      border-radius: 0;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
    }

    .game::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 4px solid rgba(93, 49, 22, 0.35);
      pointer-events: none;
    }

    .menu-back {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 12;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 66px;
      height: 34px;
      padding: 0 13px;
      border: 2px solid rgba(255, 246, 224, 0.72);
      border-radius: 999px;
      background: rgba(69, 35, 15, 0.74);
      color: #fff3d6;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      text-decoration: none;
      text-shadow: 0 2px 0 rgba(0,0,0,0.35);
      box-shadow: 0 6px 14px rgba(62, 29, 9, 0.28);
    }

    .menu-back:active {
      transform: translateY(2px);
    }

    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: 42px;
      line-height: 1;
      letter-spacing: 0;
      color: #35200f;
      text-shadow: 0 2px 0 rgba(255,255,255,0.35);
    }

    .subtitle {
      margin-top: 5px;
      font-size: 15px;
      font-weight: 800;
      color: rgba(46, 27, 15, 0.72);
    }

    .scorebar {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 0 4px 10px;
    }

    .score {
      min-height: 50px;
      padding: 8px 10px;
      background: rgba(255, 243, 214, 0.72);
      border: 2px solid rgba(93, 49, 22, 0.2);
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.35), 0 6px 12px rgba(70, 35, 13, 0.14);
    }

    .score span {
      display: block;
      font-size: 14px;
      font-weight: 900;
      color: rgba(46, 27, 15, 0.64);
    }

    .score strong {
      display: block;
      margin-top: 2px;
      font-size: 22px;
      line-height: 1;
    }

    .board {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 62px 1fr 62px;
      grid-template-rows: 96px 148px 96px;
      gap: 14px 8px;
      align-items: center;
      padding: 14px 6px;
      min-height: 390px;
      background:
        linear-gradient(120deg, rgba(255,255,255,0.16), transparent 34%),
        linear-gradient(180deg, rgba(126, 67, 28, 0.36), rgba(77, 38, 15, 0.28));
      border: 4px solid rgba(79, 42, 18, 0.48);
      border-radius: 28px;
      box-shadow: inset 0 6px 16px rgba(255,255,255,0.16), inset 0 -12px 24px rgba(71, 34, 12, 0.25), 0 12px 24px var(--shadow);
    }

    .row-label {
      grid-column: 1 / -1;
      justify-self: center;
      align-self: end;
      height: 22px;
      font-size: 15px;
      font-weight: 900;
      color: rgba(255, 246, 222, 0.9);
      text-shadow: 0 2px 3px rgba(42, 19, 5, 0.32);
    }

    .cpu-label {
      grid-row: 1;
    }

    .player-label {
      grid-row: 3;
      align-self: start;
    }

    .pits {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 5px;
      width: 100%;
    }

    .cpu-row {
      grid-column: 2;
      grid-row: 1;
      align-self: center;
      padding-top: 22px;
    }

    .player-row {
      grid-column: 2;
      grid-row: 3;
      align-self: center;
      padding-bottom: 18px;
    }

    .pit,
    .store {
      position: relative;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 0;
      color: var(--cream);
      font: 900 25px/1 "Hiragino Sans", "Yu Gothic", "Meiryo", system-ui, sans-serif;
      text-shadow: 0 2px 4px rgba(44, 20, 6, 0.5);
      background:
        radial-gradient(circle at 36% 30%, rgba(255,255,255,0.2), transparent 18%),
        radial-gradient(circle at center, #5d331b 0 47%, #3a1e10 70% 100%);
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.38), inset 0 -7px 8px rgba(255,255,255,0.08), 0 6px 12px rgba(63, 30, 10, 0.24);
      transition: transform 150ms ease, box-shadow 150ms ease, filter 150ms ease;
    }

    .stone-layer {
      position: absolute;
      inset: 8px 6px;
      pointer-events: none;
      z-index: 1;
    }

    .store .stone-layer {
      inset: 31px 7px 24px;
    }

    .stone {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--stone-color);
      box-shadow:
        inset 2px 2px 3px rgba(255,255,255,0.52),
        inset -2px -2px 3px rgba(45, 20, 6, 0.22),
        0 2px 4px rgba(24, 10, 3, 0.34);
    }

    .store .stone {
      width: 14px;
      height: 14px;
    }

    .pit-count,
    .store-count {
      position: absolute;
      z-index: 2;
      display: grid;
      place-items: center;
      min-width: 19px;
      height: 19px;
      padding: 0 4px;
      border-radius: 999px;
      right: 4px;
      bottom: 4px;
      font-size: 12px;
      background: rgba(43, 22, 10, 0.64);
      box-shadow: 0 2px 5px rgba(26, 11, 3, 0.28);
    }

    .store-count {
      left: 50%;
      right: auto;
      bottom: 8px;
      transform: translateX(-50%);
      min-width: 38px;
      height: 32px;
      font-size: 24px;
      background: rgba(43, 22, 10, 0.7);
    }

    .pit {
      width: 40px;
      height: 66px;
      border-radius: 22px;
    }

    .pit::after,
    .store::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: inherit;
      border: 2px solid rgba(255, 221, 154, 0.14);
      pointer-events: none;
    }

    .player-row .pit.selectable {
      cursor: pointer;
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.34), 0 0 0 3px rgba(255, 235, 122, 0.64), 0 0 22px rgba(255, 226, 84, 0.72);
    }

    .player-row .pit.selectable:active {
      transform: scale(0.96);
    }

    .pit.pulse,
    .store.pulse {
      transform: scale(1.08);
      filter: brightness(1.18);
    }

    .pit.capture {
      box-shadow: inset 0 8px 12px rgba(0,0,0,0.35), 0 0 0 4px rgba(255, 246, 158, 0.76), 0 0 24px rgba(255, 239, 111, 0.85);
    }

    .store {
      width: 60px;
      height: 136px;
      border-radius: 30px;
      font-size: 34px;
    }

    .store small {
      position: absolute;
      z-index: 2;
      top: 13px;
      left: 0;
      width: 100%;
      font-size: 12px;
      color: rgba(255, 243, 214, 0.78);
      text-shadow: none;
    }

    .cpu-store {
      grid-column: 1;
      grid-row: 2;
    }

    .player-store {
      grid-column: 3;
      grid-row: 2;
      background:
        radial-gradient(circle at 36% 30%, rgba(255,255,255,0.22), transparent 18%),
        radial-gradient(circle at center, #705124 0 47%, #3f2410 70% 100%);
      box-shadow:
        inset 0 8px 12px rgba(0,0,0,0.34),
        inset 0 -7px 8px rgba(255,255,255,0.08),
        0 0 0 4px rgba(255, 226, 84, 0.7),
        0 0 24px rgba(255, 226, 84, 0.5);
    }

    .player-store small {
      color: #fff5c7;
      font-size: 13px;
      font-weight: 900;
    }

    .fly-stone {
      position: absolute;
      z-index: 4;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background: var(--stone-color);
      box-shadow:
        inset 2px 2px 3px rgba(255,255,255,0.58),
        inset -2px -2px 3px rgba(45, 20, 6, 0.24),
        0 5px 10px rgba(33, 14, 4, 0.36);
      pointer-events: none;
      will-change: left, top, transform;
    }

    .pit.drop,
    .store.drop {
      filter: brightness(1.28);
      box-shadow:
        inset 0 8px 12px rgba(0,0,0,0.3),
        0 0 0 4px rgba(255, 246, 158, 0.76),
        0 0 20px rgba(255, 239, 111, 0.78);
    }

    .message {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      min-height: 72px;
      margin: 12px 4px 10px;
      padding: 12px;
      text-align: center;
      background: rgba(255, 246, 224, 0.82);
      border: 3px solid rgba(96, 53, 24, 0.2);
      border-radius: 18px;
      box-shadow: inset 0 2px 8px rgba(255,255,255,0.45), 0 8px 16px rgba(74, 36, 12, 0.14);
    }

    .message-main {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.1;
    }

    .message-sub {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 800;
      color: rgba(46, 27, 15, 0.62);
    }

    .actions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 0 4px;
    }

    .difficulty {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 0 4px 12px;
      padding: 6px;
      background: rgba(255, 246, 224, 0.54);
      border: 2px solid rgba(96, 53, 24, 0.16);
      border-radius: 16px;
    }

    .difficulty button {
      height: 34px;
      border: 0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 900;
      color: rgba(50, 29, 13, 0.76);
      background: rgba(255, 242, 194, 0.72);
      box-shadow: inset 0 -2px 0 rgba(112, 65, 27, 0.16);
      cursor: pointer;
    }

    .difficulty button.active {
      color: #321d0d;
      background: linear-gradient(180deg, #fff2a9, #f1bd45);
      box-shadow: 0 3px 0 #8d5525, 0 6px 12px rgba(52, 25, 8, 0.18);
    }

    .big-get {
      position: absolute;
      left: 50%;
      top: 51%;
      z-index: 6;
      display: none;
      min-width: 260px;
      padding: 17px 20px;
      border-radius: 22px;
      text-align: center;
      color: #321d0d;
      background: linear-gradient(180deg, #fff3a7, #ffbd3f);
      border: 4px solid rgba(111, 62, 20, 0.35);
      box-shadow: 0 18px 36px rgba(45, 20, 6, 0.3), 0 0 28px rgba(255, 233, 91, 0.72);
      font-weight: 900;
      transform: translate(-50%, -50%) scale(0.72);
      pointer-events: none;
    }

    .big-get.show {
      display: block;
      animation: bigGetPop 900ms ease both;
    }

    .big-get strong {
      display: block;
      font-size: 34px;
      line-height: 1.05;
    }

    .big-get span {
      display: block;
      margin-top: 4px;
      font-size: 20px;
    }

    @keyframes bigGetPop {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.58) rotate(-4deg); }
      18% { opacity: 1; transform: translate(-50%, -50%) scale(1.12) rotate(2deg); }
      36% { transform: translate(-50%, -50%) scale(0.98) rotate(0deg); }
      78% { opacity: 1; transform: translate(-50%, -58%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -68%) scale(0.92); }
    }

    .action {
      height: 52px;
      border: 0;
      border-radius: 17px;
      font-size: 19px;
      font-weight: 900;
      color: #321d0d;
      background: linear-gradient(180deg, #fff0b8, #e9ae4c);
      box-shadow: 0 7px 0 #8d5525, 0 12px 18px rgba(52, 25, 8, 0.22);
      cursor: pointer;
    }

    .action:active {
      transform: translateY(5px);
      box-shadow: 0 2px 0 #8d5525, 0 7px 12px rgba(52, 25, 8, 0.18);
    }

    .modal,
    .result {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: none;
      place-items: center;
      padding: 26px;
      background: rgba(36, 20, 10, 0.56);
    }

    .modal.open,
    .result.open {
      display: grid;
    }

    .panel {
      width: 100%;
      padding: 24px 22px;
      background: #fff3d6;
      border: 5px solid rgba(100, 55, 24, 0.36);
      border-radius: 22px;
      box-shadow: 0 22px 46px rgba(35, 18, 6, 0.38);
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 30px;
      line-height: 1.1;
      text-align: center;
    }

    .rules {
      margin: 0 0 20px;
      padding-left: 1.2em;
      font-size: 18px;
      line-height: 1.55;
      font-weight: 800;
    }

    .close {
      width: 100%;
    }

    .result .panel {
      text-align: center;
    }

    .result-title {
      font-size: 44px;
      font-weight: 900;
      line-height: 1.05;
      margin-bottom: 10px;
    }

    .result-score {
      margin-bottom: 22px;
      font-size: 20px;
      font-weight: 900;
    }

    @media (max-width: 600px), (max-height: 824px) {
      body {
        place-items: start center;
        overflow: hidden;
      }
    }
  </style>
</head>
<body>
  <div class="game-frame">
  <main class="game" aria-label="スマホでマンカラ">
    <a class="menu-back" href="../index.html#puzzle" aria-label="Back to menu">Menu</a>
    <header>
      <h1>MANCALA</h1>
      <div class="subtitle">スマホでマンカラ</div>
    </header>

    <section class="scorebar" aria-label="スコア">
      <div class="score">
        <span>CPU 石数 / スコア</span>
        <strong id="cpuScore">0</strong>
      </div>
      <div class="score">
        <span>あなた 石数 / スコア</span>
        <strong id="playerScore">0</strong>
      </div>
    </section>

    <section class="board" aria-label="マンカラ盤">
      <div class="row-label cpu-label">CPU側</div>
      <div class="pits cpu-row" id="cpuRow"></div>
      <div class="store cpu-store" id="cpuStore"><small>CPU</small><span class="store-count">0</span></div>
      <div class="store player-store" id="playerStore"><small>あなたGOAL</small><span class="store-count">0</span></div>
      <div class="pits player-row" id="playerRow"></div>
      <div class="row-label player-label">プレイヤー側</div>
    </section>

    <section class="message" aria-live="polite">
      <div>
        <div class="message-main" id="messageMain">あなたの番です</div>
        <div class="message-sub" id="messageSub">光っている穴をタップ</div>
      </div>
    </section>

    <section class="difficulty" aria-label="難易度">
      <button class="active" type="button" data-difficulty="easy">やさしい</button>
      <button type="button" data-difficulty="normal">ふつう</button>
      <button type="button" data-difficulty="hard">つよい</button>
    </section>

    <section class="actions">
      <button class="action" id="restartBtn" type="button">リスタート</button>
      <button class="action" id="rulesBtn" type="button">ルール</button>
    </section>

    <div class="big-get" id="bigGet" aria-hidden="true">
      <strong>大量ゲット！</strong>
      <span id="bigGetCount">+0</span>
    </div>

    <div class="modal" id="rulesModal" role="dialog" aria-modal="true" aria-labelledby="rulesTitle">
      <div class="panel">
        <h2 id="rulesTitle">ルール</h2>
        <ul class="rules">
          <li>自分側の穴を選んで石を配ります。</li>
          <li>最後の石が自分のゴールに入るともう一度。</li>
          <li>最後の石が自分側の空穴に入ると、向かいの石を獲得。</li>
          <li>ゴールの石が多い方が勝ちです。</li>
        </ul>
        <button class="action close" id="closeRulesBtn" type="button">閉じる</button>
      </div>
    </div>

    <div class="result" id="resultModal" role="dialog" aria-modal="true" aria-labelledby="resultTitle">
      <div class="panel">
        <div class="result-title" id="resultTitle">あなたの勝ち！</div>
        <div class="result-score" id="resultScore">あなた 0 - CPU 0</div>
        <button class="action close" id="resultRestartBtn" type="button">もう一度</button>
      </div>
    </div>
  </main>
  </div>

  <script>
    const PIT_COUNT = 6;
    const START_STONES = 4;
    const CPU_DELAY = 600;
    const STONE_COLORS = ["#f26f5e", "#ffd166", "#5bc0eb", "#70c878", "#b98cff", "#ff9f43"];
    const STONE_POSITIONS = [
      [16, 16], [46, 22], [29, 44], [61, 47], [12, 52], [39, 10],
      [58, 9], [24, 65], [50, 66], [8, 30], [72, 30], [35, 28]
    ];

    const board = {
      cpu: Array(PIT_COUNT).fill(START_STONES),
      player: Array(PIT_COUNT).fill(START_STONES),
      cpuStore: 0,
      playerStore: 0,
      turn: "player",
      gameOver: false
    };

    const cpuRow = document.getElementById("cpuRow");
    const playerRow = document.getElementById("playerRow");
    const cpuStore = document.getElementById("cpuStore");
    const playerStore = document.getElementById("playerStore");
    const cpuScore = document.getElementById("cpuScore");
    const playerScore = document.getElementById("playerScore");
    const messageMain = document.getElementById("messageMain");
    const messageSub = document.getElementById("messageSub");
    const restartBtn = document.getElementById("restartBtn");
    const rulesBtn = document.getElementById("rulesBtn");
    const rulesModal = document.getElementById("rulesModal");
    const closeRulesBtn = document.getElementById("closeRulesBtn");
    const resultModal = document.getElementById("resultModal");
    const resultTitle = document.getElementById("resultTitle");
    const resultScore = document.getElementById("resultScore");
    const resultRestartBtn = document.getElementById("resultRestartBtn");
    const gameFrame = document.querySelector(".game-frame");
    const gameElement = document.querySelector(".game");
    const difficultyButtons = document.querySelectorAll(".difficulty button");
    const bigGet = document.getElementById("bigGet");
    const bigGetCount = document.getElementById("bigGetCount");

    let cpuTimer = null;
    let animating = false;
    let difficulty = "easy";
    let audioContext = null;

    function fitGameToViewport() {
      const viewport = window.visualViewport || window;
      const scale = Math.min(viewport.width / 464, viewport.height / 825, 1);
      const frameWidth = Math.round(464 * scale * 1000) / 1000;
      const frameHeight = Math.round(825 * scale * 1000) / 1000;
      gameFrame.style.width = `${frameWidth}px`;
      gameFrame.style.height = `${frameHeight}px`;
      gameElement.style.left = "0px";
      gameElement.style.transform = `scale(${scale})`;
    }

    function createPits() {
      cpuRow.innerHTML = "";
      playerRow.innerHTML = "";

      for (let i = 0; i < PIT_COUNT; i++) {
        const cpuPit = document.createElement("button");
        cpuPit.className = "pit";
        cpuPit.type = "button";
        cpuPit.disabled = true;
        cpuPit.dataset.side = "cpu";
        cpuPit.dataset.index = i;
        cpuPit.setAttribute("aria-label", `CPU側 ${i + 1}番の穴`);
        createCupContent(cpuPit);
        cpuRow.appendChild(cpuPit);

        const playerPit = document.createElement("button");
        playerPit.className = "pit";
        playerPit.type = "button";
        playerPit.dataset.side = "player";
        playerPit.dataset.index = i;
        playerPit.setAttribute("aria-label", `プレイヤー側 ${i + 1}番の穴`);
        createCupContent(playerPit);
        playerPit.addEventListener("click", () => handlePlayerMove(i));
        playerRow.appendChild(playerPit);
      }
    }

    function createCupContent(cup) {
      const layer = document.createElement("span");
      layer.className = "stone-layer";

      const count = document.createElement("span");
      count.className = "pit-count";

      cup.appendChild(layer);
      cup.appendChild(count);
    }

    function resetGame() {
      clearTimeout(cpuTimer);
      animating = false;
      document.querySelectorAll(".fly-stone").forEach((stone) => stone.remove());
      board.cpu = Array(PIT_COUNT).fill(START_STONES);
      board.player = Array(PIT_COUNT).fill(START_STONES);
      board.cpuStore = 0;
      board.playerStore = 0;
      board.turn = "player";
      board.gameOver = false;
      resultModal.classList.remove("open");
      setMessage("あなたの番です", "光っている穴をタップ");
      render();
    }

    function render() {
      const cpuPits = cpuRow.querySelectorAll(".pit");
      const playerPits = playerRow.querySelectorAll(".pit");

      board.cpu.forEach((stones, i) => {
        renderCup(cpuPits[i], stones, i + 20);
      });

      board.player.forEach((stones, i) => {
        const pit = playerPits[i];
        renderCup(pit, stones, i);
        const selectable = board.turn === "player" && !board.gameOver && stones > 0;
        pit.disabled = !selectable;
        pit.classList.toggle("selectable", selectable);
      });

      renderCup(cpuStore, board.cpuStore, 40);
      renderCup(playerStore, board.playerStore, 50);
      cpuScore.textContent = board.cpuStore;
      playerScore.textContent = board.playerStore;
    }

    function renderCup(cup, stones, seed) {
      let layer = cup.querySelector(".stone-layer");
      let count = cup.querySelector(".pit-count") || cup.querySelector(".store-count");

      if (!layer) {
        layer = document.createElement("span");
        layer.className = "stone-layer";
        cup.insertBefore(layer, cup.firstChild);
      }

      layer.innerHTML = "";
      count.textContent = stones;

      const visibleStones = Math.min(stones, 12);
      for (let i = 0; i < visibleStones; i++) {
        const stone = document.createElement("span");
        const [left, top] = STONE_POSITIONS[(i + seed) % STONE_POSITIONS.length];
        const color = STONE_COLORS[(i + seed) % STONE_COLORS.length];

        stone.className = "stone";
        stone.style.left = `${left}%`;
        stone.style.top = `${top}%`;
        stone.style.setProperty("--stone-color", color);
        stone.style.transform = `rotate(${(i * 37 + seed * 11) % 90}deg)`;
        layer.appendChild(stone);
      }
    }

    function setMessage(main, sub = "") {
      messageMain.textContent = main;
      messageSub.textContent = sub;
    }

    function unlockAudio() {
      const AudioType = window.AudioContext || window.webkitAudioContext;
      if (!AudioType) {
        return;
      }
      if (!audioContext) {
        audioContext = new AudioType();
      }
      if (audioContext.state === "suspended") {
        audioContext.resume();
      }
    }

    function playSound(type) {
      if (!audioContext) {
        return;
      }

      const now = audioContext.currentTime;
      const gain = audioContext.createGain();
      const osc = audioContext.createOscillator();
      const sounds = {
        pick: { frequency: 260, end: 360, duration: 0.08, volume: 0.04, wave: "triangle" },
        drop: { frequency: 620, end: 420, duration: 0.07, volume: 0.035, wave: "sine" },
        store: { frequency: 520, end: 760, duration: 0.11, volume: 0.045, wave: "triangle" },
        capture: { frequency: 330, end: 640, duration: 0.18, volume: 0.055, wave: "square" },
        big: { frequency: 260, end: 880, duration: 0.32, volume: 0.065, wave: "triangle" },
        extra: { frequency: 700, end: 930, duration: 0.13, volume: 0.045, wave: "sine" },
        win: { frequency: 420, end: 980, duration: 0.42, volume: 0.06, wave: "triangle" },
        lose: { frequency: 360, end: 190, duration: 0.34, volume: 0.045, wave: "sawtooth" }
      };
      const sound = sounds[type] || sounds.drop;

      osc.type = sound.wave;
      osc.frequency.setValueAtTime(sound.frequency, now);
      osc.frequency.exponentialRampToValueAtTime(sound.end, now + sound.duration);
      gain.gain.setValueAtTime(0.001, now);
      gain.gain.exponentialRampToValueAtTime(sound.volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + sound.duration);
      osc.connect(gain);
      gain.connect(audioContext.destination);
      osc.start(now);
      osc.stop(now + sound.duration + 0.02);
    }

    function showBigGet(count) {
      bigGetCount.textContent = `+${count}`;
      bigGet.classList.remove("show");
      void bigGet.offsetWidth;
      bigGet.classList.add("show");
      setTimeout(() => bigGet.classList.remove("show"), 920);
    }

    async function handlePlayerMove(index) {
      if (animating || board.gameOver || board.turn !== "player" || board.player[index] === 0) {
        return;
      }

      unlockAudio();
      playSound("pick");
      animating = true;
      pulsePit("player", index);
      await animateMove("player", index, board.player[index]);
      const result = makeMove(board, "player", index);
      animating = false;
      finishMove(result);
    }

    function finishMove(result) {
      render();

      if (result.captured) {
        highlightCapture(result.side, result.index, result.oppositeIndex);
        if (result.capturedCount >= 5) {
          showBigGet(result.capturedCount);
          playSound("big");
          setMessage("大量ゲット！", `${result.capturedCount}個の石を獲得`);
        } else {
          playSound("capture");
          setMessage("石を獲得しました！", result.extraTurn ? "さらに続けて打てます" : "");
        }
      }

      if (checkGameOver()) {
        return;
      }

      if (result.extraTurn) {
        board.turn = result.side;
        playSound("extra");
        setMessage("もう一度打てます！", result.side === "player" ? "あなたの番です" : "CPUが続けます");
        render();
        if (board.turn === "cpu") {
          scheduleCpuMove();
        }
        return;
      }

      board.turn = result.side === "player" ? "cpu" : "player";
      if (board.turn === "cpu") {
        setMessage("CPUの番です", "考えています");
        render();
        scheduleCpuMove();
      } else {
        setMessage("あなたの番です", "光っている穴をタップ");
        render();
      }
    }

    function makeMove(state, side, index) {
      const own = state[side];
      let stones = own[index];
      own[index] = 0;

      let pos = { type: "pit", side, index };
      let last = null;

      while (stones > 0) {
        pos = nextPosition(pos, side);
        if (pos.type === "store" && pos.side !== side) {
          continue;
        }

        if (pos.type === "store") {
          state[`${pos.side}Store`]++;
        } else {
          state[pos.side][pos.index]++;
        }

        stones--;
        last = { ...pos };
      }

      const result = {
        side,
        index: last && last.type === "pit" ? last.index : null,
        oppositeIndex: null,
        extraTurn: last && last.type === "store" && last.side === side,
        captured: false,
        capturedCount: 0
      };

      if (last && last.type === "pit" && last.side === side && state[side][last.index] === 1) {
        const opponent = side === "player" ? "cpu" : "player";
        const oppositeIndex = last.index;
        const capturedStones = state[opponent][oppositeIndex];

        if (capturedStones > 0) {
          state[side][last.index] = 0;
          state[opponent][oppositeIndex] = 0;
          state[`${side}Store`] += capturedStones + 1;
          result.captured = true;
          result.capturedCount = capturedStones + 1;
          result.oppositeIndex = oppositeIndex;
        }
      }

      return result;
    }

    function nextPosition(pos, mover) {
      if (pos.type === "pit") {
        if (pos.side === "player") {
          if (pos.index < PIT_COUNT - 1) {
            return { type: "pit", side: "player", index: pos.index + 1 };
          }
          return { type: "store", side: "player" };
        }

        if (pos.index > 0) {
          return { type: "pit", side: "cpu", index: pos.index - 1 };
        }
        return { type: "store", side: "cpu" };
      }

      if (pos.side === "player") {
        return { type: "pit", side: "cpu", index: PIT_COUNT - 1 };
      }

      return { type: "pit", side: "player", index: 0 };
    }

    function getMovePath(side, index, stones) {
      const path = [];
      let pos = { type: "pit", side, index };

      while (path.length < stones) {
        pos = nextPosition(pos, side);
        if (pos.type === "store" && pos.side !== side) {
          continue;
        }
        path.push({ ...pos });
      }

      return path;
    }

    async function animateMove(side, index, stones) {
      const path = getMovePath(side, index, stones);
      const from = getCupCenter(getCupElement({ type: "pit", side, index }));

      for (let i = 0; i < path.length; i++) {
        const targetElement = getCupElement(path[i]);
        const to = getCupCenter(targetElement);
        const stone = document.createElement("span");

        stone.className = "fly-stone";
        stone.style.setProperty("--stone-color", STONE_COLORS[(i + index + (side === "cpu" ? 3 : 0)) % STONE_COLORS.length]);
        stone.style.left = `${from.x - 7}px`;
        stone.style.top = `${from.y - 7}px`;
        gameElement.appendChild(stone);

        await animateFlyingStone(stone, from, to, i);
        playSound(path[i].type === "store" ? "store" : "drop");
        targetElement.classList.add("pulse");
        targetElement.classList.add("drop");

        await sleep(52);
        stone.remove();
        targetElement.classList.remove("pulse");
        targetElement.classList.remove("drop");
      }
    }

    function animateFlyingStone(stone, from, to, index) {
      const duration = 230;
      const start = performance.now();
      const arc = 34 + (index % 3) * 6;

      return new Promise((resolve) => {
        function step(now) {
          const raw = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - raw, 3);
          const hop = Math.sin(raw * Math.PI) * arc;
          const x = from.x + (to.x - from.x) * eased;
          const y = from.y + (to.y - from.y) * eased - hop;
          const scale = 1 + Math.sin(raw * Math.PI) * 0.32;

          stone.style.left = `${x - 7}px`;
          stone.style.top = `${y - 7}px`;
          stone.style.transform = `scale(${scale}) rotate(${Math.round(eased * 180)}deg)`;

          if (raw < 1) {
            requestAnimationFrame(step);
          } else {
            resolve();
          }
        }

        requestAnimationFrame(step);
      });
    }

    function getCupElement(pos) {
      if (pos.type === "store") {
        return pos.side === "player" ? playerStore : cpuStore;
      }

      const row = pos.side === "player" ? playerRow : cpuRow;
      return row.querySelector(`.pit[data-index="${pos.index}"]`);
    }

    function getCupCenter(element) {
      const gameRect = gameElement.getBoundingClientRect();
      const rect = element.getBoundingClientRect();
      const scale = gameRect.width / 464 || 1;

      return {
        x: (rect.left - gameRect.left + rect.width / 2) / scale,
        y: (rect.top - gameRect.top + rect.height / 2) / scale
      };
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function checkGameOver() {
      const playerEmpty = board.player.every((stones) => stones === 0);
      const cpuEmpty = board.cpu.every((stones) => stones === 0);

      if (!playerEmpty && !cpuEmpty) {
        return false;
      }

      board.playerStore += board.player.reduce((sum, stones) => sum + stones, 0);
      board.cpuStore += board.cpu.reduce((sum, stones) => sum + stones, 0);
      board.player = Array(PIT_COUNT).fill(0);
      board.cpu = Array(PIT_COUNT).fill(0);
      board.gameOver = true;
      render();

      let title = "引き分け！";
      if (board.playerStore > board.cpuStore) {
        title = "あなたの勝ち！";
        playSound("win");
      } else if (board.playerStore < board.cpuStore) {
        title = "CPUの勝ち！";
        playSound("lose");
      } else {
        playSound("extra");
      }

      setMessage(title, `あなた ${board.playerStore} - CPU ${board.cpuStore}`);
      resultTitle.textContent = title;
      resultScore.textContent = `あなた ${board.playerStore} - CPU ${board.cpuStore}`;
      setTimeout(() => resultModal.classList.add("open"), 500);
      return true;
    }

    function scheduleCpuMove() {
      clearTimeout(cpuTimer);
      cpuTimer = setTimeout(async () => {
        if (board.gameOver || board.turn !== "cpu") {
          return;
        }

        const move = chooseCpuMove();
        if (move === null) {
          checkGameOver();
          return;
        }

        animating = true;
        playSound("pick");
        pulsePit("cpu", move);
        await animateMove("cpu", move, board.cpu[move]);
        const result = makeMove(board, "cpu", move);
        animating = false;
        finishMove(result);
      }, CPU_DELAY);
    }

    function chooseCpuMove() {
      const legalMoves = board.cpu
        .map((stones, index) => stones > 0 ? index : null)
        .filter((index) => index !== null);

      if (legalMoves.length === 0) {
        return null;
      }

      if (difficulty === "easy" && Math.random() < 0.72) {
        return legalMoves[Math.floor(Math.random() * legalMoves.length)];
      }

      const scoredMoves = legalMoves.map((index) => ({
        index,
        score: scoreCpuMove(index, difficulty === "hard")
      }));

      scoredMoves.sort((a, b) => b.score - a.score);
      return scoredMoves[0].index;
    }

    function scoreCpuMove(index, hardMode = false) {
      const beforeStore = board.cpuStore;
      const copy = cloneBoard(board);
      const result = makeMove(copy, "cpu", index);
      const gained = copy.cpuStore - beforeStore;
      const playerThreat = estimatePlayerThreat(copy);
      let score = 0;

      if (result.extraTurn) {
        score += hardMode ? 1250 : 1000;
      }
      if (result.captured) {
        score += (hardMode ? 440 : 360) + gained * (hardMode ? 22 : 18);
      }

      score += gained * (hardMode ? 12 : 8);
      score -= playerThreat * (hardMode ? 18 : 12);

      if (hardMode && result.extraTurn) {
        score += estimateCpuFollowup(copy) * 10;
      }

      score += Math.random() * (hardMode ? 2 : 8);
      return score;
    }

    function estimateCpuFollowup(state) {
      let best = 0;
      for (let i = 0; i < PIT_COUNT; i++) {
        if (state.cpu[i] === 0) {
          continue;
        }
        const copy = cloneBoard(state);
        const before = copy.cpuStore;
        const result = makeMove(copy, "cpu", i);
        const gain = copy.cpuStore - before + (result.extraTurn ? 4 : 0);
        best = Math.max(best, gain);
      }
      return best;
    }

    function estimatePlayerThreat(state) {
      let maxGain = 0;
      for (let i = 0; i < PIT_COUNT; i++) {
        if (state.player[i] === 0) {
          continue;
        }
        const copy = cloneBoard(state);
        const before = copy.playerStore;
        const result = makeMove(copy, "player", i);
        const gain = copy.playerStore - before + (result.extraTurn ? 3 : 0);
        maxGain = Math.max(maxGain, gain);
      }
      return maxGain;
    }

    function cloneBoard(source) {
      return {
        cpu: [...source.cpu],
        player: [...source.player],
        cpuStore: source.cpuStore,
        playerStore: source.playerStore,
        turn: source.turn,
        gameOver: source.gameOver
      };
    }

    function pulsePit(side, index) {
      const row = side === "player" ? playerRow : cpuRow;
      const pit = row.querySelector(`.pit[data-index="${index}"]`);
      if (!pit) {
        return;
      }
      pit.classList.add("pulse");
      setTimeout(() => pit.classList.remove("pulse"), 220);
    }

    function highlightCapture(side, index, oppositeIndex) {
      const ownRow = side === "player" ? playerRow : cpuRow;
      const opponentRow = side === "player" ? cpuRow : playerRow;
      const ownPit = ownRow.querySelector(`.pit[data-index="${index}"]`);
      const oppositePit = opponentRow.querySelector(`.pit[data-index="${oppositeIndex}"]`);

      [ownPit, oppositePit].forEach((pit) => {
        if (!pit) {
          return;
        }
        pit.classList.add("capture");
        setTimeout(() => pit.classList.remove("capture"), 450);
      });
    }

    restartBtn.addEventListener("click", resetGame);
    resultRestartBtn.addEventListener("click", resetGame);
    rulesBtn.addEventListener("click", () => rulesModal.classList.add("open"));
    closeRulesBtn.addEventListener("click", () => rulesModal.classList.remove("open"));
    difficultyButtons.forEach((button) => {
      button.addEventListener("click", () => {
        unlockAudio();
        playSound("drop");
        difficulty = button.dataset.difficulty;
        difficultyButtons.forEach((item) => item.classList.toggle("active", item === button));
        if (!board.gameOver && board.turn === "player") {
          setMessage("あなたの番です", `難易度: ${button.textContent}`);
        }
      });
    });
    rulesModal.addEventListener("click", (event) => {
      if (event.target === rulesModal) {
        rulesModal.classList.remove("open");
      }
    });
    window.addEventListener("resize", fitGameToViewport);
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", fitGameToViewport);
      window.visualViewport.addEventListener("scroll", fitGameToViewport);
    }

    createPits();
    fitGameToViewport();
    resetGame();
  </script>
</body>
</html>
