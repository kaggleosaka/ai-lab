<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Color Drop Challenge</title>
<style>
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #07111f;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-x: hidden;
    overflow-y: auto;
    font-family: Arial, Helvetica, sans-serif;
  }

  .game {
    width: 464px;
    min-height: 825px;
    max-width: 100vw;
    background: linear-gradient(180deg, #111827 0%, #07111f 62%, #020617 100%);
    position: relative;
    overflow: hidden;
    color: white;
    touch-action: manipulation;
  }

  .menu-back {
    position: absolute;
    top: 76px;
    left: 18px;
    z-index: 30;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 72px;
    height: 38px;
    padding: 0 14px;
    border: 2px solid rgba(255,255,255,0.45);
    border-radius: 999px;
    background: rgba(7, 17, 31, 0.68);
    color: #fff;
    font-size: 14px;
    font-weight: 900;
    text-decoration: none;
    text-shadow: 0 2px 0 #000;
    box-shadow: 0 6px 16px rgba(0,0,0,0.28);
    backdrop-filter: blur(8px);
  }

  .menu-back:active {
    transform: translateY(2px);
  }

  .top {
    position: absolute;
    top: 24px;
    left: 18px;
    right: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 5;
    font-weight: 900;
    font-size: 22px;
    text-shadow: 0 3px 0 #000;
  }

  .title {
    position: absolute;
    top: 82px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 36px;
    font-weight: 1000;
    color: #fff;
    text-shadow:
      0 4px 0 #000,
      2px 2px 0 #000,
      -2px 2px 0 #000;
    z-index: 5;
  }

  .subtitle {
    position: absolute;
    top: 130px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 17px;
    font-weight: 900;
    color: #ffd93d;
    text-shadow: 0 3px 0 #000;
    z-index: 5;
  }

  .play-area {
    position: absolute;
    left: 0;
    right: 0;
    top: 165px;
    bottom: 210px;
    overflow: hidden;
  }

  .drop-ball {
    position: absolute;
    width: 82px;
    height: 82px;
    border-radius: 50%;
    left: 191px;
    top: -90px;
    box-shadow:
      0 0 28px currentColor,
      inset -8px -10px 0 rgba(0,0,0,0.18),
      inset 7px 7px 0 rgba(255,255,255,0.32);
    border: 5px solid rgba(255,255,255,0.72);
    transition: background-color 0.12s linear, color 0.12s linear;
  }

  .drop-ball::before {
    content: "";
    position: absolute;
    left: 18px;
    top: 14px;
    width: 18px;
    height: 18px;
    background: rgba(255,255,255,0.75);
    border-radius: 50%;
  }

  .danger-line {
    position: absolute;
    left: 34px;
    right: 34px;
    bottom: 4px;
    height: 8px;
    border-radius: 999px;
    background: repeating-linear-gradient(
      90deg,
      #ff3b3b 0px,
      #ff3b3b 18px,
      #ffd93d 18px,
      #ffd93d 36px
    );
    box-shadow: 0 0 16px rgba(255,70,70,0.7);
  }

  .buttons {
    position: absolute;
    left: 18px;
    right: 18px;
    bottom: 56px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 11px;
    z-index: 8;
  }

  .color-btn {
    height: 86px;
    border-radius: 24px;
    border: 5px solid rgba(255,255,255,0.82);
    box-shadow:
      0 8px 0 rgba(0,0,0,0.35),
      0 0 20px currentColor,
      inset 0 5px 0 rgba(255,255,255,0.35);
    cursor: pointer;
  }

  .color-btn:active {
    transform: translateY(6px);
    box-shadow:
      0 2px 0 rgba(0,0,0,0.35),
      0 0 18px currentColor,
      inset 0 5px 0 rgba(255,255,255,0.35);
  }

  .message {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 154px;
    text-align: center;
    font-size: 28px;
    font-weight: 1000;
    text-shadow: 0 4px 0 #000;
    z-index: 10;
    opacity: 0;
    transform: scale(0.85);
    transition: all 0.16s ease;
  }

  .message.show {
    opacity: 1;
    transform: scale(1);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.66);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 20;
    text-align: center;
    padding: 24px;
  }

  .overlay.hidden {
    display: none;
  }

  .overlay h1 {
    margin: 0;
    font-size: 52px;
    line-height: 0.95;
    font-weight: 1000;
    color: #ffffff;
    text-shadow: 0 5px 0 #000;
  }

  .overlay p {
    margin: 22px 0 0;
    font-size: 22px;
    line-height: 1.35;
    font-weight: 900;
    color: #ffd93d;
    text-shadow: 0 3px 0 #000;
  }

  .overlay .small {
    color: white;
    font-size: 18px;
    margin-top: 14px;
  }

  .tap-start {
    margin-top: 34px;
    padding: 16px 34px;
    border-radius: 999px;
    background: linear-gradient(180deg, #00d9ff, #1277ff);
    color: white;
    font-size: 24px;
    font-weight: 1000;
    box-shadow: 0 8px 0 #084e9c;
  }

  .shake {
    animation: shake 0.28s ease;
  }

  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
  }

  .pop {
    animation: pop 0.22s ease;
  }

  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.28); }
    100% { transform: scale(1); }
  }

  .particle {
    position: absolute;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 7;
    animation: particle 0.5s ease-out forwards;
  }

  @keyframes particle {
    to {
      transform: translate(var(--dx), var(--dy)) scale(0.1);
      opacity: 0;
    }
  }

  .footer {
    position: absolute;
    bottom: 18px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 15px;
    font-weight: 800;
    color: rgba(255,255,255,0.74);
    z-index: 6;
  }

  @media (max-width: 420px) {
    .top {
      top: 20px;
      left: 14px;
      right: 14px;
      font-size: 19px;
    }

    .menu-back {
      top: 64px;
      left: 12px;
      height: 34px;
      min-width: 64px;
      font-size: 13px;
    }

    .title {
      top: 72px;
      font-size: 31px;
    }

    .subtitle {
      top: 116px;
      font-size: 15px;
    }

    .play-area {
      top: 150px;
      bottom: 190px;
    }

    .drop-ball {
      width: 74px;
      height: 74px;
    }

    .buttons {
      left: 12px;
      right: 12px;
      bottom: 48px;
      gap: 8px;
    }

    .color-btn {
      height: 76px;
      border-radius: 18px;
      border-width: 4px;
    }

    .message {
      bottom: 134px;
      font-size: 24px;
    }

    .footer {
      bottom: 16px;
      font-size: 13px;
    }

    .overlay h1 {
      font-size: 44px;
    }

    .overlay p {
      font-size: 19px;
    }

    .tap-start {
      font-size: 21px;
      padding: 14px 28px;
    }
  }
</style>
</head>
<body>
<div class="game" id="game">
  <a class="menu-back" href="https://kaggleosaka.github.io/ai-lab/games/3sec/visual-search/" aria-label="Back to menu">Menu</a>
  <div class="top">
    <div id="score">Score: 0</div>
    <div id="best">Best: 0</div>
  </div>

  <div class="title">Color Drop</div>
  <div class="subtitle">Tap the matching color!</div>

  <div class="play-area" id="playArea">
    <div class="drop-ball" id="ball"></div>
    <div class="danger-line"></div>
  </div>

  <div class="message" id="message">GOOD!</div>

  <div class="buttons" id="buttons"></div>

  <div class="footer">Simple 3-second color game</div>

  <div class="overlay" id="startOverlay">
    <h1>Color Drop</h1>
    <p>Tap the same color<br>before the ball falls!</p>
    <div class="small">Easy. Fast. Addictive.</div>
    <div class="tap-start">Tap to Start</div>
  </div>

  <div class="overlay hidden" id="gameOverOverlay">
    <h1>GAME<br>OVER</h1>
    <p id="finalScore">Score: 0</p>
    <div class="small">Tap to Restart</div>
  </div>
</div>

<script>
(() => {
  const COLORS = [
    { name: "pink", value: "#ff3b8d" },
    { name: "cyan", value: "#00d9ff" },
    { name: "yellow", value: "#ffd93d" },
    { name: "purple", value: "#9b5cff" }
  ];

  const game = document.getElementById("game");
  const playArea = document.getElementById("playArea");
  const ballEl = document.getElementById("ball");
  const buttonsEl = document.getElementById("buttons");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const messageEl = document.getElementById("message");
  const startOverlay = document.getElementById("startOverlay");
  const gameOverOverlay = document.getElementById("gameOverOverlay");
  const finalScoreEl = document.getElementById("finalScore");

  let state = "start";
  let score = 0;
  let best = Number(localStorage.getItem("colorDropBest") || 0);
  let currentColorIndex = 0;
  let y = -90;
  let speed = 2.3;
  let rafId = null;
  let lastTime = 0;

  bestEl.textContent = "Best: " + best;

  function createButtons() {
    buttonsEl.innerHTML = "";
    COLORS.forEach((color, index) => {
      const btn = document.createElement("button");
      btn.className = "color-btn";
      btn.style.background = color.value;
      btn.style.color = color.value;
      btn.setAttribute("aria-label", color.name);
      btn.addEventListener("pointerdown", (e) => {
        e.preventDefault();
        chooseColor(index);
      });
      buttonsEl.appendChild(btn);
    });
  }

  function startGame() {
    state = "playing";
    score = 0;
    speed = 2.3;
    y = -90;
    startOverlay.classList.add("hidden");
    gameOverOverlay.classList.add("hidden");
    scoreEl.textContent = "Score: 0";
    nextBall();
    lastTime = performance.now();
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(loop);
  }

  function nextBall() {
    let next = currentColorIndex;
    while (next === currentColorIndex && COLORS.length > 1) {
      next = Math.floor(Math.random() * COLORS.length);
    }
    currentColorIndex = next;
    const color = COLORS[currentColorIndex].value;
    ballEl.style.background = color;
    ballEl.style.color = color;
    y = -90;
    ballEl.style.left = (70 + Math.random() * 242) + "px";
    updateBall();
  }

  function updateBall() {
    ballEl.style.top = y + "px";
  }

  function loop(t) {
    if (state !== "playing") return;

    const dt = Math.min(32, t - lastTime);
    lastTime = t;

    y += speed * (dt / 16.67);
    updateBall();

    const dangerY = playArea.clientHeight - 96;
    if (y >= dangerY) {
      endGame();
      return;
    }

    rafId = requestAnimationFrame(loop);
  }

  function chooseColor(index) {
    if (state === "start") {
      startGame();
      return;
    }

    if (state === "gameover") {
      startGame();
      return;
    }

    if (state !== "playing") return;

    if (index === currentColorIndex) {
      correct();
    } else {
      wrong();
    }
  }

  function correct() {
    score++;
    if (score > best) {
      best = score;
      localStorage.setItem("colorDropBest", String(best));
      bestEl.textContent = "Best: " + best;
    }

    scoreEl.textContent = "Score: " + score;
    speed = Math.min(6.2, 2.3 + score * 0.13);

    showMessage("GOOD!", "#2ed573");
    popButton(currentColorIndex);
    burstBall();
    nextBall();
  }

  function wrong() {
    showMessage("WRONG!", "#ff3b3b");
    game.classList.add("shake");
    setTimeout(() => game.classList.remove("shake"), 300);
    endGame();
  }

  function endGame() {
    if (state !== "playing") return;
    state = "gameover";
    finalScoreEl.textContent = "Score: " + score;
    gameOverOverlay.classList.remove("hidden");
    if (rafId) cancelAnimationFrame(rafId);
  }

  function showMessage(text, color) {
    messageEl.textContent = text;
    messageEl.style.color = color;
    messageEl.classList.add("show");
    setTimeout(() => messageEl.classList.remove("show"), 250);
  }

  function popButton(index) {
    const btn = buttonsEl.children[index];
    if (!btn) return;
    btn.classList.add("pop");
    setTimeout(() => btn.classList.remove("pop"), 230);
  }

  function burstBall() {
    const rect = ballEl.getBoundingClientRect();
    const gameRect = game.getBoundingClientRect();
    const x = rect.left - gameRect.left + rect.width / 2;
    const yPos = rect.top - gameRect.top + rect.height / 2;
    const color = COLORS[currentColorIndex].value;

    for (let i = 0; i < 16; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = x + "px";
      p.style.top = yPos + "px";
      p.style.background = color;
      p.style.setProperty("--dx", (Math.random() * 140 - 70) + "px");
      p.style.setProperty("--dy", (Math.random() * 120 - 70) + "px");
      game.appendChild(p);
      setTimeout(() => p.remove(), 520);
    }
  }

  startOverlay.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    startGame();
  });

  gameOverOverlay.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    startGame();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "1") chooseColor(0);
    if (e.key === "2") chooseColor(1);
    if (e.key === "3") chooseColor(2);
    if (e.key === "4") chooseColor(3);
    if (e.code === "Space" && state !== "playing") startGame();
  });

  createButtons();
  nextBall();
})();
</script>
</body>
</html>
