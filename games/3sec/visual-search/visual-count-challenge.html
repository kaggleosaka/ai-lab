<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visual Count Challenge</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #182033;
      --muted: #667085;
      --line: #d8dee9;
      --paper: #fbfcff;
      --panel: #ffffff;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --gold: #f5b700;
      --rose: #c2415b;
      --blue: #2563eb;
      --green: #16a34a;
      --shadow: 0 18px 45px rgba(24, 32, 51, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.08), transparent 34%),
        linear-gradient(225deg, rgba(245, 183, 0, 0.13), transparent 30%),
        var(--paper);
    }

    main {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(10px, 2vh, 22px);
      overflow: hidden;
    }

    .game {
      width: min(1040px, 100%);
      display: grid;
      grid-template-columns: minmax(430px, 640px) minmax(240px, 300px);
      gap: clamp(14px, 2vw, 24px);
      align-items: center;
      max-height: 100%;
    }

    .play-area,
    .side-area {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(216, 222, 233, 0.9);
      box-shadow: var(--shadow);
    }

    .play-area {
      position: relative;
      padding: clamp(14px, 2vh, 22px);
      border-radius: 8px;
      overflow: hidden;
    }

    .side-area {
      border-radius: 8px;
      padding: clamp(14px, 2vh, 20px);
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: clamp(10px, 1.8vh, 16px);
    }

    .menu-link {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 100px;
      height: 40px;
      border: 1px solid rgba(216, 222, 233, 0.9);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 8px 20px rgba(24, 32, 51, 0.08);
      transition: transform 0.14s ease, box-shadow 0.14s ease, background 0.14s ease;
      backdrop-filter: blur(10px);
    }

    .menu-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 12px 24px rgba(24, 32, 51, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3.5vh, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 16px;
      min-height: 20px;
    }

    .stats {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .stat {
      min-width: 86px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      text-align: center;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      display: block;
      margin-top: 4px;
      font-size: 20px;
      font-weight: 800;
    }

    .stat.danger {
      border-color: rgba(194, 65, 91, 0.35);
      background: #fff1f2;
    }

    .stat.danger .stat-value {
      color: var(--rose);
    }

    .grid-shell {
      position: relative;
      border: 1px solid var(--line);
      background: #eef2f7;
      border-radius: 8px;
      padding: clamp(8px, 1.5vh, 14px);
      display: flex;
      justify-content: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: clamp(6px, 1.2vh, 10px);
      aspect-ratio: 5 / 6;
      height: min(56vh, 560px);
      width: auto;
      max-width: 100%;
    }

    .grid.idle {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }

    .start-card {
      display: grid;
      place-items: center;
      min-height: 100%;
      border: 1px dashed rgba(102, 112, 133, 0.45);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-size: clamp(30px, 5vh, 52px);
      font-weight: 900;
    }

    .cell {
      display: grid;
      place-items: center;
      min-width: 0;
      border: 1px solid rgba(24, 32, 51, 0.1);
      border-radius: 8px;
      background: #fff;
      color: #1f2937;
      font-size: clamp(34px, 7vh, 62px);
      font-weight: 900;
      line-height: 1;
      user-select: none;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
    }

    .cell span {
      display: block;
      transform: rotate(var(--rotation, 0deg));
      transform-origin: center;
    }

    .grid.correct-flash .cell {
      border-color: rgba(22, 163, 74, 0.58);
      background: #ecfdf3;
    }

    .grid.wrong-shake {
      animation: shake 360ms ease;
    }

    .answer-block {
      margin-top: clamp(10px, 1.8vh, 16px);
    }

    .answer-title {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    button:active {
      transform: translateY(1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.58;
      transform: none;
    }

    .answer {
      min-height: clamp(48px, 7vh, 60px);
      color: #fff;
      background: var(--accent);
      font-size: clamp(22px, 3.4vh, 28px);
      box-shadow: 0 9px 18px rgba(15, 118, 110, 0.18);
    }

    .answer:hover:not(:disabled) {
      background: var(--accent-strong);
      transform: translateY(-1px);
    }

    .side-section + .side-section {
      margin-top: clamp(14px, 2.2vh, 20px);
      padding-top: clamp(12px, 2vh, 18px);
      border-top: 1px solid var(--line);
    }

    .side-title {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      font: inherit;
      font-weight: 700;
    }

    .message {
      min-height: clamp(58px, 9vh, 74px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid var(--line);
      padding: 14px;
      text-align: center;
      font-size: 20px;
      font-weight: 800;
    }

    .message.good {
      color: #0f6b3c;
      border-color: rgba(22, 163, 74, 0.35);
      background: #ecfdf3;
    }

    .message.bad {
      color: #9f1239;
      border-color: rgba(194, 65, 91, 0.35);
      background: #fff1f2;
    }

    .restart {
      width: 100%;
      min-height: 50px;
      color: #fff;
      background: var(--blue);
      margin-top: 12px;
      font-size: 17px;
      display: none;
    }

    .restart.show {
      display: block;
    }

    .restart:hover {
      background: #1d4ed8;
    }

    .round-type {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 8px;
      color: #1d2939;
      background: #fff8df;
      border: 1px solid rgba(245, 183, 0, 0.55);
      font-weight: 800;
    }

    .pop {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      color: var(--green);
      font-size: 58px;
      font-weight: 900;
      text-shadow: 0 8px 24px rgba(22, 163, 74, 0.25);
    }

    .pop.show {
      animation: popText 720ms ease;
    }

    .confetti {
      position: absolute;
      width: 9px;
      height: 18px;
      border-radius: 3px;
      top: 40%;
      left: 50%;
      pointer-events: none;
      animation: burst 720ms ease-out forwards;
    }

    @keyframes popText {
      0% {
        opacity: 0;
        transform: scale(0.75);
      }
      20% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: scale(1.18);
      }
    }

    @keyframes burst {
      from {
        opacity: 1;
        transform: translate(-50%, -50%) rotate(0deg);
      }
      to {
        opacity: 0;
        transform: translate(var(--x), var(--y)) rotate(260deg);
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    @media (max-width: 880px) {
      main {
        align-items: flex-start;
        padding: 68px 18px 18px;
        height: auto;
        min-height: 100vh;
        overflow: auto;
      }

      .menu-link {
        min-width: 88px;
        height: 38px;
        font-size: 13px;
      }

      .game {
        grid-template-columns: 1fr;
        max-height: none;
      }

      header {
        flex-direction: column;
      }

      .stats {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <a class="menu-link" href="./index.html">← MENU</a>
  <main>
    <section class="game" aria-label="Visual Count Challenge">
      <div class="play-area">
        <header>
          <div>
            <h1>Visual Count Challenge</h1>
            <p class="subtitle" id="instruction">How many targets are hidden?</p>
          </div>
          <div class="stats" aria-label="Game status">
            <div class="stat">
              <span class="stat-label">Round</span>
              <span class="stat-value" id="roundText">1 / 3</span>
            </div>
            <div class="stat">
              <span class="stat-label">Score</span>
              <span class="stat-value" id="scoreText">0</span>
            </div>
            <div class="stat" id="timeStat">
              <span class="stat-label">Time</span>
              <span class="stat-value" id="timeText">8.0</span>
            </div>
          </div>
        </header>

        <div class="grid-shell">
          <div class="grid idle" id="grid" aria-live="polite">
            <div class="start-card">Press Start</div>
          </div>
        </div>

        <div class="answer-block">
          <p class="answer-title">Answer</p>
          <div class="answers" id="answers">
            <button class="answer" type="button" data-answer="1">1</button>
            <button class="answer" type="button" data-answer="2">2</button>
            <button class="answer" type="button" data-answer="3">3</button>
            <button class="answer" type="button" data-answer="4">4</button>
          </div>
        </div>

        <div class="pop" id="popText">Correct!</div>
      </div>

      <aside class="side-area">
        <div class="side-section">
          <p class="side-title">Target</p>
          <select id="targetSelect" aria-label="Target pair">
          </select>
        </div>

        <div class="side-section">
          <p class="side-title">Rotation</p>
          <select id="rotationSelect" aria-label="Rotation setting">
            <option value="off">Off</option>
            <option value="on">On</option>
          </select>
        </div>

        <div class="side-section">
          <p class="side-title">Color</p>
          <select id="colorSelect" aria-label="Color setting">
            <option value="off">Off</option>
            <option value="on">On</option>
          </select>
        </div>

        <div class="side-section">
          <p class="side-title">Current</p>
          <div class="round-type" id="roundType">Count the 3s</div>
        </div>

        <div class="side-section">
          <p class="side-title">Result</p>
          <div class="message" id="message">Choose settings, then press Start.</div>
          <button class="restart show" id="startButton" type="button">Start</button>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const gridColumns = 5;
    const gridRows = 6;
    const cellCount = gridColumns * gridRows;
    const totalRounds = 3;
    const roundTimeLimit = 8;

    const targetPairs = [
      {
        id: "three-in-eight",
        label: "3 in 8",
        instruction: "How many 3s are hidden?",
        target: "3",
        distractor: "8",
        minTargets: 1,
        maxTargets: 4
      },
      {
        id: "o-in-q",
        label: "O in Q",
        instruction: "How many Os are hidden?",
        target: "O",
        distractor: "Q",
        minTargets: 1,
        maxTargets: 4
      },
      {
        id: "five-in-z",
        label: "5 in Z",
        instruction: "How many 5s are hidden?",
        target: "5",
        distractor: "Z",
        minTargets: 1,
        maxTargets: 4
      },
      {
        id: "two-in-z",
        label: "2 in Z",
        instruction: "How many 2s are hidden?",
        target: "2",
        distractor: "Z",
        minTargets: 1,
        maxTargets: 4
      },
      {
        id: "zero-in-o",
        label: "0 in O",
        instruction: "How many 0s are hidden?",
        target: "0",
        distractor: "O",
        minTargets: 1,
        maxTargets: 4
      },
      {
        id: "one-in-i",
        label: "1 in I",
        instruction: "How many 1s are hidden?",
        target: "1",
        distractor: "I",
        minTargets: 1,
        maxTargets: 4
      },
      {
        id: "f-in-e",
        label: "F in E",
        instruction: "How many Fs are hidden?",
        target: "F",
        distractor: "E",
        minTargets: 1,
        maxTargets: 4
      },
      {
        id: "eight-in-b",
        label: "8 in B",
        instruction: "How many 8s are hidden?",
        target: "8",
        distractor: "B",
        minTargets: 1,
        maxTargets: 4
      }
    ];

    let currentRound = 0;
    let score = 0;
    let correctCount = 0;
    let currentTargetPair = null;
    let isAnswered = false;
    let audioContext = null;
    let timerId = null;
    let roundEndsAt = 0;

    const gridEl = document.getElementById("grid");
    const instructionEl = document.getElementById("instruction");
    const roundTextEl = document.getElementById("roundText");
    const scoreTextEl = document.getElementById("scoreText");
    const timeTextEl = document.getElementById("timeText");
    const timeStatEl = document.getElementById("timeStat");
    const messageEl = document.getElementById("message");
    const answersEl = document.getElementById("answers");
    const startButton = document.getElementById("startButton");
    const popText = document.getElementById("popText");
    const targetSelect = document.getElementById("targetSelect");
    const rotationSelect = document.getElementById("rotationSelect");
    const colorSelect = document.getElementById("colorSelect");
    const roundTypeEl = document.getElementById("roundType");

    function setupTargetSelect() {
      const randomOption = document.createElement("option");
      randomOption.value = "random";
      randomOption.textContent = "Random";
      targetSelect.appendChild(randomOption);

      targetPairs.forEach((pair) => {
        const option = document.createElement("option");
        option.value = pair.id;
        option.textContent = pair.label;
        targetSelect.appendChild(option);
      });
    }

    function startGame() {
      stopTimer();
      currentRound = 0;
      score = 0;
      startButton.classList.remove("show");
      setMessage("Find the hidden targets.", "");
      startRound();
    }

    function showStartScreen() {
      stopTimer();
      currentRound = 0;
      score = 0;
      correctCount = 0;
      isAnswered = true;
      roundTextEl.textContent = `0 / ${totalRounds}`;
      scoreTextEl.textContent = "0";
      updateTimerDisplay(roundTimeLimit);
      instructionEl.textContent = "Choose settings, then press Start.";
      roundTypeEl.textContent = "Ready";
      setMessage("Choose settings, then press Start.", "");
      setAnswerButtonsEnabled(false);
      gridEl.className = "grid idle";
      gridEl.innerHTML = '<div class="start-card">Press Start</div>';
      startButton.textContent = "Start";
      startButton.classList.add("show");
    }

    function startRound() {
      currentRound += 1;
      isAnswered = false;
      currentTargetPair = chooseTargetPair();
      const cells = generateRoundCells(currentTargetPair);

      instructionEl.textContent = currentTargetPair.instruction;
      roundTextEl.textContent = `${currentRound} / ${totalRounds}`;
      scoreTextEl.textContent = String(score);
      roundTypeEl.textContent = getCurrentSettingLabel();
      setMessage("Choose the count.", "");
      setAnswerButtonsEnabled(true);
      renderGrid(cells);
      startTimer();
    }

    function chooseTargetPair() {
      if (targetSelect.value === "random") {
        return targetPairs[randomInt(0, targetPairs.length - 1)];
      }

      return targetPairs.find((pair) => pair.id === targetSelect.value) || targetPairs[0];
    }

    function getCurrentSettingLabel() {
      const rotationText = rotationSelect.value === "on" ? "Rotation On" : "Rotation Off";
      const colorText = colorSelect.value === "on" ? "Color On" : "Color Off";
      return `${currentTargetPair.label} / ${rotationText} / ${colorText}`;
    }

    function generateRoundCells(targetPair) {
      correctCount = randomInt(targetPair.minTargets, targetPair.maxTargets);
      const targetPositions = new Set();

      while (targetPositions.size < correctCount) {
        targetPositions.add(randomInt(0, cellCount - 1));
      }

      return Array.from({ length: cellCount }, (_, index) => {
        const isTarget = targetPositions.has(index);
        return {
          char: isTarget ? targetPair.target : targetPair.distractor,
          isTarget,
          rotation: getRotation(),
          textColor: getTextColor(),
          backgroundColor: "#ffffff"
        };
      });
    }

    function getRotation() {
      if (rotationSelect.value !== "on") {
        return 0;
      }

      return Math.random() < 0.5 ? -30 : 30;
    }

    function getTextColor() {
      const colors = ["#1f2937", "#0f766e", "#2563eb", "#9f1239", "#7c2d12", "#6d28d9"];

      if (colorSelect.value === "on") {
        return colors[randomInt(0, colors.length - 1)];
      }

      return "#1f2937";
    }

    function renderGrid(cells) {
      gridEl.className = "grid";
      gridEl.innerHTML = "";

      cells.forEach((cell) => {
        const item = document.createElement("div");
        const glyph = document.createElement("span");

        item.className = "cell";
        item.style.backgroundColor = cell.backgroundColor;
        item.style.color = cell.textColor;
        item.style.setProperty("--rotation", `${cell.rotation}deg`);
        glyph.textContent = cell.char;
        item.appendChild(glyph);
        gridEl.appendChild(item);
      });
    }

    function handleAnswer(answer) {
      if (isAnswered) {
        return;
      }

      finishRound(answer);
    }

    function finishRound(answer) {
      if (isAnswered) {
        return;
      }

      isAnswered = true;
      stopTimer();
      setAnswerButtonsEnabled(false);

      if (answer === null) {
        setMessage(`Time up. The answer was ${correctCount}.`, "bad");
        showWrongEffect();
      } else if (answer === correctCount) {
        score += 1;
        scoreTextEl.textContent = String(score);
        setMessage("Correct!", "good");
        playCorrectSound();
        showCorrectEffect();
      } else {
        setMessage(`Not quite. The answer was ${correctCount}.`, "bad");
        showWrongEffect();
      }

      window.setTimeout(() => {
        if (currentRound >= totalRounds) {
          showFinalResult();
        } else {
          startRound();
        }
      }, 1200);
    }

    function startTimer() {
      roundEndsAt = performance.now() + roundTimeLimit * 1000;
      updateTimerDisplay(roundTimeLimit);
      stopTimer();
      timerId = window.setInterval(() => {
        const remaining = Math.max(0, (roundEndsAt - performance.now()) / 1000);
        updateTimerDisplay(remaining);

        if (remaining <= 0) {
          finishRound(null);
        }
      }, 100);
    }

    function stopTimer() {
      if (timerId !== null) {
        window.clearInterval(timerId);
        timerId = null;
      }
    }

    function updateTimerDisplay(remaining) {
      timeTextEl.textContent = remaining.toFixed(1);
      timeStatEl.classList.toggle("danger", remaining <= 3 && remaining > 0);
    }

    function setAnswerButtonsEnabled(enabled) {
      answersEl.querySelectorAll("button").forEach((button) => {
        button.disabled = !enabled;
      });
    }

    function setMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = type ? `message ${type}` : "message";
    }

    function showCorrectEffect() {
      gridEl.classList.add("correct-flash");
      popText.classList.remove("show");
      void popText.offsetWidth;
      popText.classList.add("show");
      createConfetti();

      window.setTimeout(() => {
        gridEl.classList.remove("correct-flash");
      }, 520);
    }

    function showWrongEffect() {
      gridEl.classList.remove("wrong-shake");
      void gridEl.offsetWidth;
      gridEl.classList.add("wrong-shake");

      window.setTimeout(() => {
        gridEl.classList.remove("wrong-shake");
      }, 420);
    }

    function createConfetti() {
      const colors = ["#f5b700", "#16a34a", "#2563eb", "#c2415b", "#0f766e"];

      for (let i = 0; i < 18; i += 1) {
        const piece = document.createElement("span");
        const angle = (Math.PI * 2 * i) / 18;
        const distance = randomInt(90, 190);
        piece.className = "confetti";
        piece.style.backgroundColor = colors[i % colors.length];
        piece.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
        piece.style.setProperty("--y", `${Math.sin(angle) * distance}px`);
        document.querySelector(".play-area").appendChild(piece);
        piece.addEventListener("animationend", () => piece.remove());
      }
    }

    function playCorrectSound() {
      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
      const startTime = audioContext.currentTime;
      playTone(660, startTime, 0.12);
      playTone(880, startTime + 0.14, 0.18);
    }

    function playTone(frequency, startTime, duration) {
      const oscillator = audioContext.createOscillator();
      const gain = audioContext.createGain();

      oscillator.type = "sine";
      oscillator.frequency.setValueAtTime(frequency, startTime);
      gain.gain.setValueAtTime(0.0001, startTime);
      gain.gain.exponentialRampToValueAtTime(0.18, startTime + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

      oscillator.connect(gain);
      gain.connect(audioContext.destination);
      oscillator.start(startTime);
      oscillator.stop(startTime + duration + 0.03);
    }

    function showFinalResult() {
      stopTimer();
      isAnswered = true;
      setAnswerButtonsEnabled(false);
      updateTimerDisplay(0);
      instructionEl.textContent = "Game complete.";
      roundTypeEl.textContent = "Finished";
      setMessage(`Final Score: ${score} / ${totalRounds} - ${getFinalMessage(score)}`, score > 0 ? "good" : "bad");
      startButton.textContent = "Play Again";
      startButton.classList.add("show");
    }

    function getFinalMessage(finalScore) {
      if (finalScore === 3) {
        return "Perfect! Sharp eyes!";
      }
      if (finalScore === 2) {
        return "Great job! Almost perfect.";
      }
      if (finalScore === 1) {
        return "Nice try. Keep training your eyes.";
      }
      return "Try again and look closely.";
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    answersEl.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-answer]");
      if (!button) {
        return;
      }
      handleAnswer(Number(button.dataset.answer));
    });

    startButton.addEventListener("click", startGame);

    targetSelect.addEventListener("change", showStartScreen);
    rotationSelect.addEventListener("change", showStartScreen);
    colorSelect.addEventListener("change", showStartScreen);

    window.addEventListener("keydown", (event) => {
      if (["1", "2", "3", "4"].includes(event.key)) {
        handleAnswer(Number(event.key));
      }
    });

    setupTargetSelect();
    showStartScreen();
  </script>
</body>
</html>
