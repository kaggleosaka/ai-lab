<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>3秒サバイバー</title>
  <style>
    :root {
      --bg1: #0f1226;
      --bg2: #1a1f3d;
      --panel: rgba(255,255,255,0.08);
      --panelBorder: rgba(255,255,255,0.16);
      --text: #ffffff;
      --sub: #cfd8ff;
      --accent: #ffd54a;
      --danger: #ff6b6b;
      --ok: #65e29a;
      --shadow: rgba(0,0,0,0.28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Yu Gothic", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #28336b 0%, var(--bg1) 40%, #090b18 100%);
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
    }

    .game-shell {
      position: relative;
      width: min(100vw - 24px, calc((100vh - 24px) * 9 / 16));
      height: min(calc((100vw - 24px) * 16 / 9), 100vh - 24px);
      aspect-ratio: 9 / 16;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 24px 60px var(--shadow);
      border: 1px solid var(--panelBorder);
      background: linear-gradient(180deg, #11172f 0%, #0b0f22 100%);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background:
        radial-gradient(circle at 50% 30%, rgba(85, 113, 255, 0.15), transparent 30%),
        linear-gradient(180deg, #151b39 0%, #0a0e1d 100%);
    }

    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .top-bar {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .badge {
      background: var(--panel);
      border: 1px solid var(--panelBorder);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: clamp(12px, 2.2vw, 16px);
      color: var(--text);
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .center-overlay,
    .title-screen,
    .result-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      background: linear-gradient(180deg, rgba(6,10,22,0.16), rgba(6,10,22,0.72));
    }

    .title-card,
    .result-card {
      width: min(92%, 420px);
      background: rgba(12, 18, 38, 0.72);
      border: 1px solid var(--panelBorder);
      border-radius: 28px;
      padding: 24px 18px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.26);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 6vw, 44px);
      line-height: 1.1;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--sub);
      font-size: clamp(15px, 3.3vw, 20px);
      line-height: 1.5;
    }

    .rule-list {
      margin: 0 auto 18px;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
      color: #eef2ff;
      font-weight: 700;
      font-size: clamp(14px, 3vw, 18px);
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 16px;
      pointer-events: auto;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: clamp(16px, 3.2vw, 20px);
      font-weight: 800;
      cursor: pointer;
      color: #14203f;
      background: linear-gradient(180deg, #ffe67f 0%, #ffd54a 100%);
      box-shadow: 0 8px 20px rgba(255, 213, 74, 0.35);
      transition: transform 0.08s ease, filter 0.15s ease;
    }

    button:hover { filter: brightness(1.04); }
    button:active { transform: scale(0.98); }

    .ghost {
      color: #eef2ff;
      background: rgba(255,255,255,0.08);
      box-shadow: none;
      border: 1px solid var(--panelBorder);
    }

    .count-overlay {
      font-size: clamp(52px, 13vw, 88px);
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 10px 24px rgba(0,0,0,0.34);
      animation: pulse 0.45s ease both;
    }

    .small-note {
      margin-top: 10px;
      color: var(--sub);
      font-size: clamp(14px, 2.7vw, 16px);
      font-weight: 700;
    }

    .result-title {
      font-size: clamp(28px, 7vw, 44px);
      font-weight: 900;
      margin: 0 0 8px;
    }

    .success { color: var(--ok); }
    .failure { color: var(--danger); }

    .stats {
      display: grid;
      gap: 10px;
      margin: 18px 0 6px;
    }

    .stat {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 12px;
      font-weight: 700;
      font-size: clamp(15px, 3vw, 18px);
      color: #eef2ff;
    }

    .footer-tip {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.78);
      font-size: clamp(11px, 2.4vw, 14px);
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .hide { display: none; }

    @keyframes pulse {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="game-shell">
      <canvas id="game" width="540" height="960"></canvas>

      <div class="hud">
        <div class="top-bar" id="topBar">
          <div class="badge" id="timeBadge">のこり 3.0秒</div>
          <div class="badge" id="hpBadge">HP 3</div>
          <div class="badge" id="killBadge">たおした数 0</div>
        </div>

        <div class="title-screen" id="titleScreen">
          <div class="title-card">
            <h1>3秒サバイバー</h1>
            <p class="subtitle">3秒にげきれ！<br>移動だけでOK。近い敵に自動で攻撃します。</p>
            <ul class="rule-list">
              <li>・WASD または 矢印キーで移動</li>
              <li>・敵に3回あたるとゲームオーバー</li>
              <li>・3秒生き残ればクリア</li>
            </ul>
            <div class="btn-row">
              <button id="startBtn">スタート</button>
            </div>
          </div>
        </div>

        <div class="center-overlay hide" id="countScreen">
          <div class="count-overlay" id="countText">3</div>
          <div class="small-note">よーい…</div>
        </div>

        <div class="result-screen hide" id="resultScreen">
          <div class="result-card">
            <div class="result-title" id="resultTitle">クリア！</div>
            <p class="subtitle" id="resultMessage">3秒生き残った！</p>
            <div class="stats">
              <div class="stat" id="resultTime">生存時間：3.0秒</div>
              <div class="stat" id="resultKills">撃破数：0</div>
              <div class="stat" id="resultBest">ひとこと：ギリギリ勝利！</div>
            </div>
            <div class="btn-row">
              <button id="retryBtn">もう1回</button>
              <button class="ghost" id="backBtn">タイトルへ</button>
            </div>
          </div>
        </div>

        <div class="footer-tip">録画向け：開始 → 3秒プレイ → 結果がすぐ出ます</div>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // 3秒サバイバー - 単一HTML完全版（演出強化＋スマホ対応版）
    // =========================

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const topBar = document.getElementById('topBar');
    const titleScreen = document.getElementById('titleScreen');
    const countScreen = document.getElementById('countScreen');
    const countText = document.getElementById('countText');
    const resultScreen = document.getElementById('resultScreen');
    const resultTitle = document.getElementById('resultTitle');
    const resultMessage = document.getElementById('resultMessage');
    const resultTime = document.getElementById('resultTime');
    const resultKills = document.getElementById('resultKills');
    const resultBest = document.getElementById('resultBest');

    const timeBadge = document.getElementById('timeBadge');
    const hpBadge = document.getElementById('hpBadge');
    const killBadge = document.getElementById('killBadge');

    const startBtn = document.getElementById('startBtn');
    const retryBtn = document.getElementById('retryBtn');
    const backBtn = document.getElementById('backBtn');

    const W = canvas.width;
    const H = canvas.height;

    const CONFIG = {
      GAME_TIME: 3.0,
      PLAYER_RADIUS: 16,
      PLAYER_SPEED: 340,
      PLAYER_MAX_HP: 3,
      BULLET_SPEED: 760,
      BULLET_RADIUS: 5,
      BULLET_COOLDOWN: 0.15,
      BULLET_DAMAGE: 1,
      ENEMY_RADIUS: 14,
      ENEMY_SPEED_MIN: 95,
      ENEMY_SPEED_MAX: 185,
      ENEMY_HP: 1,
      INVINCIBLE_TIME: 0.5,
      COUNTDOWN_TIME: 1.2,
      SPAWN_PLAN: [
        { t: 0.00, count: 5 },
        { t: 0.45, count: 5 },
        { t: 0.95, count: 7 },
        { t: 1.45, count: 8 },
        { t: 2.00, count: 10 },
        { t: 2.45, count: 8 }
      ],
      BACKGROUND_DOTS: 44,
      TRAIL_LENGTH: 7,
      JOYSTICK_BASE_R: 58,
      JOYSTICK_KNOB_R: 28,
      JOYSTICK_MARGIN: 92,
      TOUCH_DEADZONE: 0.12
    };

    let gameState = 'title';
    let lastTime = 0;
    let countdownTimer = 0;
    let elapsed = 0;
    let kills = 0;
    let spawnIndex = 0;

    const keys = {};
    let flashTimer = 0;
    let shakeTimer = 0;
    let successFlash = 0;
    let dangerPulse = 0;
    let announceTimer = 0;
    let announceText = '';
    let ringPulse = 0;
    let vignetteStrength = 0;

    let player;
    let bullets = [];
    let enemies = [];
    let effects = [];
    let bgStars = [];
    let floatingTexts = [];

    // スマホ操作用状態
    let activeTouchId = null;
    let touchState = {
      active: false,
      baseX: CONFIG.JOYSTICK_MARGIN,
      baseY: H - CONFIG.JOYSTICK_MARGIN,
      stickX: 0,
      stickY: 0,
      pointerX: 0,
      pointerY: 0
    };

    function isTouchDevice() {
      return ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    }

    function makeBackgroundStars() {
      bgStars = [];
      for (let i = 0; i < CONFIG.BACKGROUND_DOTS; i++) {
        bgStars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 2.2 + 0.8,
          a: Math.random() * 0.5 + 0.12,
          s: Math.random() * 16 + 8,
          tw: Math.random() * Math.PI * 2
        });
      }
    }

    function resetTouch() {
      activeTouchId = null;
      touchState.active = false;
      touchState.stickX = 0;
      touchState.stickY = 0;
      touchState.pointerX = touchState.baseX;
      touchState.pointerY = touchState.baseY;
    }

    function resetGame() {
      player = {
        x: W * 0.5,
        y: H * 0.62,
        radius: CONFIG.PLAYER_RADIUS,
        speed: CONFIG.PLAYER_SPEED,
        hp: CONFIG.PLAYER_MAX_HP,
        maxHp: CONFIG.PLAYER_MAX_HP,
        shootCooldown: 0,
        hitTimer: 0,
        facing: 0,
        trail: []
      };

      bullets = [];
      enemies = [];
      effects = [];
      floatingTexts = [];
      elapsed = 0;
      kills = 0;
      spawnIndex = 0;
      flashTimer = 0;
      shakeTimer = 0;
      successFlash = 0;
      dangerPulse = 0;
      announceTimer = 0;
      announceText = '';
      ringPulse = 0;
      vignetteStrength = 0;
      resetTouch();
      updateHUD();
    }

    function announce(text, sec = 0.55) {
      announceText = text;
      announceTimer = sec;
    }

    function addFloatingText(text, x, y, color = '#ffffff', size = 22) {
      floatingTexts.push({ text, x, y, color, size, life: 0.6, maxLife: 0.6, vy: -40 });
    }

    function startCountdown() {
      resetGame();
      gameState = 'countdown';
      countdownTimer = CONFIG.COUNTDOWN_TIME;
      titleScreen.classList.add('hide');
      resultScreen.classList.add('hide');
      countScreen.classList.remove('hide');
      topBar.classList.remove('hide');
      updateCountdownText();
    }

    function startGame() {
      gameState = 'playing';
      countScreen.classList.add('hide');
      announce('START!', 0.55);
      ringPulse = 1.0;
    }

    function endGame(clear) {
      gameState = clear ? 'clear' : 'gameover';
      resultScreen.classList.remove('hide');
      countScreen.classList.add('hide');
      resetTouch();

      const surviveText = `生存時間：${elapsed.toFixed(1)}秒`;
      const killText = `撃破数：${kills}`;
      let shortText = '';

      if (clear) {
        resultTitle.textContent = 'クリア！';
        resultTitle.className = 'result-title success';
        resultMessage.textContent = '3秒生き残った！';
        shortText = player.hp === 1 ? 'ひとこと：ギリギリ勝利！' : 'ひとこと：ナイス回避！';
        successFlash = 0.45;
        announce('CLEAR!', 0.85);
        emitBurst(player.x, player.y, '#8dffbe', 22, 140);
        emitBurst(player.x, player.y, '#ffe680', 16, 120);
      } else {
        resultTitle.textContent = 'ゲームオーバー';
        resultTitle.className = 'result-title failure';
        resultMessage.textContent = elapsed >= 2.6 ? 'あと少しだった！' : '敵に囲まれた！';
        shortText = elapsed < 1.5 ? 'ひとこと：ラッシュが速い！' : 'ひとこと：もう1回いける！';
        flashTimer = 0.3;
        shakeTimer = 0.35;
        announce('DOWN...', 0.8);
      }

      resultTime.textContent = surviveText;
      resultKills.textContent = killText;
      resultBest.textContent = shortText;
    }

    function backToTitle() {
      gameState = 'title';
      titleScreen.classList.remove('hide');
      resultScreen.classList.add('hide');
      countScreen.classList.add('hide');
      resetTouch();
      updateHUD();
    }

    function updateCountdownText() {
      if (countdownTimer > 0.8) countText.textContent = '3';
      else if (countdownTimer > 0.4) countText.textContent = '2';
      else countText.textContent = '1';
    }

    function updateHUD() {
      const remain = Math.max(0, CONFIG.GAME_TIME - elapsed);
      timeBadge.textContent = `のこり ${remain.toFixed(1)}秒`;
      hpBadge.textContent = `HP ${player ? player.hp : CONFIG.PLAYER_MAX_HP}`;
      killBadge.textContent = `たおした数 ${kills}`;
    }

    function spawnEnemy() {
      const side = Math.floor(Math.random() * 4);
      let x = 0;
      let y = 0;
      const margin = 34;

      if (side === 0) { x = Math.random() * W; y = -margin; }
      else if (side === 1) { x = W + margin; y = Math.random() * H; }
      else if (side === 2) { x = Math.random() * W; y = H + margin; }
      else { x = -margin; y = Math.random() * H; }

      enemies.push({
        x,
        y,
        radius: CONFIG.ENEMY_RADIUS + Math.random() * 3,
        speed: CONFIG.ENEMY_SPEED_MIN + Math.random() * (CONFIG.ENEMY_SPEED_MAX - CONFIG.ENEMY_SPEED_MIN),
        hp: CONFIG.ENEMY_HP,
        hue: Math.random() * 24 + 340,
        wobble: Math.random() * Math.PI * 2,
        pulse: Math.random() * Math.PI * 2
      });
    }

    function spawnWave(count) {
      for (let i = 0; i < count; i++) spawnEnemy();
      ringPulse = Math.min(1, ringPulse + 0.45);
      if (count >= 8) announce('RUSH!', 0.32);
    }

    function emitBurst(x, y, color, amount = 8, speedBase = 80) {
      for (let i = 0; i < amount; i++) {
        const a = (Math.PI * 2 * i) / amount + Math.random() * 0.4;
        const s = speedBase + Math.random() * speedBase;
        effects.push({
          type: 'particle',
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: 0.35 + Math.random() * 0.22,
          maxLife: 0.55,
          color,
          size: Math.random() * 4 + 2
        });
      }
    }

    function emitShockRing(x, y, color = 'rgba(255,255,255,0.8)', base = 20) {
      effects.push({
        type: 'ring', x, y, r: base, grow: 220, life: 0.24, maxLife: 0.24, color
      });
    }

    function nearestEnemy() {
      let best = null;
      let bestDist = Infinity;
      for (const enemy of enemies) {
        const dx = enemy.x - player.x;
        const dy = enemy.y - player.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < bestDist) {
          bestDist = d2;
          best = enemy;
        }
      }
      return best;
    }

    function shootAt(enemy) {
      if (!enemy) return;
      const dx = enemy.x - player.x;
      const dy = enemy.y - player.y;
      const angle = Math.atan2(dy, dx);
      player.facing = angle;

      bullets.push({
        x: player.x,
        y: player.y,
        vx: Math.cos(angle) * CONFIG.BULLET_SPEED,
        vy: Math.sin(angle) * CONFIG.BULLET_SPEED,
        radius: CONFIG.BULLET_RADIUS,
        damage: CONFIG.BULLET_DAMAGE,
        life: 1.0,
        angle
      });

      effects.push({
        type: 'muzzle',
        x: player.x + Math.cos(angle) * 18,
        y: player.y + Math.sin(angle) * 18,
        angle,
        life: 0.08,
        maxLife: 0.08
      });
    }

    function circleHit(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      const rr = a.radius + b.radius;
      return dx * dx + dy * dy <= rr * rr;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function getMoveInput() {
      let mx = 0;
      let my = 0;

      if (keys['ArrowLeft'] || keys['a'] || keys['A']) mx -= 1;
      if (keys['ArrowRight'] || keys['d'] || keys['D']) mx += 1;
      if (keys['ArrowUp'] || keys['w'] || keys['W']) my -= 1;
      if (keys['ArrowDown'] || keys['s'] || keys['S']) my += 1;

      if (touchState.active) {
        mx += touchState.stickX;
        my += touchState.stickY;
      }

      const len = Math.hypot(mx, my);
      if (len > 1) {
        mx /= len;
        my /= len;
      }

      if (Math.abs(mx) < CONFIG.TOUCH_DEADZONE) mx = 0;
      if (Math.abs(my) < CONFIG.TOUCH_DEADZONE) my = 0;

      return { mx, my };
    }

    function updatePlaying(dt) {
      elapsed += dt;
      const remain = CONFIG.GAME_TIME - elapsed;

      while (spawnIndex < CONFIG.SPAWN_PLAN.length && elapsed >= CONFIG.SPAWN_PLAN[spawnIndex].t) {
        spawnWave(CONFIG.SPAWN_PLAN[spawnIndex].count);
        spawnIndex++;
      }

      if (elapsed >= CONFIG.GAME_TIME) {
        elapsed = CONFIG.GAME_TIME;
        updateHUD();
        endGame(true);
        return;
      }

      if (remain <= 0.8) {
        dangerPulse += dt * 7;
        vignetteStrength = Math.min(1, (0.8 - remain) / 0.8);
      } else {
        dangerPulse = 0;
        vignetteStrength = 0;
      }

      player.hitTimer = Math.max(0, player.hitTimer - dt);
      player.shootCooldown -= dt;

      const { mx, my } = getMoveInput();

      player.x += mx * player.speed * dt;
      player.y += my * player.speed * dt;
      player.x = clamp(player.x, 24, W - 24);
      player.y = clamp(player.y, 90, H - 24);

      player.trail.unshift({ x: player.x, y: player.y, life: 1 });
      if (player.trail.length > CONFIG.TRAIL_LENGTH) player.trail.pop();

      if (player.shootCooldown <= 0) {
        const target = nearestEnemy();
        if (target) {
          shootAt(target);
          player.shootCooldown = CONFIG.BULLET_COOLDOWN;
        }
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        b.life -= dt;
        if (b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20 || b.life <= 0) {
          bullets.splice(i, 1);
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const dx = player.x - e.x;
        const dy = player.y - e.y;
        const len = Math.hypot(dx, dy) || 1;
        e.wobble += dt * 8;
        e.pulse += dt * 6;
        const wobbleX = Math.cos(e.wobble) * 14;
        const wobbleY = Math.sin(e.wobble) * 10;
        e.x += (dx / len) * e.speed * dt + wobbleX * dt * 0.25;
        e.y += (dy / len) * e.speed * dt + wobbleY * dt * 0.25;

        if (player.hitTimer <= 0 && circleHit(player, e)) {
          player.hp -= 1;
          player.hitTimer = CONFIG.INVINCIBLE_TIME;
          flashTimer = 0.16;
          shakeTimer = 0.22;
          ringPulse = 0.8;
          emitBurst(player.x, player.y, '#ff7b7b', 12, 100);
          emitShockRing(player.x, player.y, 'rgba(255,120,120,0.9)', 24);
          addFloatingText('-1', player.x, player.y - 14, '#ffb4b4', 30);
          announce('HIT!', 0.24);
          updateHUD();
          if (player.hp <= 0) {
            endGame(false);
            return;
          }
        }
      }

      for (let bi = bullets.length - 1; bi >= 0; bi--) {
        const b = bullets[bi];
        let hit = false;
        for (let ei = enemies.length - 1; ei >= 0; ei--) {
          const e = enemies[ei];
          if (circleHit(b, e)) {
            e.hp -= b.damage;
            emitBurst(b.x, b.y, '#ffe07a', 6, 60);
            bullets.splice(bi, 1);
            hit = true;
            if (e.hp <= 0) {
              emitBurst(e.x, e.y, '#ff8cb4', 10, 95);
              emitShockRing(e.x, e.y, 'rgba(255,220,130,0.8)', 14);
              enemies.splice(ei, 1);
              kills++;
              addFloatingText('+1', e.x, e.y - 10, '#fff0a3', 24);
              if (kills > 0 && kills % 5 === 0) announce(`${kills} KILLS!`, 0.36);
              updateHUD();
            }
            break;
          }
        }
        if (hit) continue;
      }

      for (let i = effects.length - 1; i >= 0; i--) {
        const ef = effects[i];
        ef.life -= dt;
        if (ef.type === 'particle') {
          ef.x += ef.vx * dt;
          ef.y += ef.vy * dt;
          ef.vx *= 0.97;
          ef.vy *= 0.97;
        } else if (ef.type === 'ring') {
          ef.r += ef.grow * dt;
        }
        if (ef.life <= 0) effects.splice(i, 1);
      }

      for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const t = floatingTexts[i];
        t.life -= dt;
        t.y += t.vy * dt;
        if (t.life <= 0) floatingTexts.splice(i, 1);
      }

      flashTimer = Math.max(0, flashTimer - dt);
      shakeTimer = Math.max(0, shakeTimer - dt);
      successFlash = Math.max(0, successFlash - dt);
      announceTimer = Math.max(0, announceTimer - dt);
      ringPulse = Math.max(0, ringPulse - dt * 1.8);
      updateHUD();
    }

    function update(dt) {
      if (gameState === 'countdown') {
        countdownTimer -= dt;
        updateCountdownText();
        if (countdownTimer <= 0) startGame();
      } else if (gameState === 'playing') {
        updatePlaying(dt);
      } else {
        announceTimer = Math.max(0, announceTimer - dt);
        successFlash = Math.max(0, successFlash - dt);
      }

      for (const star of bgStars) {
        star.y += star.s * dt;
        star.tw += dt * 2;
        if (star.y > H + 6) {
          star.y = -6;
          star.x = Math.random() * W;
        }
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, W, H);

      const grd = ctx.createLinearGradient(0, 0, 0, H);
      grd.addColorStop(0, '#19214a');
      grd.addColorStop(1, '#0b0f1e');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);

      const dangerGlow = Math.max(0, Math.sin(dangerPulse)) * vignetteStrength * 0.18;
      if (dangerGlow > 0) {
        const rg = ctx.createRadialGradient(W / 2, H / 2, 60, W / 2, H / 2, W * 0.72);
        rg.addColorStop(0, `rgba(255,120,120,0)`);
        rg.addColorStop(1, `rgba(255,90,90,${dangerGlow})`);
        ctx.fillStyle = rg;
        ctx.fillRect(0, 0, W, H);
      }

      for (const star of bgStars) {
        ctx.globalAlpha = star.a + Math.sin(star.tw) * 0.08;
        ctx.fillStyle = '#b8c8ff';
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let y = 120; y < H; y += 72) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      for (let x = 42; x < W; x += 84) {
        ctx.beginPath();
        ctx.moveTo(x, 90);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
    }

    function drawPlayerTrail() {
      if (!player || !player.trail) return;
      for (let i = player.trail.length - 1; i >= 0; i--) {
        const p = player.trail[i];
        const a = (i + 1) / player.trail.length;
        ctx.globalAlpha = 0.08 + a * 0.08;
        ctx.fillStyle = '#79e6ff';
        ctx.beginPath();
        ctx.arc(p.x, p.y, player.radius * (0.5 + 0.3 * a), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawPlayerAura() {
      const pulse = 1 + Math.sin(performance.now() * 0.012) * 0.05;
      const r = 26 * pulse + ringPulse * 16;
      const grd = ctx.createRadialGradient(player.x, player.y, 6, player.x, player.y, r);
      grd.addColorStop(0, 'rgba(124,229,255,0.35)');
      grd.addColorStop(1, 'rgba(124,229,255,0.0)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(player.x, player.y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawPlayer() {
      const blink = player.hitTimer > 0 && Math.floor(player.hitTimer * 18) % 2 === 0;
      if (blink) return;

      drawPlayerAura();

      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(player.x, player.y + 18, 20, 8, 0, 0, Math.PI * 2);
      ctx.fill();

      const body = ctx.createRadialGradient(player.x - 4, player.y - 6, 2, player.x, player.y, player.radius + 8);
      body.addColorStop(0, '#ecffff');
      body.addColorStop(0.45, '#8feaff');
      body.addColorStop(1, '#42b9ff');
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 3;
      ctx.strokeStyle = '#dff9ff';
      ctx.stroke();

      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(player.x, player.y, 6, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(player.x, player.y);
      ctx.lineTo(
        player.x + Math.cos(player.facing) * 22,
        player.y + Math.sin(player.facing) * 22
      );
      ctx.stroke();
    }

    function drawEnemies() {
      for (const e of enemies) {
        const pulse = 1 + Math.sin(e.pulse) * 0.07;
        const rr = e.radius * pulse;
        const grd = ctx.createRadialGradient(e.x - 4, e.y - 6, 2, e.x, e.y, rr + 6);
        grd.addColorStop(0, `hsla(${e.hue}, 100%, 85%, 1)`);
        grd.addColorStop(0.45, `hsla(${e.hue}, 90%, 65%, 1)`);
        grd.addColorStop(1, `hsla(${e.hue}, 90%, 42%, 1)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(e.x, e.y, rr, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,0.75)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(e.x - 4, e.y - 2, 2, 0, Math.PI * 2);
        ctx.arc(e.x + 4, e.y - 2, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawBullets() {
      for (const b of bullets) {
        ctx.save();
        ctx.translate(b.x, b.y);
        ctx.rotate(b.angle);
        const grd = ctx.createLinearGradient(-8, 0, 8, 0);
        grd.addColorStop(0, 'rgba(255,226,124,0.0)');
        grd.addColorStop(1, 'rgba(255,226,124,1)');
        ctx.strokeStyle = grd;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-10, 0);
        ctx.lineTo(4, 0);
        ctx.stroke();
        ctx.fillStyle = '#fff0b2';
        ctx.beginPath();
        ctx.arc(4, 0, b.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawEffects() {
      for (const ef of effects) {
        if (ef.type === 'particle') {
          const a = Math.max(0, ef.life / ef.maxLife);
          ctx.globalAlpha = a;
          ctx.fillStyle = ef.color;
          ctx.beginPath();
          ctx.arc(ef.x, ef.y, ef.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.globalAlpha = 1;
        } else if (ef.type === 'muzzle') {
          const a = Math.max(0, ef.life / ef.maxLife);
          ctx.save();
          ctx.translate(ef.x, ef.y);
          ctx.rotate(ef.angle);
          ctx.globalAlpha = a;
          ctx.fillStyle = '#fff3b6';
          ctx.beginPath();
          ctx.moveTo(12, 0);
          ctx.lineTo(-4, 5);
          ctx.lineTo(-4, -5);
          ctx.closePath();
          ctx.fill();
          ctx.restore();
          ctx.globalAlpha = 1;
        } else if (ef.type === 'ring') {
          const a = Math.max(0, ef.life / ef.maxLife);
          ctx.globalAlpha = a;
          ctx.strokeStyle = ef.color;
          ctx.lineWidth = 4;
          ctx.beginPath();
          ctx.arc(ef.x, ef.y, ef.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }
    }

    function drawFloatingTexts() {
      for (const t of floatingTexts) {
        const a = Math.max(0, t.life / t.maxLife);
        ctx.globalAlpha = a;
        ctx.fillStyle = t.color;
        ctx.font = `900 ${t.size}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 4;
        ctx.strokeText(t.text, t.x, t.y);
        ctx.fillText(t.text, t.x, t.y);
        ctx.globalAlpha = 1;
      }
    }

    function drawTouchGuide() {
      if (!isTouchDevice()) return;
      if (gameState !== 'playing' && gameState !== 'countdown') return;

      const bx = touchState.active ? touchState.baseX : CONFIG.JOYSTICK_MARGIN;
      const by = touchState.active ? touchState.baseY : H - CONFIG.JOYSTICK_MARGIN;
      const px = touchState.active ? touchState.pointerX : bx;
      const py = touchState.active ? touchState.pointerY : by;
      const alpha = touchState.active ? 0.95 : 0.35;

      ctx.save();
      ctx.globalAlpha = alpha;

      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.beginPath();
      ctx.arc(bx, by, CONFIG.JOYSTICK_BASE_R, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.22)';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.fillStyle = 'rgba(124,229,255,0.55)';
      ctx.beginPath();
      ctx.arc(px, py, CONFIG.JOYSTICK_KNOB_R, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.stroke();

      ctx.globalAlpha = touchState.active ? 0.9 : 0.45;
      ctx.fillStyle = '#eef7ff';
      ctx.font = '700 22px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('左下スライド', 28, H - 26);
      ctx.restore();
    }

    function drawPlayingUI() {
      const remain = CONFIG.GAME_TIME - elapsed;
      if (gameState === 'playing' && remain <= 0.8) {
        ctx.save();
        ctx.globalAlpha = 0.2 + (0.8 - remain) * 0.75;
        ctx.fillStyle = '#ffdf78';
        ctx.font = '900 68px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('あと少し！', W / 2, 160);
        ctx.restore();
      }

      if (announceTimer > 0 && announceText) {
        const a = Math.min(1, announceTimer * 2);
        ctx.save();
        ctx.globalAlpha = a;
        ctx.font = '900 54px sans-serif';
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'rgba(0,0,0,0.35)';
        ctx.lineWidth = 8;
        ctx.strokeText(announceText, W / 2, H * 0.22);
        ctx.fillStyle = '#ffffff';
        if (announceText.includes('CLEAR')) ctx.fillStyle = '#aaf5c6';
        else if (announceText.includes('HIT') || announceText.includes('DOWN')) ctx.fillStyle = '#ffadad';
        else if (announceText.includes('RUSH')) ctx.fillStyle = '#ffe28a';
        ctx.fillText(announceText, W / 2, H * 0.22);
        ctx.restore();
      }
    }

    function drawVignette() {
      const rg = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.9);
      rg.addColorStop(0, 'rgba(0,0,0,0)');
      rg.addColorStop(1, `rgba(0,0,0,${0.18 + vignetteStrength * 0.22})`);
      ctx.fillStyle = rg;
      ctx.fillRect(0, 0, W, H);
    }

    function render() {
      drawBackground();

      let shakeX = 0;
      let shakeY = 0;
      if (shakeTimer > 0) {
        shakeX = (Math.random() - 0.5) * 10;
        shakeY = (Math.random() - 0.5) * 10;
      }

      ctx.save();
      ctx.translate(shakeX, shakeY);

      if (player) drawPlayerTrail();
      drawEnemies();
      drawBullets();
      if (player) drawPlayer();
      drawEffects();
      drawFloatingTexts();
      drawPlayingUI();
      drawTouchGuide();

      ctx.restore();
      drawVignette();

      if (flashTimer > 0) {
        ctx.fillStyle = `rgba(255, 90, 90, ${flashTimer * 1.8})`;
        ctx.fillRect(0, 0, W, H);
      }

      if (successFlash > 0) {
        ctx.fillStyle = `rgba(140, 255, 190, ${successFlash * 0.6})`;
        ctx.fillRect(0, 0, W, H);
      }
    }

    function loop(ts) {
      if (!lastTime) lastTime = ts;
      let dt = (ts - lastTime) / 1000;
      lastTime = ts;
      if (dt > 0.033) dt = 0.033;

      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    function getCanvasPoint(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function updateTouchFromPoint(x, y) {
      const dx = x - touchState.baseX;
      const dy = y - touchState.baseY;
      const len = Math.hypot(dx, dy);
      const maxLen = CONFIG.JOYSTICK_BASE_R;
      const nx = len > 0 ? dx / len : 0;
      const ny = len > 0 ? dy / len : 0;
      const useLen = Math.min(len, maxLen);

      touchState.pointerX = touchState.baseX + nx * useLen;
      touchState.pointerY = touchState.baseY + ny * useLen;
      touchState.stickX = maxLen > 0 ? (nx * useLen) / maxLen : 0;
      touchState.stickY = maxLen > 0 ? (ny * useLen) / maxLen : 0;
    }

    canvas.addEventListener('touchstart', (e) => {
      if (!isTouchDevice()) return;
      if (gameState !== 'playing' && gameState !== 'countdown') return;
      const t = e.changedTouches[0];
      if (!t || activeTouchId !== null) return;

      const p = getCanvasPoint(t.clientX, t.clientY);
      activeTouchId = t.identifier;
      touchState.active = true;
      touchState.baseX = Math.min(Math.max(p.x, 70), W * 0.42);
      touchState.baseY = Math.min(Math.max(p.y, H * 0.56), H - 70);
      touchState.pointerX = touchState.baseX;
      touchState.pointerY = touchState.baseY;
      updateTouchFromPoint(p.x, p.y);
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!touchState.active) return;
      for (const t of e.changedTouches) {
        if (t.identifier === activeTouchId) {
          const p = getCanvasPoint(t.clientX, t.clientY);
          updateTouchFromPoint(p.x, p.y);
          e.preventDefault();
          break;
        }
      }
    }, { passive: false });

    function releaseTouchById(id) {
      if (id === activeTouchId) resetTouch();
    }

    canvas.addEventListener('touchend', (e) => {
      for (const t of e.changedTouches) releaseTouchById(t.identifier);
    }, { passive: true });

    canvas.addEventListener('touchcancel', (e) => {
      for (const t of e.changedTouches) releaseTouchById(t.identifier);
    }, { passive: true });

    window.addEventListener('keydown', (e) => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", " "].includes(e.key)) {
        e.preventDefault();
      }
      keys[e.key] = true;

      if ((gameState === 'title' || gameState === 'clear' || gameState === 'gameover') && e.key === 'Enter') {
        startCountdown();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
    });

    startBtn.addEventListener('click', startCountdown);
    retryBtn.addEventListener('click', startCountdown);
    backBtn.addEventListener('click', backToTitle);

    makeBackgroundStars();
    resetGame();
    backToTitle();
    requestAnimationFrame(loop);

    // ======================================
    // 動作確認チェック（スマホ対応版）
    // 1. 保存してブラウザで直接開ける
    // 2. タイトル画面が表示される
    // 3. スタートでカウント後にゲーム開始
    // 4. PCではWASD / 矢印キーで移動できる
    // 5. スマホでは左下スライドで移動できる
    // 6. 指を離すと移動が止まる
    // 7. 敵が外周から出現して追尾する
    // 8. 自動で近い敵を撃つ
    // 9. 被弾時に画面フラッシュ・揺れ・-1表示が出る
    // 10. 3秒生き残るとクリア演出が出る
    // ======================================
  </script>
</body>
</html>
